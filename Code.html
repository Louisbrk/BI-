 "deck": "S4a - Model: Classification & Evaluation", "page": 44, "title": "Exhibition & Exercise", "body": "• Attribute selection in decision trees: calculating\n  information gain\n• Building a decision tree with Weka\n• Decision trees as rule sets!\n• Classification vs. regression?"}, {"id": 230, "deck": "S4a - Model: Classification & Evaluation", "page": 45, "title": "Example: The contact lenses data", "body": "Age          Spectacle prescription   Astigmatism   Tear production rate   Recommended lenses\n    Young               Myope                 No              Reduced                 None\n    Young               Myope                 No               Normal                 Soft\n    Young               Myope                 Yes             Reduced                 None\n    Young               Myope                 Yes              Normal                 Hard\n    Young            Hypermetrope             No              Reduced                 None\n    Young            Hypermetrope             No               Normal                 Soft\n    Young            Hypermetrope             Yes             Reduced                 None\n    Young            Hypermetrope             Yes              Normal                 hard\nPre-presbyopic          Myope                 No              Reduced                 None\nPre-presbyopic          Myope                 No               Normal                 Soft\nPre-presbyopic          Myope                 Yes             Reduced                 None\nPre-presbyopic          Myope                 Yes              Normal                 Hard\nPre-presbyopic       Hypermetrope             No              Reduced                 None\nPre-presbyopic       Hypermetrope             No               Normal                 Soft\nPre-presbyopic       Hypermetrope             Yes             Reduced                 None\nPre-presbyopic       Hypermetrope             Yes              Normal                 None\n  Presbyopic            Myope                 No              Reduced                 None\n  Presbyopic            Myope                 No               Normal                 None\n  Presbyopic            Myope                 Yes             Reduced                 None\n  Presbyopic            Myope                 Yes              Normal                 Hard\n  Presbyopic         Hypermetrope             No              Reduced                 None\n  Presbyopic         Hypermetrope             No               Normal                 Soft\n  Presbyopic         Hypermetrope             Yes             Reduced                 None\n  Presbyopic         Hypermetrope             Yes              Normal                 None"}, {"id": 231, "deck": "S4a - Model: Classification & Evaluation", "page": 46, "title": "A decision tree for this problem", "body": ""}, {"id": 232, "deck": "S4a - Model: Classification & Evaluation", "page": 47, "title": "A complete and correct rule set", "body": "If tear production rate = reduced then recommendation = none\nIf age = young and astigmatic = no\n   and tear production rate = normal then recommendation = soft\nIf age = pre-presbyopic and astigmatic = no\n   and tear production rate = normal then recommendation = soft\nIf age = presbyopic and spectacle prescription = myope\n   and astigmatic = no then recommendation = none\nIf spectacle prescription = hypermetrope and astigmatic = no\n   and tear production rate = normal then recommendation = soft\nIf spectacle prescription = myope and astigmatic = yes\n   and tear production rate = normal then recommendation = hard\nIf age young and astigmatic = yes\n   and tear production rate = normal then recommendation = hard\nIf age = pre-presbyopic\n   and spectacle prescription = hypermetrope\n   and astigmatic = yes then recommendation = none\nIf age = presbyopic and spectacle prescription = hypermetrope\n   and astigmatic = yes then recommendation = none"}, {"id": 233, "deck": "S4a - Model: Classification & Evaluation", "page": 48, "title": "Structural descriptions", "body": "• Example: if-then rules      If tear production rate = reduced\n                                 then recommendation = none\n                              Otherwise, if age = young and astigmatic = no\n                                 then recommendation = soft\n             Age           Spectacle     Astigmatism   Tear production   Recommended\n                          prescription                       rate            lenses\n            Young           Myope            No           Reduced           None\n            Young        Hypermetrope        No            Normal            Soft\n        Pre-presbyopic   Hypermetrope        No           Reduced           None\n         Presbyopic         Myope           Yes            Normal           Hard\n              …                …             …               …                …"}, {"id": 234, "deck": "S4a - Model: Classification & Evaluation", "page": 49, "title": "From data to information", "body": "• Society produces huge amounts of data\n   • Sources: business, science, medicine, economics, geography, environment, sports…\n• This data is a potentially valuable resource\n• Raw data is useless: we need techniques to automatically extract\n  information from it\n   • Data: recorded facts\n   • Information: patterns underlying the data\n• We are concerned with machine learning techniques for automatically finding\n  patterns in data\n• Patterns that are found may be represented as structural descriptions or as\n  black-box models"}, {"id": 235, "deck": "S4a - Model: Classification & Evaluation", "page": 50, "title": "Numeric prediction", "body": "• A variant of classification learning where “class” is numeric (also called\n  “regression”)\n• Learning is supervised\n   •   The scheme is being provided with the target value\n• Measure success on test data\n       Income Source   Debt Level   Credit Score   Prior Default   Approved Amount\n           High          High          Poor           False               5\n           High          High          Poor            True               0\n          Stable         High          Poor           False              55\n         Unstable       Medium         Good           False              40\n            …              …             …              …                …"}, {"id": 236, "deck": "S4a - Model: Classification & Evaluation", "page": 51, "title": "Classification", "body": "Other methods: Logistic Regression"}, {"id": 237, "deck": "S4a - Model: Classification & Evaluation", "page": 52, "title": "Shall I Lend Money to Him?", "body": "• You work for a bank. Some of your customers apply loan from you. By\n  checking their background, you know the property they own, their credit\n  score, and some information on previous credit card use.\n• Decision: Should you approve the loan?\n    • Revolving balance is the portion of credit card spending that goes unpaid at\n      the end of a billing cycle.\n    • Revolving utilization is the amount of your revolving credit limits that you\n      are currently making use of."}, {"id": 238, "deck": "S4a - Model: Classification & Evaluation", "page": 53, "title": "To Whom to Lend Money?", "body": ""}, {"id": 239, "deck": "S4a - Model: Classification & Evaluation", "page": 54, "title": "Can Not Use Linear Regression!", "body": ""}, {"id": 240, "deck": "S4a - Model: Classification & Evaluation", "page": 55, "title": "Why Not Linear Regression?", "body": "(e.g., Exam Result)\n        Source: http://www.math.cornell.edu/~numb3rs/kostyuk/num218.htm"}, {"id": 241, "deck": "S4a - Model: Classification & Evaluation", "page": 56, "title": "Source: http://www.math.cornell.edu/~numb3rs/kostyuk/num218.htm", "body": ""}, {"id": 242, "deck": "S4a - Model: Classification & Evaluation", "page": 57, "title": "S-Shaped Curve", "body": " What if b=0? How the figure may look like?"}, {"id": 243, "deck": "S4a - Model: Classification & Evaluation", "page": 58, "title": "Odds of an event", "body": "• Natural log of the odds:                  In the left figure, we divide the hours studied into intervals\n       Ln(odds) is called logit of p.       of 40 hours; now, calculate the odds of different intervals.\n                                            Use X to denote the hours studied.\n                                            • Odds(60<X<=100)=(1/6)/[1-(1/6)]=1/5\n• Use LN() function in Excel to calculate   • Odds(100<X<=140)=1/4\n  the log odds. You will get the same       • Odds(140<X<=180)=2/3\n  results as shown in the figure.           • Odds(180<X<=220)=5\n                                            • Odds(220<X<=260)=4"}, {"id": 244, "deck": "S4a - Model: Classification & Evaluation", "page": 59, "title": "The Logistic Regression Model", "body": "ln[p/(1-p)] = α + βX + e\n                          ln(odds)= α + βX + e\n• p is the probability that the event Y occurs, p(Y=1)\n• p/(1-p) is the \"odds \"\n• ln[p/(1-p)] is the \"logit\"\n                                  eα + β X\n• In other words              p=      α +β X\n                                 1+ e\n• Parameter estimation: maximum likelihood method"}, {"id": 245, "deck": "S4a - Model: Classification & Evaluation", "page": 60, "title": "Multiple Logistic Regression Model", "body": "72"}, {"id": 246, "deck": "S4a - Model: Classification & Evaluation", "page": 61, "title": "Why do we use logit rather than probability", "body": "directly in the logistic regression model?"}, {"id": 247, "deck": "S4a - Model: Classification & Evaluation", "page": 62, "title": "Assumptions of Logistic Regression", "body": "• The advantages of logistic regression are primarily the\n  result of the general lack of assumptions.\n  – Logistic regression does not require any specific\n    distributional form for the independent variables.\n  – Heteroscedasticity (violation of homoscedasticity) is not a\n    “big” concern.\n  – Linear relationships between the dependent and independent\n    variables are not required.\n  – The presence of multicollinearity will not lead to biased\n    coefficients."}, {"id": 248, "deck": "S4a - Model: Classification & Evaluation", "page": 63, "title": "Interpretation of the Coefficients", "body": "ln(odds)= α + βX + e\n                                     75"}, {"id": 249, "deck": "S4a - Model: Classification & Evaluation", "page": 64, "title": "Example", "body": "• Look at the odd ratios\nb. ‘B’ stands for ‘𝛽𝛽.’   Exp (B): odd ratio (OR), is the effect size of the predictor.\n                          The closer the odd ratio is to 1, the smaller the effect.\n                                Interpretation:\n                                o OR>1 increased frequency of exposure\n                                  among cases\n                                o OR=1 No change in frequency of exposure\n                                o OR<1 decreased frequency of exposure"}, {"id": 250, "deck": "S4a - Model: Classification & Evaluation", "page": 65, "title": "More explanations: Odds and Odds Ratio (1)", "body": ""}, {"id": 251, "deck": "S4a - Model: Classification & Evaluation", "page": 66, "title": "More explanations: Odds and Odds Ratio (2)", "body": ""}, {"id": 252, "deck": "S4a - Model: Classification & Evaluation", "page": 67, "title": "How to calculate the odds change due to a one-unit", "body": "change in an independent variable X?\n                                                    Value\n                                0.20    0.50      1.0       1.5     1.7\n                                -0.80   -0.50     0.0       0.50    0.70\n Percentage change in odds      -80%    -50%      0%        50%     70%\nIn the table above, if the exponentiated coefficient (i.e., the odds ratio) is\n0.20 (1st column), a one-unit change in X will reduce the odds by 80%."}, {"id": 253, "deck": "S4a - Model: Classification & Evaluation", "page": 68, "title": "Kinds of research questions", "body": "• Logistic regression allows one to predict a discrete\n  outcome (DV) such as group membership from a set of\n  variables that may be continuous, discrete, dichotomous,\n  or mixed (IVs).\n  – If the outcome variable is dichotomous, run binary logistic.\n  – If the outcome variable has 3 or more values, run multinomial\n    logistic."}, {"id": 254, "deck": "S4a - Model: Classification & Evaluation", "page": 69, "title": "Logistic Regression", "body": "• The purpose is to assess the effects of multiple\n  explanatory variables, which can be numeric and/or\n  categorical, on the outcome.\n• Establishing a classification system based on the logistic\n  model for determining classification.\n – Profiling: already know the outcome category, want to\n   describe the characteristics of the explanatory variables\n   Discriminant analysis (used in clustering validation)\n – Classification: logistic regression\n• Has a non-linear decision function"}, {"id": 255, "deck": "S4a - Model: Classification & Evaluation", "page": 70, "title": "Evaluating the Performance of the (Logistic Regression) Model", "body": " Prediction correctness\nE.g., if the estimated p is greater than or equal to .5, then consider it to be predicted as 1 (i.e., the loan is rejected).\n                        (a.k.a., Confusion Matrix)\n                                                                            correct prediction\n                                                                            All approved cases\n                                                                                            22\n                                                                             Specificity 22+1\n                                                                             Sensitivity    26\n                                                                                           1+26\n                                                                             correct prediction\n                   correct prediction                  Overall               All rejected cases\n                     all predictions                   Accuracy\n                                                       22+26\n                                                     22+1+26+1"}, {"id": 256, "deck": "S4a - Model: Classification & Evaluation", "page": 71, "title": "Sensitivity vs. Specificity", "body": "We are more interested in\n                 maximizing the\n                 sensitivity."}, {"id": 257, "deck": "S4a - Model: Classification & Evaluation", "page": 72, "title": "Case Study", "body": "Financial Status and Special Treatment for\n         public listed companies"}, {"id": 258, "deck": "S4a - Model: Classification & Evaluation", "page": 73, "title": "Special Treatment (ST)", "body": "• A unique policy in China’s stock market\n• Normal: the price change of a stock is within 10%\n• Special treatment: the price change is limited to\n  5% (raised to 10%, starting Mon., July 6th, 2026)."}, {"id": 259, "deck": "S4a - Model: Classification & Evaluation", "page": 74, "title": "https://finance.biggo.com/news/4a06c74c-81c9-4548-b8b1-6e2c4511528d", "body": ""}, {"id": 260, "deck": "S4a - Model: Classification & Evaluation", "page": 75, "title": "Reason for special treatment:", "body": "• Abnormal financial status, and it is hard for investors\n  to assess the potential of the company\n  – Deficit for two consecutive years\n  – Errors or fraud in financial report\n  – Failed to publish financial report in time\n  – File for bankruptcy"}, {"id": 261, "deck": "S4a - Model: Classification & Evaluation", "page": 76, "title": "Controversy for Special Treatment", "body": "• “Deficit for two consecutive years” vs “disclose\n  false information”?\n• Deficit can be due to:\n  – Poor profitability\n  – Conservative accounting standard\n  – Company is expanding, with big potential (e.g., Tesla)"}, {"id": 262, "deck": "S4a - Model: Classification & Evaluation", "page": 77, "title": "Data", "body": "• ARA = (Account Receivable) / (Total Asset)\n   – Usually, the lower, the better\n• Assets (资产规模)\n   – Return on Assets? Number of employees?\n• ATP (Asset Turnover, 资产周转率)\n   – = (Net income) / (Total Assets)\n• ROA: Return on Assets (资产收益率)"}, {"id": 263, "deck": "S4a - Model: Classification & Evaluation", "page": 78, "title": "Data (Cont.)", "body": "• Growth (销售收入增长率)\n• LEV: (Debt-Asset Ratio, 债务资产比率，杠杆比率)\n• Share: The percentage of shares held by the top 1\n  shareholder (第一大股东持股比率)\n• ST: (Special Treatment) = 0, 1"}, {"id": 264, "deck": "S4a - Model: Classification & Evaluation", "page": 79, "title": "Summary Statistics (Excel)", "body": "ARA       ASSET       ATO       ROA        GROWTH      LEV        SHARE       ST\nMean          0.095      20.778     0.520      0.056       0.115      0.406      46.035     0.053\nStandard\nError         0.004       0.032     0.014      0.001       0.012      0.006       0.676     0.009\nMedian        0.068      20.701     0.433      0.051       0.102      0.407      44.955     0.000\nMode        #N/A       #N/A         0.424   #N/A        #N/A       #N/A          75.000     0.000\nStandard\nDeviation     0.092       0.834      .363      0.039       0.307      0.166      17.684     0.223\nSample\nVariance      0.009       0.695     0.132     0.001        0.094     0.027      312.737     0.050\nKurtosis      4.832       0.671     8.041     6.326        1.185    -0.372       -0.958    14.168\nSkewness      1.942       0.548     2.219     1.704        0.013     0.084        0.095     4.016\nRange         0.635       5.357     3.149     0.311        1.949     0.962       84.420     1.000\nMinimum       0.000      18.661     0.003     0.000       -0.951     0.018        4.160     0.000\nMaximum       0.635      24.018     3.151     0.311        0.999     0.980       88.580     1.000\nSum          65.014   14212.052   355.525    38.215       78.836   277.747    31487.610    36.000\nCount       684.000 ": "Simple split (or holdout or test sample estimation)\n     • Split the data into 2 mutually exclusive sets: training (~70%) and testing (30%)\n                                                                          Model\n                                             Training Data             Development\n                                   2/3\n                                                                               Trained           Prediction\n                  Preprocessed                                                 Classifier        Accuracy\n                      Data\n                                   1/3                                     Model                 TP    FP\n                                                                        Assessment\n                                             Testing Data                (scoring)               FN    TN\nFor Neural Networks, the data is split into three sub-sets (training [~60%], validation [~20%], testing [~20%])"}, {"id": 273, "deck": "S4a - Model: Classification & Evaluation", "page": 88, "title": "Estimation Methodologies for Classification:", "body": "k-Fold Cross Validation (rotation estimation)\n• Data is split into k mutual subsets and k number training/testing experiments are\n  conducted"}, {"id": 274, "deck": "S4a - Model: Classification & Evaluation", "page": 89, "title": "Accuracy of Classification Models", "body": "• In classification problems, the primary source for accuracy estimation is the confusion\n  matrix\n                      TP + TN                                              True/Observed Class\n      Accuracy =\n       正确率       TP + TN + FP + FN                                         Positive    Negative\n                               TP\n     True PositiveRate =                                                    True         False\n                                                               Positive\n        (sensitivity，敏感性)    TP + FN nd specificity of 97 %\n• What would happen if it is used for screening in a city with a population of 10 million?\n    • Assuming a low prevalence/infection rate (one in a million) in that area, then:\n        •          positives will be tested, of which is true positive\n        • Is the negative test result reliable?\n                                                                                                                                True/Observed Class\n    • If the infection rate is relatively high (5%)\n                                                                                                                                Positive    Negative\n          •          positives will be tested, of which           is true positive\n          • The proportion of missed cases? <\n                                                                                                                                 True         False\n                                                                                                                    Positive\n                                                                                                                                Positive     Positive\n                                                                                                          Predicted Class\n• When should antigen testing be used?                                                                                         Count (TP)   Count (FP)\n             Testing for high-risk, high-prevalence clustered infections\n                                                                                                        Negative\n                                                                                                                                 False        True\n                                                                                                                                Negative     Negative\n
