0.2672    0.8994      0.8190     2.5498   1.2864   0.9377\n   2 (Intrinsic value dominated)           2989    0.4781    2.0605      0.8559     0.2340   1.2384   0.9649\n   3 (Active value insensitive)            3548    0.2933    0.3931      0.8779     0.2862   1.1435   0.9258"}, {"id": 408, "deck": "S4b - Model: Clustering & Association", "page": 122, "title": "Cluster centers after min-max normalization or Z-score normalization", "body": "Cluster 1: Intrinsic Value   Cluster 2: Extrinsic    Cluster 3: Active Value\n                                                   Dominated Group              Value Dominated Group   Insensitive Group"}, {"id": 409, "deck": "S4b - Model: Clustering & Association", "page": 123, "title": "Player Groups with Different MGEV Mindsets", "body": "Cluster 1: Intrinsic Value Dominated           Cluster 3: Active Value Insensitive\nCluster 2: Extrinsic Value Dominated"}, {"id": 410, "deck": "S4b - Model: Clustering & Association", "page": 124, "title": "Part 6 Study 3", "body": "Exploring Inter-Cluster Differences\nWe compare the three clusters of MG players in terms of their WOM & MG participation characteristics (VIP status,\npayment, and MG location) using stacked percentage bar charts to illustrate the inter-cluster differences\n  Table 5 P-values of Chi-square Tests\n  Notes: ***p<0.001, **p<0.01, *p<0.1.\n  Compared clusters                       WOM           VIP status              Payment              MG location\n      Clusters 1,2,3                2.28E-07***         5.84E-08***            3.84E-43***            1.27E-03**\n       Clusters 1,2                 3.22E-05***          8.31E-01              7.33E-05***             2.31E-01\n       Clusters 1,3                      4.90E-01       2.70E-04***            6.29E-10***            2.27E-03**\n       Clusters 2,3                 7.70E-07***         5.00E-08***            6.05E-45***            6.99E-03**"}, {"id": 411, "deck": "S4b - Model: Clustering & Association", "page": 126, "title": "Q-D-M-A", "body": "3. Model\nMarket Basket Analysis (MBA):\n  Association Rule Mining"}, {"id": 412, "deck": "S4b - Model: Clustering & Association", "page": 127, "title": "Association Rule Mining", "body": "• A very popular DM method in business\n• Finds interesting relationships (affinities) between variables (items or events)\n• Part of the machine learning family\n• Employs unsupervised learning\n• There is no output variable\n• Also known as market basket analysis (MBA)\n• Often used as an example to describe DM to ordinary people, such as the famous\n  “relationship between diapers and beers!”"}, {"id": 413, "deck": "S4b - Model: Clustering & Association", "page": 128, "title": "Trees as Sets of Rules (revisit)", "body": "• We learned decision trees in previous\n  lectures. Actually, a classification tree\n  can be presented using a set of rules.\n• Each rule consists of attribute tests\n  along the path connected with AND\n• IF (Employed = Yes) THEN Class=Not Write-off\n• IF (Employed = No) AND (Balance < 50k) THEN Class=Not Write-off\n• IF (Employed = No) AND (Balance ≥ 50k) AND (Age < 45) THEN Class=Not Write-off\n• IF (Employed = No) AND (Balance ≥ 50k) AND (Age ≥ 45) THEN Class=Write-off"}, {"id": 414, "deck": "S4b - Model: Clustering & Association", "page": 129, "title": "The weather problem", "body": "• Conditions for playing a certain game\n        Outlook     Temperature    Humidity       Windy   Play\n         Sunny         Hot           High         False    No\n         Sunny         Hot           High         True     No\n        Overcast       Hot           High         False   Yes\n         Rainy         Mild         Normal        False   Yes\n          …             …             …            …       …\n  If outlook = sunny and humidity = high then play = no\n  If outlook = rainy and windy = true then play = no\n  If outlook = overcast then play = yes\n  If humidity = normal then play = yes\n  If none of the above then play = yes"}, {"id": 415, "deck": "S4b - Model: Clustering & Association", "page": 130, "title": "Classification vs. association rules", "body": "• Classification rule:\n predicts value of a given attribute (the classification of an example)\n             If outlook = sunny and humidity = high\n                 then play = no\n• Association rule:\n predicts value of arbitrary attribute (or combination)\n             If temperature = cool then humidity = normal\n             If humidity = normal and windy = false\n                 then play = yes\n             If outlook = sunny and play = no\n                 then humidity = high\n             If windy = false and play = no\n                 then outlook = sunny and humidity = high"}, {"id": 416, "deck": "S4b - Model: Clustering & Association", "page": 131, "title": "Association learning", "body": "• Can be applied if no class is specified and any kind of structure\n  is considered “interesting.”\n• Difference to classification learning:\n  • Can predict any attribute’s value, not just the class, and more than one\n    attribute’s value at a time\n  • Hence: far more association rules than classification rules\n  • Thus: constraints are necessary, such as minimum coverage and\n    minimum accuracy"}, {"id": 417, "deck": "S4b - Model: Clustering & Association", "page": 133, "title": "Association Rule Mining", "body": "• Input: the simple point-of-sale transaction data\n• Output: Most frequent affinities among items\n• Example: according to the transaction data…\n    “Customers who bought a laptop computer and a virus protection software also\n    bought an extended service plan 70 percent of the time.”\n• How do you use such a pattern/knowledge?\n   – Put the items next to each other\n   – Promote the items as a package\n   – Place items far apart from each other!"}, {"id": 418, "deck": "S4b - Model: Clustering & Association", "page": 134, "title": "Association Rules", "body": "• Association rules…\n  • … can predict any attribute and combinations of attributes\n  • … are not intended to be used together as a set\n• Problem: an immense number of possible associations\n  • Output needs to be restricted to show only the most predictive\n    associations\n      • only those with high support and high confidence"}, {"id": 419, "deck": "S4b - Model: Clustering & Association", "page": 135, "title": "Association Rule Mining", "body": "• Are all association rules interesting and useful?\n  A Generic Rule:     X ⇒ Y [S%, C% ]\n   X, Y: products and/or services\n   X: Left-hand-side (LHS)\n   Y: Right-hand-side (RHS)\n   S: Support: how often X and Y go together\n   C: Confidence: how often Y go together with the X\n Example: {Laptop Computer, Antivirus Software} ⇒\n   {Extended Service Plan} [30%, 70%]"}, {"id": 420, "deck": "S4b - Model: Clustering & Association", "page": 138, "title": "Three major statistics", "body": "•Since there may exist many rules, we only focus on the “important” ones\n(i.e., complexity control): We have the following statistics that help us focus\non the most important rules: Support, Confidence, and Lift.\n   • Support (coverage) of the rule\n      • (coverage): so that our rule covers a reasonably large number of instances.\n      • Let’s say that we require rules to apply to at least 0.1% of all transactions"}, {"id": 421, "deck": "S4b - Model: Clustering & Association", "page": 139, "title": "Major statistics we care about", "body": ""}, {"id": 422, "deck": "S4b - Model: Clustering & Association", "page": 140, "title": "How to calculate these statistics", "body": "• Here is a summary of the major statistics about the rule of\n   • If X, Then Y (or XY) (the size of the data is N (instances)).\n                                                          = n1 / n4\nn2: X instances\n                                                               = n1 / n2\nn3: Y instances\n                                                             = (n1/n2) / (n3/n4)"}, {"id": 423, "deck": "S4b - Model: Clustering & Association", "page": 141, "title": "Exhibition / Exercise", "body": "• Association Rules: calculating support, confidence, and lift\n  (with the weather data)\n• Association rule mining in Weka"}, {"id": 424, "deck": "S4b - Model: Clustering & Association", "page": 142, "title": "Association Rule Mining", "body": "• A representative application of association rule mining includes\n   – In business: cross-marketing, cross-selling, store design, catalog\n     design, e-commerce site design, optimization of online advertising,\n     product pricing, and sales/promotion configuration\n   – In medicine: relationships between symptoms and illnesses;\n     diagnosis and patient characteristics and treatments (to be used in\n     medical DSS); and genes and their functions (to be used in\n     genomics projects)\n   –…"}, {"id": 425, "deck": "S4b - Model: Clustering & Association", "page": 143, "title": "A Taxonomy          Data Mining Tasks & Methods     Data Mining Algorithms                     Learning Type", "body": "for Data                  Prediction\nMining                          Classification\n                                                    Decision Trees, Neural Networks, Support\n                                                    Vector Machines, kNN, Naïve Bayes, GA\n                                                                                                  Supervised\n                                                    Linear/Nonlinear Regression, ANN,\n                                Regression                                                        Supervised\n                                                    Regression Trees, SVM, kNN, GA\n                                                    Autoregressive Methods, Averaging\n                                Time Series                                                       Supervised\n                                                    Methods, Exponential Smoothing, ARIMA\n• A Simple                Association\n  Taxonomy for                  Market-basket       Apriory, OneR, ZeroR, Eclat, GA              Unsupervised\n  Data Mining\n  Tasks, Methods,               Link analysis\n                                                    Expectation Maximization, Apriory\n                                                                                                 Unsupervised\n  and Algorithms                                    Algorithm, Graph-based Matching\n                                                    Apriory Algorithm, FP-Growth, Graph-\n                                Sequence analysis                                                Unsupervised\n                                                    based Matching\n                          Segmentation\n                                Clustering          K-means, Expectation Maximization (EM)       Unsupervised\n                                Outlier analysis    K-means, Expectation Maximization (EM)       Unsupervised"}, {"id": 426, "deck": "S4b - Model: Clustering & Association", "page": 144, "title": "TASK 3: Model Building, Assessment, and Evaluation", "body": "• Choose the appropriate methods for analyses and build a model:\n  • Prediction: Classification, Regression, Neural Networks...\n  • Clustering\n  • Association\n• Evaluate the model's performance (independently and against baseline,\n  alternative models) and take iterations (if necessary) to “optimize” its\n  performance\n   • Prediction vs. Explanation vs. Causal Proof?"}, {"id": 427, "deck": "S4b - Model: Clustering & Association", "page": 145, "title": "Q-D-M-A", "body": ""}, {"id": 428, "deck": "S5 - Action", "page": 1, "title": "Q-D-M-A", "body": "4. Action\nAfter all, let’s go back to business (value)!"}, {"id": 429, "deck": "S5 - Action", "page": 2, "title": "4. Action: Deployment & Business Value Realization", "body": "Challenge\n • So What? (customers don’t understand / agree)\n Puzzle\n • How do we determine the business value of data\n   products and data analytics?"}, {"id": 430, "deck": "S5 - Action", "page": 3, "title": "Business value of data (products/analytics)", "body": "Justifying the business value in terms of:\n          • Revenue: Wikipedia\n          • Cost: No free lunch\n          • Risk: Uncertainty about future revenue / cost\n          Value: (quantifiable) improvement in any\n          of the three above\n          • Reference / anchor point (benchmark)"}, {"id": 431, "deck": "S5 - Action", "page": 4, "title": "Fielded applications", "body": "• The result of learning—or the learning method itself—is deployed in\n  practical applications\n   • Processing loan applications\n   • Screening images for oil slicks\n   • Electricity supply forecasting\n   • Diagnosis of machine faults\n   • Marketing and sales\n   • Separating crude oil and natural gas\n   • Reducing banding in rotogravure printing\n   • Finding appropriate technicians for telephone faults\n   • Scientific applications: biology, astronomy, chemistry\n   • Automatic selection of TV programs\n   • Monitoring intensive care patients"}, {"id": 432, "deck": "S5 - Action", "page": 5, "title": "Processing loan applications (American Express)", "body": "• Question: Should money be lent?\n• Data: Questionnaires with financial and personal information\n• A simple statistical method covers 90% of cases\n• Borderline cases were referred to the loan officers\n• But: 50% of accepted borderline cases defaulted!\n• Solution: reject all borderline cases?\n  • No! Borderline cases are the most active customers"}, {"id": 433, "deck": "S5 - Action", "page": 6, "title": "Enter machine learning", "body": "• 1000 training examples of borderline cases\n• 20 attributes:\n   • age\n   • years with current employer\n   • years at current address\n   • years with the bank\n   • other credit cards possessed,…\n• Learned rules: correct on 70% of cases\n   • human experts only 50%\n• Rules could be used to explain decisions to customers"}, {"id": 434, "deck": "S5 - Action", "page": 7, "title": "Screening images", "body": "• Given (data): radar satellite images of coastal waters\n• Problem: Detect oil slicks in those images\n• Oil slicks appear as dark regions with changing size and shape\n• Not easy: lookalike dark regions can be caused by weather conditions\n  (e.g., high wind)\n• Expensive process requiring highly trained personnel"}, {"id": 435, "deck": "S5 - Action", "page": 8, "title": "Enter machine learning", "body": "• Extract dark regions from normalized images\n• Attributes:\n   • size of region\n   • shape, area\n   • intensity\n   • sharpness and jaggedness of boundaries\n   • proximity of other regions\n   • info about background\n• Constraints:\n   • Few training examples—oil slicks are rare!\n   • Unbalanced data: most dark regions aren’t slicks\n   • Regions from the same image form a batch\n   • Requirement: adjustable false-alarm rate"}, {"id": 436, "deck": "S5 - Action", "page": 9, "title": "Load forecasting", "body": "• Electricity supply companies need forecasts of future demand for power\n• Forecasts of min/max load for each hour\n  => significant savings\n• Given: manually constructed load model that assumes “normal” climatic\n  conditions\n• Problem: Adjust for weather conditions\n• The static model consists of:\n   • base load for the year\n   • load periodicity over the year\n   • effect of holidays"}, {"id": 437, "deck": "S5 - Action", "page": 10, "title": "Enter machine learning", "body": "• Prediction corrected using “most similar” days\n• Attributes:\n   • temperature\n   • humidity\n   • wind speed\n   • cloud cover readings\n   • plus difference between actual load and predicted load\n• Average difference among three “most similar” days added to static model\n• Linear regression coefficients form attribute weights in similarity function"}, {"id": 438, "deck": "S5 - Action", "page": 11, "title": "Diagnosis of machine faults", "body": "• Diagnosis: classical domain of expert systems\n• Given (data): Fourier analysis of vibrations measured at various points of\n  a device’s mounting\n• Question: Which fault is present?\n• Preventive maintenance of electromechanical motors and generators\n• Information is very noisy\n• So far: diagnosis by expert/hand-crafted rules"}, {"id": 439, "deck": "S5 - Action", "page": 12, "title": "Enter machine learning", "body": "• Available: 600 faults with expert’s diagnosis\n• ~300 unsatisfactory, rest used for training\n• Attributes augmented by intermediate concepts that embodied causal\n  domain knowledge\n• Expert not satisfied with initial rules because they did not relate to his\n  domain knowledge\n• Further background knowledge resulted in more complex rules that\n  were satisfactory\n• Learned rules outperformed hand-crafted ones"}, {"id": 440, "deck": "S5 - Action", "page": 13, "title": "Marketing and sales I", "body": "• Companies precisely record massive amounts of marketing and\n  sales data\n• Applications:\n  • Customer loyalty:\n    identifying customers that are likely to defect by detecting changes in\n    their behavior (e.g., banks/phone companies)\n  • Special offers:\n    identifying profitable customers (e.g., reliable owners of credit cards that\n    need extra money during the holiday season)"}, {"id": 441, "deck": "S5 - Action", "page": 14, "title": "Marketing and sales II", "body": "• Market basket analysis\n  • Association techniques find groups of items that tend to\n    occur together in a transaction\n    (used to analyze checkout data)\n• Historical analysis of purchasing patterns\n• Identifying prospective customers\n  • Focusing promotional mailouts\n    (targeted campaigns are cheaper than mass-marketed ones)"}, {"id": 442, "deck": "S5 - Action", "page": 15, "title": "TASK 4: Actionable Recommendations and Report", "body": "• Based on the results of data analyses in TASK3, propose actionable\n   recommendations for tacking the practical problem(s) you proposed in\n   TASK1\n • Complete your group report and submit the following (Don’t miss the\n   deadline!) to philzhou@tongji.edu.cn\n    • Data analytics report (Word/PDF)\n    • PPT slides for presentation (You can refine your slides after the presentation\n      based on the feedback received)\n    • Final dataset (CSV)\n    • Codes (if any) with notes (Word/PDF)"}, {"id": 443, "deck": "S5 - Action", "page": 16, "title": "Reporting (Written/Oral)", "body": "Practice (makes perfect):\n      A reverse engineering of one-line skeleton\n•   Bloom, N.,, Han, R., & Liang, J. Hybrid working from home improves retention without damaging\n    performance. Nature, Published online: 12 June 2024. https://doi.org/10.1038/s41586-024-07500-2"}, {"id": 444, "deck": "S5 - Action", "page": 17, "title": "DM Issues", "body": "Myths, Mistakes, and Trends"}, {"id": 445, "deck": "S5 - Action", "page": 18, "title": "Data Mining Myths", "body": "Myth                                  Reality\nData mining provides instant,         Data mining is a multistep process that requires\ncrystal-ball-like predictions.        deliberate, proactive design and use.\nData mining is not yet viable for     The current state of the art is ready to go for\nmainstream business applications.     almost any business type and/or size.\nData mining requires a separate,      Because of the advances in database technology,\ndedicated database.                   a dedicated database is not required.\nOnly those with advanced degrees      Newer Web-based tools enable managers of all\ncan do data mining.                   educational levels to do data mining.\nData mining is only for large firms   If the data accurately reflect the business or its\nthat have lots of customer data.      customers, any company can use data mining."}, {"id": 446, "deck": "S5 - Action", "page": 20, "title": "Common Data Mining Mistakes", "body": "6. Ignoring suspicious (good or bad) findings and quickly\n    moving on\n7. Running mining algorithms repeatedly and blindly, without\n   thinking about the next stage\n8. Naively believing everything you are told about the data\n9. Naively believing everything you are told about your own\n   data mining analysis\n10.Measuring your results differently from the way your\n   sponsor measures them"}, {"id": 447, "deck": "S5 - Action", "page": 21, "title": "Data mining and ethics I", "body": "• Ethical issues arise in practical applications\n• Anonymizing data is difficult\n   • 85% of Americans can be identified from just zip code, birth date and sex\n• Data mining is often used to discriminate\n   • E.g., loan applications: using some information (e.g., sex, religion, race) is unethical\n• Ethical situation depends on the application\n   • E.g., same information ok in a medical application\n• Attributes may contain problematic information\n   • E.g., area code may correlate with race"}, {"id": 448, "deck": "S5 - Action", "page": 22, "title": "Data mining and ethics II", "body": "• Important questions:\n  • Who is permitted access to the data?\n  • For what purpose was the data collected?\n  • What kind of conclusions can be legitimately drawn from it?\n• Caveats must be attached to results\n• Purely statistical arguments are never sufficient!\n• Are resources put to good use?"}, {"id": 449, "deck": "S5 - Action", "page": 23, "title": "Discussion", "body": "• A telecom churn model recommends retention discounts. It uses usage,\n  complaints, location, age, and payment behavior. The project team\n  proposes uploading raw customer records and model outputs to a public\n  GenAI tool to draft personalized messages.\n   • Take a stakeholder perspective: customer, business owner,\n     compliance/legal, data scientist, or frontline service employee\n   • Decide Go, Revise, or Stop. Identify two risks, two controls, and one\n     monitoring signal.\n• A model is not deployed responsibly until access, purpose, fairness,\n  privacy, human oversight, monitoring, and rollback are designed."}, {"id": 450, "deck": "S5 - Action", "page": 24, "title": "References (selected)", "body": "NOTE: All slides are for class use only. Please do not use them for any\ncommercial purposes or share them beyond the class.\n• Bloomberg Businessweek. 2011. “The Current State of Business Analytics: Where Do We Go from Here?,”\n  Bloomberg Businessweek Research Services\n  (http://www.sas.com/resources/asset/busanalyticsstudy_wp_08232011.pdf)\n• H. Chen, R.H.L. Chiang, V.C. Storey. Business Intelligence and Analytics: From Big Data to Big Impacts. MIS\n  Quarterly, 36 (4): 1165-1188.\n• IBM. 2011. “The 2011 IBM Tech Trends Report: The Clouds are Rolling In...Is Your Business Ready?,”\n  November 15 (http://www.ibm.com/developerworks/techntrendsreport; accessed August 4, 2012)\n    • survey of 4000+ IT professionals from 93 countries & 25 industries;\n• Manyika, J., Chui, M., Brown, B., Bughin, J., Dobbs, R., Roxburgh, C., and Byers, A. H. 2011. “Big Data: The\n  Next Frontier for Innovation, Competition, and Productivity,” McKinsey Global Institute\n  (http://www.mckinsey.com/insights/mgi/research/technology_and_innovation/big_data_the_next_frontier_for_in\n  novation; accessed August 4, 2012)."}, {"id": 451, "deck": "S5 - Action", "page": 25, "title": "Q-D-M-A   @Zhongyun (Phil) Zhou", "body": ""}]</script>
<script>
(function() {
  /* ============================================================
     SHARED HELPERS
  ============================================================ */
  function log2(x) { return Math.log(x) / Math.log(2); }
  function fmt(n, d) {
    if (d === undefined) d = 3;
    if (!isFinite(n)) return "–";
    return (Math.round(n * Math.pow(10,d)) / Math.pow(10,d)).toString();
  }
  function entropyOf(counts) {
    const total = counts.reduce((a,b) => a+b, 0);
    if (total === 0) return 0;
    let e = 0;
    counts.forEach(c => {
      if (c > 0) {
        const p = c / total;
        e -= p * log2(p);
      }
    });
    return e;
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(k => {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'html') e.innerHTML = attrs[k];
      else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(c => { if (c) e.appendChild(c); });
    return e;
  }

  /* ============================================================
     MODE SWITCHING
  ============================================================ */
  const tabSearch = document.getElementById('tabSearch');
  const tabCalc = document.getElementById('tabCalc');
  const searchHeaderExtra = document.getElementById('searchHeaderExtra');
  const metaRow = document.getElementById('metaRow');
  const resultsEl = document.getElementById('results');
  const qInput = document.getElementById('q');

  let mode = 'search';
  function setMode(m) {
    mode = m;
    tabSearch.classList.toggle('active', m === 'search');
    tabCalc.classList.toggle('active', m === 'calc');
    searchHeaderExtra.classList.toggle('hidden', m !== 'search');
    if (m === 'search') {
      metaRow.classList.remove('hidden');
      runSearch();
    } else {
      metaRow.classList.add('hidden');
      renderCalc();
    }
  }
  tabSearch.addEventListener('click', () => setMode('search'));
  tabCalc.addEventListener('click', () => setMode('calc'));

  /* ============================================================
     SEARCH MODULE
  ============================================================ */
  const SLIDES = JSON.parse(document.getElementById('slides-data').textContent);
  const DECKS = [...new Set(SLIDES.map(s => s.deck))];
  const filtersEl = document.getElementById('filters');
  let activeDeck = null;

  const allChip = el('button', { class: 'chip active', onclick: () => { activeDeck = null; setActiveChip(allChip); runSearch(); } }, []);
  allChip.textContent = 'Alle Decks';
  filtersEl.appendChild(allChip);

  function setActiveChip(chip) {
    [...filtersEl.children].forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  }
  DECKS.forEach(deck => {
    const chip = el('button', { class: 'chip', onclick: () => { activeDeck = deck; setActiveChip(chip); runSearch(); } }, []);
    chip.textContent = deck;
    filtersEl.appendChild(chip);
  });

  function highlight(text, terms) {
    let escaped = escapeHtml(text);
    terms.forEach(t => {
      if (!t) return;
      const re = new RegExp('(' + escapeRegex(t) + ')', 'gi');
      escaped = escaped.replace(re, '<mark>$1</mark>');
    });
    return escaped;
  }
  function snippet(body, terms, maxLen) {
    maxLen = maxLen || 420;
    if (body.length <= maxLen) return body;
    let idx = -1;
    for (const t of terms) {
      const i = body.toLowerCase().indexOf(t.toLowerCase());
      if (i >= 0 && (idx === -1 || i < idx)) idx = i;
    }
    if (idx === -1) return body.slice(0, maxLen) + '…';
    const start = Math.max(0, idx - 100);
    const end = Math.min(body.length, start + maxLen);
    return (start > 0 ? '…' : '') + body.slice(start, end) + (end < body.length ? '…' : '');
  }
  function score(slide, terms) {
    const titleL = slide.title.toLowerCase();
    const bodyL = slide.body.toLowerCase();
    let s = 0;
    for (const t of terms) {
      if (!t) continue;
      const tl = t.toLowerCase();
      const titleMatches = titleL.split(tl).length - 1;
      const bodyMatches = bodyL.split(tl).length - 1;
      s += titleMatches * 12;
      s += bodyMatches * 2;
      if (titleL === tl) s += 30;
    }
    return s;
  }
  function showEmptyState() {
    resultsEl.innerHTML = '<div class="empty-state"><div class="big">⌕</div><p>Tippe einen Begriff aus dem Skript ein — z.&nbsp;B. <em>Entropie</em>, <em>k-means</em>, <em>Lift</em>, <em>Odds Ratio</em>, <em>Q-D-M-A</em>, <em>Confusion Matrix</em> — und alle passenden Folien aus S2&ndash;S5 erscheinen sofort.</p></div>';
  }
  function runSearch() {
    if (mode !== 'search') return;
    const raw = qInput.value.trim();
    resultsEl.innerHTML = '';
    let pool = SLIDES;
    if (activeDeck) pool = pool.filter(s => s.deck === activeDeck);
    if (!raw) {
      metaRow.textContent = (activeDeck ? activeDeck + ' — ' : '') + pool.length + ' Folien verfügbar. Suchbegriff eingeben…';
      showEmptyState();
      return;
    }
    const terms = raw.split(/\s+/).filter(Boolean);
    const scored = pool.map(s => ({ slide: s, sc: score(s, terms) }))
      .filter(x => x.sc > 0).sort((a,b) => b.sc - a.sc).slice(0, 60);
    metaRow.textContent = scored.length + ' Treffer für "' + raw + '"' + (activeDeck ? ' in ' + activeDeck : ' in allen Decks');
    if (scored.length === 0) {
      resultsEl.innerHTML = '<div class="empty-state"><div class="big">∅</div><p>Keine Treffer. Versuche einen kürzeren oder anderen Begriff.</p></div>';
      return;
    }
    const frag = document.createDocumentFragment();
    scored.forEach(({ slide }) => {
      const bodySnip = snippet(slide.body, terms);
      const card = el('div', { class: 'card', html:
        '<div class="card-head"><div class="card-title">' + highlight(slide.title, terms) + '</div>' +
        '<div class="card-tag">' + escapeHtml(slide.deck) + '</div></div>' +
        '<div class="card-body">' + highlight(bodySnip, terms) + '</div>' +
        '<div class="card-page">Folie ' + slide.page + ' &middot; ' + escapeHtml(slide.deck) + '</div>'
      });
      frag.appendChild(card);
    });
    resultsEl.appendChild(frag);
  }
  qInput.addEventListener('input', () => {
    clearTimeout(qInput._t);
    qInput._t = setTimeout(runSearch, 60);
  });
  document.addEventListener('keydown', (e) => {
    if (mode === 'search' && e.key === '/' && document.activeElement !== qInput) {
      e.preventDefault(); qInput.focus();
    }
    if (e.key === 'Escape' && document.activeElement === qInput) {
      qInput.value = ''; runSearch(); qInput.blur();
    }
  });

  /* ============================================================
     CALCULATOR MODULE
  ============================================================ */
  let calcTab = 'infogain';

  function renderCalc() {
    resultsEl.innerHTML = '';
    const nav = el('div', { class: 'calc-nav' }, [
      calcTabBtn('infogain', 'Information Gain / Entropie'),
      calcTabBtn('kmeans', 'K-Means Clustering'),
      calcTabBtn('assoc', 'Assoziationsregeln'),
    ]);
    resultsEl.appendChild(nav);
    const panelHost = el('div', { id: 'panelHost' }, []);
    resultsEl.appendChild(panelHost);
    if (calcTab === 'infogain') renderInfoGain(panelHost);
    if (calcTab === 'kmeans') renderKMeans(panelHost);
    if (calcTab === 'assoc') renderAssoc(panelHost);
  }
  function calcTabBtn(id, label) {
    const b = el('button', { class: 'calc-tab' + (calcTab === id ? ' active' : ''), onclick: () => { calcTab = id; renderCalc(); } }, []);
    b.textContent = label;
    return b;
  }

  /* ============================================================
     SHARED DATASET (used by Info Gain "aus Datensatz" + Assoziationsregeln "aus Datensatz")
  ============================================================ */
  const datasetState = {
    columns: ['Outlook', 'Temp', 'Humidity', 'Windy', 'Play'],
    rows: [
      ['Sunny','Hot','High','False','No'],
      ['Sunny','Hot','High','True','No'],
      ['Overcast','Hot','High','False','Yes'],
      ['Rainy','Mild','High','False','Yes'],
      ['Rainy','Cool','Normal','False','Yes'],
      ['Rainy','Cool','Normal','True','No'],
      ['Overcast','Cool','Normal','True','Yes'],
      ['Sunny','Mild','High','False','No'],
      ['Sunny','Cool','Normal','False','Yes'],
      ['Rainy','Mild','Normal','False','Yes'],
      ['Sunny','Mild','Normal','True','Yes'],
      ['Overcast','Mild','High','True','Yes'],
      ['Overcast','Hot','Normal','False','Yes'],
      ['Rainy','Mild','High','True','No'],
    ],
  };

  function colValues(colIdx) {
    return [...new Set(datasetState.rows.map(r => r[colIdx]))];
  }

  // Renders the shared dataset editor (table + CSV paste). Calls onChange() after any edit.
  function renderDatasetEditor(host, onChange) {
    const wrap = document.createElement('div');
    wrap.className = 'subsection';
    wrap.appendChild(Object.assign(document.createElement('h3'), { textContent: 'Datensatz (Rohdaten wie im Übungsblatt / in der Klausur)' }));
    const hint = document.createElement('div');
    hint.className = 'desc';
    hint.textContent = 'Wähle unten explizit, welche Spalte die Klasse bzw. Bedingung ist. Zellen direkt anklicken & bearbeiten, oder komplette Tabelle per CSV/Tab einfügen.';
    wrap.appendChild(hint);

    const scroll = document.createElement('div'); scroll.className = 'dataset-scroll';
    const table = document.createElement('table'); table.className = 'dataset-table';
    scroll.appendChild(table);

    function renderTable() {
      table.innerHTML = '';
      const headRow = document.createElement('tr');
      headRow.appendChild(document.createElement('th')); // corner (row buttons column)
      datasetState.columns.forEach((c, ci) => {
        const th = document.createElement('th');
        const inp = document.createElement('input'); inp.type = 'text'; inp.value = c;
        inp.addEventListener('change', () => { datasetState.columns[ci] = inp.value; onChange(); });
        th.appendChild(inp);
        const rm = document.createElement('button');
        rm.textContent = '✕'; rm.style.cssText = 'border:none;background:transparent;color:var(--warn);cursor:pointer;margin-left:2px;';
        rm.addEventListener('click', () => {
          datasetState.columns.splice(ci, 1);
          datasetState.rows.forEach(r => r.splice(ci, 1));
          renderTable(); onChange();
        });
        th.appendChild(rm);
        headRow.appendChild(th);
      });
      const addColTh = document.createElement('th'); addColTh.className = 'colbtn';
      const addColBtn = document.createElement('button'); addColBtn.textContent = '+ Spalte';
      addColBtn.style.cssText = 'color:var(--accent);border:none;background:transparent;cursor:pointer;font-family:monospace;font-size:11px;';
      addColBtn.addEventListener('click', () => {

  /* ---------- INFO GAIN CALCULATOR ---------- */
  const igState = {
    classNames: ['Yes', 'No'],
    total: [9, 5],
    branches: [
      { name: 'Sunny', counts: [2, 3] },
      { name: 'Overcast', counts: [4, 0] },
      { name: 'Rainy', counts: [3, 2] },
    ],
  };
  let igMode = 'dataset'; // 'dataset' | 'manual'
  const igDatasetChoice = { classCol: null, splitCol: null };

  function renderInfoGain(host) {
    const modeRow = document.createElement('div'); modeRow.className = 'mode-toggle';
    const btnDs = document.createElement('button'); btnDs.className = 'mode-btn' + (igMode==='dataset'?' active':''); btnDs.textContent = '📋 Aus Datensatz berechnen';
    btnDs.addEventListener('click', () => { igMode = 'dataset'; renderCalc(); });
    const btnManual = document.createElement('button'); btnManual.className = 'mode-btn' + (igMode==='manual'?' active':''); btnManual.textContent = '✎ Manuelle Zahlen-Eingabe';
    btnManual.addEventListener('click', () => { igMode = 'manual'; renderCalc(); });
    modeRow.appendChild(btnDs); modeRow.appendChild(btnManual);
    host.appendChild(modeRow);

    if (igMode === 'dataset') { renderInfoGainFromDataset(host); return; }

  }

  function renderInfoGainFromDataset(host) {
    const panel = document.createElement('div'); panel.className = 'panel';
    panel.appendChild(Object.assign(document.createElement('h2'), { textContent: 'Information Gain — aus Datensatz' }));
    const desc = document.createElement('div'); desc.className = 'desc';
    desc.textContent = 'Bearbeite den Datensatz unten (beliebige Spalten/Zeilen/Werte), wähle dann Klassenspalte und Split-Attribut. Entropie & Gain werden automatisch aus den Rohdaten ausgezählt.';
    panel.appendChild(desc);

    const pickRow = document.createElement('div'); pickRow.className = 'field-row';
    const classLab = document.createElement('label'); classLab.textContent = 'Klassenspalte:';
    pickRow.appendChild(classLab);
    const classSel = document.createElement('select');
    const splitLab = document.createElement('label'); splitLab.textContent = 'Split-Attribut:';
    const splitSel = document.createElement('select');

    function fillSelects() {
      classSel.innerHTML = ''; splitSel.innerHTML = '';
      datasetState.columns.forEach((c, i) => {
        const o1 = document.createElement('option'); o1.value = i; o1.textContent = c; classSel.appendChild(o1);
        const o2 = document.createElement('option'); o2.value = i; o2.textContent = c; splitSel.appendChild(o2);
      });
      // defaults: last column = class, first column = split
      const defClass = igDatasetChoice.classCol !== null && igDatasetChoice.classCol < datasetState.columns.length ? igDatasetChoice.classCol : datasetState.columns.length - 1;
      const defSplit = igDatasetChoice.splitCol !== null && igDatasetChoice.splitCol < datasetState.columns.length ? igDatasetChoice.splitCol : 0;
      classSel.value = defClass; splitSel.value = defSplit;
      igDatasetChoice.classCol = defClass; igDatasetChoice.splitCol = defSplit;
    }
    fillSelects();
    classSel.addEventListener('change', () => { igDatasetChoice.classCol = parseInt(classSel.value); computeFromDataset(); });
    splitSel.addEventListener('change', () => { igDatasetChoice.splitCol = parseInt(splitSel.value); computeFromDataset(); });
    pickRow.appendChild(classSel); pickRow.appendChild(splitLab); pickRow.appendChild(splitSel);
    panel.appendChild(pickRow);

    const compareBtn = document.createElement('button'); compareBtn.className = 'btn secondary';
    compareBtn.textContent = '⇄ Alle Attribute vergleichen (bestes Attribut finden)';
    compareBtn.style.marginBottom = '10px';
    panel.appendChild(compareBtn);

    const resultBox = document.createElement('div'); resultBox.className = 'result-box';
    panel.appendChild(resultBox);
    const compareBox = document.createElement('div'); compareBox.className = 'result-box hidden'; compareBox.style.marginTop = '10px';
    panel.appendChild(compareBox);

    function gainForAttribute(classCol, splitCol) {
      const classVals = colValues(classCol);
      const totalCounts = classVals.map(cv => datasetState.rows.filter(r => r[classCol] === cv).length);
      const N = totalCounts.reduce((a,b)=>a+b,0);
      const infoD = entropyOf(totalCounts);
      const branchVals = colValues(splitCol);
      let weighted = 0;
      const branchDetails = branchVals.map(bv => {
        const subset = datasetState.rows.filter(r => r[splitCol] === bv);
        const counts = classVals.map(cv => subset.filter(r => r[classCol] === cv).length);
        const n = counts.reduce((a,b)=>a+b,0);
        const e = entropyOf(counts);
        const w = N>0 ? n/N : 0;
        weighted += w*e;
        return { name: bv, counts, n, e, w };
      });
      const gain = infoD - weighted;
      return { classVals, totalCounts, N, infoD, branchDetails, weighted, gain };
    }

    function computeFromDataset() {
      const classCol = igDatasetChoice.classCol, splitCol = igDatasetChoice.splitCol;
      if (classCol === splitCol) {
        resultBox.innerHTML = '<div class="formula">Klassenspalte und Split-Attribut müssen unterschiedlich sein.</div>';
        return;
      }
      const r = gainForAttribute(classCol, splitCol);
      let html = '<div class="hi">Info(D) = entropy(' + r.classVals.map((cv,i)=>cv+':'+r.totalCounts[i]+'/'+r.N).join(', ') + ') = ' + fmt(r.infoD) + ' bits</div>';
      html += '<div class="formula">N = ' + r.N + ' Instanzen, Klassenspalte = "' + escapeHtml(datasetState.columns[classCol]) + '"</div><div style="height:8px"></div>';
      r.branchDetails.forEach(b => {
        html += '<div>' + escapeHtml(datasetState.columns[splitCol]) + '=' + escapeHtml(b.name) + ': Info(' + b.counts.join(',') + ') = ' + fmt(b.e) + ' bits <span class="formula">(n=' + b.n + ', Gewicht=' + fmt(b.w,3) + ')</span></div>';
      });
      html += '<div style="height:8px"></div>';
      html += '<div class="hi">Gewichteter Durchschnitt = ' + fmt(r.weighted) + ' bits</div>';
      html += '<div class="hi" style="color:var(--good)">Gain("' + escapeHtml(datasetState.columns[splitCol]) + '") = ' + fmt(r.infoD) + ' − ' + fmt(r.weighted) + ' = ' + fmt(r.gain) + ' bits</div>';
      resultBox.innerHTML = html;
    }

    compareBtn.addEventListener('click', () => {
      const classCol = igDatasetChoice.classCol;
      const others = datasetState.columns.map((c,i)=>i).filter(i => i !== classCol);
      const rows = others.map(i => {
        const r = gainForAttribute(classCol, i);
        return { name: datasetState.columns[i], gain: r.gain };
      }).sort((a,b) => b.gain - a.gain);
      let html = '<div class="hi">Gain-Vergleich (Klasse = "' + escapeHtml(datasetState.columns[classCol]) + '")</div>';
      rows.forEach((r,idx) => {
        html += '<div>' + (idx===0 ? '🏆 ' : '　') + escapeHtml(r.name) + ': <b>' + fmt(r.gain) + ' bits</b></div>';
      });
      html += '<div class="formula" style="margin-top:6px">→ höchster Gain = bestes Split-Attribut an dieser Stelle im Baum.</div>';
      compareBox.innerHTML = html;
      compareBox.classList.remove('hidden');
    });

    renderDatasetEditor(panel, () => { fillSelects(); computeFromDataset(); });
    computeFromDataset();
    host.appendChild(panel);
  }

  function renderInfoGainManual(host) {
    const panel = el('div', { class: 'panel' }, []);
    panel.appendChild(el('h2', {}, []).also ? null : (() => { const h = document.createElement('h2'); h.textContent = 'Information Gain / Entropie — manuelle Eingabe'; return h; })());
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = 'Für den Fall, dass die Klausur dir nur aggregierte Zahlen gibt (kein Roh-Datensatz): trage Klassenverteilung des Gesamtdatensatzes und je Attributwert (Branch) direkt ein.';
    panel.appendChild(desc);

    // classes editor
    const classRow = document.createElement('div');
    classRow.className = 'field-row';
    const classLabel = document.createElement('label'); classLabel.textContent = 'Klassen:';
    classRow.appendChild(classLabel);
    const classInput = document.createElement('input');
    classInput.type = 'text'; classInput.className = 'wide';
    classInput.value = igState.classNames.join(', ');
    classInput.addEventListener('change', () => {
      const names = classInput.value.split(',').map(s => s.trim()).filter(Boolean);
      if (names.length < 2) return;
      const oldLen = igState.classNames.length;
      igState.classNames = names;
      // adjust counts arrays length
      function adjust(arr) {
        while (arr.length < names.length) arr.push(0);
        while (arr.length > names.length) arr.pop();
      }
      adjust(igState.total);
      igState.branches.forEach(b => adjust(b.counts));
      renderCalc();
    });
    classRow.appendChild(classInput);
    const classHint = document.createElement('span');
    classHint.style.cssText = 'font-family:-apple-system,sans-serif;font-size:11.5px;color:var(--ink-soft)';
    classHint.textContent = '(Komma-getrennt, z.B. "Yes, No")';
    classRow.appendChild(classHint);
    panel.appendChild(classRow);

    // total distribution
    const sub1 = document.createElement('div');
    sub1.className = 'subsection';
    const h3a = document.createElement('h3'); h3a.textContent = 'Gesamtdatensatz  Info(D)';
    sub1.appendChild(h3a);
    const totalRow = document.createElement('div'); totalRow.className = 'field-row';

    });
    sub1.appendChild(totalRow);
    panel.appendChild(sub1);

    // branches
    const sub2 = document.createElement('div');
    sub2.className = 'subsection';
    const h3b = document.createElement('h3'); h3b.textContent = 'Attribut-Aufteilung (Branches)';
    sub2.appendChild(h3b);
    const branchHost = document.createElement('div');
    sub2.appendChild(branchHost);
    function renderBranches() {
      branchHost.innerHTML = '';
      igState.branches.forEach((b, bi) => {
        const block = document.createElement('div');
        block.className = 'branch-block';
        const head = document.createElement('div'); head.className = 'branch-head';
        const nameInp = document.createElement('input');
        nameInp.type = 'text'; nameInp.value = b.name;
        nameInp.addEventListener('input', () => { b.name = nameInp.value; });
        head.appendChild(nameInp);
        const rmBtn = document.createElement('button');
        rmBtn.className = 'btn danger'; rmBtn.textContent = '− entfernen';
        rmBtn.addEventListener('click', () => { igState.branches.splice(bi, 1); renderBranches(); updateResults(); });
        head.appendChild(rmBtn);
        block.appendChild(head);

        const row = document.createElement('div'); row.className = 'field-row';
        igState.classNames.forEach((cn, ci) => {
          const lab = document.createElement('label'); lab.textContent = cn + ':';
          row.appendChild(lab);
          const inp = document.createElement('input');
          inp.type = 'number'; inp.min = '0'; inp.value = b.counts[ci] || 0;
          inp.addEventListener('input', () => { b.counts[ci] = parseFloat(inp.value) || 0; updateResults(); });
          row.appendChild(inp);
        });
        block.appendChild(row);
        branchHost.appendChild(block);
      });
    }
    renderBranches();
    const addBranchBtn = document.createElement('button');
    addBranchBtn.className = 'btn secondary'; addBranchBtn.textContent = '+ Branch hinzufügen';
    addBranchBtn.style.marginTop = '6px';
    addBranchBtn.addEventListener('click', () => {
      igState.branches.push({ name: 'Neu', counts: igState.classNames.map(() => 0) });
      renderBranches(); updateResults();
    });
    sub2.appendChild(addBranchBtn);
    panel.appendChild(sub2);

    // results
    const resultBox = document.createElement('div');
    resultBox.className = 'result-box';
    resultBox.id = 'igResults';
    panel.appendChild(resultBox);

    function updateResults() {
      const N = igState.total.reduce((a,b)=>a+b,0);
      const infoD = entropyOf(igState.total);
      let lines = [];
      lines.push('<div class="hi">Info(D) = entropy(' + igState.total.map((c,i)=>c+'/'+N).join(', ') + ') = ' + fmt(infoD) + ' bits</div>');
      lines.push('<div class="formula">Gesamtzahl Instanzen N = ' + N + '</div>');
      lines.push('<div style="height:8px"></div>');

      let weighted = 0;
      const branchLines = igState.branches.map(b => {
        const n = b.counts.reduce((a,c)=>a+c,0);
        const e = entropyOf(b.counts);
        const w = N > 0 ? n / N : 0;
        weighted += w * e;
        return '<div>' + escapeHtml(b.name) + ': Info(' + b.counts.join(',') + ') = entropy(' + b.counts.map(c => n>0?fmt(c/n,2):'0').join(', ') + ') = <b>' + fmt(e) + ' bits</b>  <span class="formula">(n=' + n + ', Gewicht=' + fmt(w,3) + ')</span></div>';
      });
      lines = lines.concat(branchLines);
      lines.push('<div style="height:8px"></div>');
      lines.push('<div class="hi">Gewichteter Durchschnitt Info(D, Attribut) = ' + fmt(weighted) + ' bits</div>');
      const gain = infoD - weighted;
      lines.push('<div class="hi" style="color:var(--good)">Gain = Info(D) − Info(D,Attribut) = ' + fmt(infoD) + ' − ' + fmt(weighted) + ' = ' + fmt(gain) + ' bits</div>');

      resultBox.innerHTML = lines.join('');
    }
    updateResults();
    host.appendChild(panel);
  }

  /* ---------- K-MEANS CALCULATOR (N-dimensional, Euclidean or Manhattan) ---------- */
  const kmState = {
    dims: ['local', 'international'],
    points: [
      [2,2],[1,2],[1,3],[3,2],[4,5],[4,4],[5,5],[6,5]
    ],
    centroids: [ [1,1], [3,4] ],
    metric: 'euclidean', // 'euclidean' | 'manhattan'
    history: [],
  };

  function distND(a, b, metric) {
    if (metric === 'manhattan') {
      return a.reduce((s,v,i) => s + Math.abs(v - b[i]), 0);
    }
    return Math.sqrt(a.reduce((s,v,i) => s + (v-b[i])*(v-b[i]), 0));
  }

  function renderKMeans(host) {
    const panel = document.createElement('div'); panel.className = 'panel';

      kmState.dims = names;
      function adjust(arr) { while (arr.length < names.length) arr.push(0); while (arr.length > names.length) arr.pop(); }

    dimRow.appendChild(dimInput);

    runBtn.addEventListener('click', () => { runIteration(); renderResults(); });
    actionsRow.appendChild(runBtn);

    resetBtn.addEventListener('click', () => { kmState.history = []; renderResults(); });
    actionsRow.appendChild(resetBtn);
    panel.appendChild(actionsRow);

    const resultsHost = document.createElement('div'); resultsHost.id = 'kmResults';
    panel.appendChild(resultsHost);

    function runIteration() {
      const distances = kmState.points.map(p => kmState.centroids.map(c => distND(p,c,kmState.metric)));
      const assignments = distances.map(dArr => dArr.indexOf(Math.min(...dArr)));
      const newCentroids = kmState.centroids.map((c, ci) => {
        const members = kmState.points.filter((p,i) => assignments[i] === ci);
        if (members.length === 0) return c.slice();
        return kmState.dims.map((d, di) => members.reduce((a,p)=>a+p[di],0) / members.length);
      });
      kmState.history.push({
        centroidsBefore: kmState.centroids.map(c=>c.slice()),
        distances, assignments,
        centroidsAfter: newCentroids.map(c=>c.slice()),
      });
      kmState.centroids = newCentroids.map(c => c.slice());
      renderCentroids();
    }

    function renderResults() {
      resultsHost.innerHTML = '';
      if (kmState.history.length === 0) {
        resultsHost.innerHTML = '<div class="empty-state"><p>Noch keine Iteration berechnet.</p></div>';
        return;
      }
      const metricLabel = kmState.metric === 'manhattan' ? 'Manhattan' : 'Euclidean';
      kmState.history.forEach((h, hi) => {
        const box = document.createElement('div'); box.className = 'result-box';
        let html = '<div class="hi">Iteration ' + (hi+1) + ' <span class="formula">(' + metricLabel + '-Distanz)</span></div>';
        html += '<div class="formula">Zentroide zu Beginn: ' + h.centroidsBefore.map((c,i)=>'C'+(i+1)+'=('+c.map(v=>fmt(v,2)).join(', ')+')').join('  ') + '</div>';
        html += '<table class="calc-table" style="margin-top:8px"><tr><th>Punkt</th>' + h.centroidsBefore.map((c,i)=>'<th>Dist. C'+(i+1)+'</th>').join('') + '<th>Zuordnung</th></tr>';
        kmState.points.forEach((p, pi) => {
          if (!h.distances[pi]) return;
          html += '<tr><td>P'+(pi+1)+' ('+p.join(',')+')</td>' + h.distances[pi].map(d => '<td>'+fmt(d,3)+'</td>').join('') + '<td><b>C'+(h.assignments[pi]+1)+'</b></td></tr>';
        });
        html += '</table>';
        html += '<div class="formula" style="margin-top:8px">Neue Zentroide (Mittelwert je Cluster):</div>';
        html += '<div class="hi">' + h.centroidsAfter.map((c,i)=>'C'+(i+1)+' = ('+c.map(v=>fmt(v,3)).join(', ')+')').join('   ') + '</div>';
        box.innerHTML = html;
        resultsHost.appendChild(box);
      });
      const lastAssign = kmState.history[kmState.history.length-1].assignments;
      const prevAssign = kmState.history.length > 1 ? kmState.history[kmState.history.length-2].assignments : null;
      if (prevAssign && JSON.stringify(prevAssign) === JSON.stringify(lastAssign)) {
        const stable = document.createElement('div'); stable.className='result-box';
        stable.innerHTML = '<div class="hi" style="color:var(--good)">✓ Stabil — keine Instanz wechselt mehr den Cluster. Fertig.</div>';
        resultsHost.appendChild(stable);
      }
    }
    renderResults();
    host.appendChild(panel);
  }

  /* ---------- ASSOCIATION RULES CALCULATOR ---------- */
  const assocState = {
    rules: [
      { label: 'Regel 1', N: 14, countX: 5, countXY: 2, countY: 9, desc: 'IF Outlook="Sunny" THEN Play="Yes"' },
      { label: 'Regel 2', N: 14, countX: 4, countXY: 2, countY: 9, desc: 'IF Humidity="High" AND Temp="Mild" THEN Play="Yes"' },
    ],
  };
  let assocMode = 'dataset'; // 'dataset' | 'manual'
  const assocBuilder = {
    rules: [
      { label: 'Regel 1', antecedent: [{col:0, val:null}], consequent: {col:4, val:null} },
      { label: 'Regel 2', antecedent: [{col:2, val:null},{col:1, val:null}], consequent: {col:4, val:null} },
    ],
  };

  function renderAssoc(host) {
    const modeRow = document.createElement('div'); modeRow.className = 'mode-toggle';
    const btnDs = document.createElement('button'); btnDs.className = 'mode-btn' + (assocMode==='dataset'?' active':''); btnDs.textContent = '📋 Aus Datensatz berechnen';
    btnDs.addEventListener('click', () => { assocMode = 'dataset'; renderCalc(); });
    const btnManual = document.createElement('button'); btnManual.className = 'mode-btn' + (assocMode==='manual'?' active':''); btnManual.textContent = '✎ Manuelle Zahlen-Eingabe';
    btnManual.addEventListener('click', () => { assocMode = 'manual'; renderCalc(); });
    modeRow.appendChild(btnDs); modeRow.appendChild(btnManual);
    host.appendChild(modeRow);

    if (assocMode === 'dataset') { renderAssocFromDataset(host); return; }
    renderAssocManual(host);
  }

  function renderAssocFromDataset(host) {
    const panel = document.createElement('div'); panel.className = 'panel';
    panel.appendChild(Object.assign(document.createElement('h2'), { textContent: 'Assoziationsregeln — aus Datensatz' }));
    const desc = document.createElement('div'); desc.className = 'desc';
    desc.innerHTML = 'Baue eine Regel: IF (Bedingung UND Bedingung ...) THEN (Bedingung) — |X|, |X∩Y|, |Y| und N werden automatisch aus dem Datensatz unten ausgezählt.';
    panel.appendChild(desc);

    const rulesHost = document.createElement('div');
    panel.appendChild(rulesHost);

    function condRow(cond, onDel, container) {
      const row = document.createElement('div'); row.className = 'cond-row';
      const colSel = document.createElement('select');
      datasetState.columns.forEach((c,ci) => { const o=document.createElement('option'); o.value=ci; o.textContent=c; colSel.appendChild(o); });
      colSel.value = cond.col !== null && cond.col < datasetState.columns.length ? cond.col : 0;
      cond.col = parseInt(colSel.value);
      const valSel = document.createElement('select');
      function fillVals() {
        valSel.innerHTML = '';
        colValues(cond.col).forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; valSel.appendChild(o); });
        if (cond.val === null || !colValues(cond.col).includes(cond.val)) cond.val = colValues(cond.col)[0];
        valSel.value = cond.val;
      }
      fillVals();
      colSel.addEventListener('change', () => { cond.col = parseInt(colSel.value); cond.val = null; fillVals(); computeAll(); });
      valSel.addEventListener('change', () => { cond.val = valSel.value; computeAll(); });
      row.appendChild(colSel); row.appendChild(document.createElement('span')).textContent = '=';
      row.appendChild(valSel);
      if (onDel) {
        const rm = document.createElement('button'); rm.textContent='✕'; rm.style.cssText='border:none;background:transparent;color:var(--warn);cursor:pointer;';
        rm.addEventListener('click', () => { onDel(); });
        row.appendChild(rm);
      }
      return row;
    }

    function renderRules() {
      rulesHost.innerHTML = '';
      assocBuilder.rules.forEach((r, ri) => {
        const card = document.createElement('div'); card.className = 'rule-card';
        const head = document.createElement('div'); head.className = 'rule-head';
        const nameInp = document.createElement('input'); nameInp.type='text'; nameInp.className='wide'; nameInp.value=r.label;
        nameInp.addEventListener('input', () => { r.label = nameInp.value; });
        head.appendChild(nameInp);
        const rmBtn = document.createElement('button'); rmBtn.className='btn danger'; rmBtn.textContent='− Regel entfernen';
        rmBtn.addEventListener('click', () => { assocBuilder.rules.splice(ri,1); renderRules(); });
        head.appendChild(rmBtn);
        card.appendChild(head);

        const ifLab = document.createElement('div');
        ifLab.style.cssText = 'font-family:monospace;font-size:11.5px;color:var(--ink-soft);margin-bottom:4px;';
        ifLab.textContent = 'WENN (Antezedent X) — alle Bedingungen mit UND verknüpft:';
        card.appendChild(ifLab);
        const antHost = document.createElement('div');
        function renderAnt() {
          antHost.innerHTML = '';
          r.antecedent.forEach((cond, ci) => {
            antHost.appendChild(condRow(cond, r.antecedent.length > 1 ? () => { r.antecedent.splice(ci,1); renderAnt(); computeAll(); } : null));
          });
        }
        renderAnt();
        card.appendChild(antHost);
        const addCondBtn = document.createElement('button'); addCondBtn.className='btn ghost'; addCondBtn.textContent='+ UND-Bedingung';
        addCondBtn.style.cssText += 'margin-bottom:10px;font-size:11px;padding:5px 10px;';
        addCondBtn.addEventListener('click', () => { r.antecedent.push({col:0,val:null}); renderAnt(); computeAll(); });
        card.appendChild(addCondBtn);

        const thenLab = document.createElement('div');
        thenLab.style.cssText = 'font-family:monospace;font-size:11.5px;color:var(--ink-soft);margin:8px 0 4px;';
        thenLab.textContent = 'DANN (Konsequent Y):';
        card.appendChild(thenLab);
        const conHost = document.createElement('div');
        function renderCon() { conHost.innerHTML = ''; conHost.appendChild(condRow(r.consequent, null)); }
        renderCon();
        card.appendChild(conHost);

        const resultBox = document.createElement('div'); resultBox.className='result-box'; resultBox.style.marginTop='10px';
        card.appendChild(resultBox);
        r._updateResult = function() {
          const N = datasetState.rows.length;
          const matchAnt = row => r.antecedent.every(c => row[c.col] === c.val);
          const matchCon = row => row[r.consequent.col] === r.consequent.val;
          const countX = datasetState.rows.filter(matchAnt).length;
          const countXY = datasetState.rows.filter(row => matchAnt(row) && matchCon(row)).length;
          const countY = datasetState.rows.filter(matchCon).length;
          const support = N>0 ? countXY/N : 0;
          const confidence = countX>0 ? countXY/countX : 0;
          const pY = N>0 ? countY/N : 0;
          const lift = pY>0 ? confidence/pY : 0;
          const ruleText = 'IF ' + r.antecedent.map(c => escapeHtml(datasetState.columns[c.col])+'="'+escapeHtml(c.val)+'"').join(' AND ') + ' THEN ' + escapeHtml(datasetState.columns[r.consequent.col])+'="'+escapeHtml(r.consequent.val)+'"';
          resultBox.innerHTML =
            '<div class="formula">' + ruleText + '</div><div style="height:6px"></div>' +
            '<div class="formula">N=' + N + ', |X|=' + countX + ', |X∩Y|=' + countXY + ', |Y|=' + countY + '</div>' +
            '<div class="hi">Support = ' + countXY + '/' + N + ' = ' + fmt(support*100,1) + '%</div>' +
            '<div class="hi">Confidence = ' + countXY + '/' + countX + ' = ' + fmt(confidence*100,1) + '%</div>' +
            '<div class="hi" style="color:' + (lift>1?'var(--good)':(lift<1?'var(--warn)':'var(--navy)')) + '">Lift = ' + fmt(confidence,3) + ' / ' + fmt(pY,3) + ' = ' + fmt(lift,3) + '</div>' +
            '<div class="formula">' + (lift>1 ? '→ Lift > 1: positive Assoziation' : lift<1 ? '→ Lift < 1: negative Assoziation' : '→ Lift = 1: unabhängig') + '</div>';
        };
        r._updateResult();
        rulesHost.appendChild(card);
      });
    }
    function computeAll() { assocBuilder.rules.forEach(r => r._updateResult && r._updateResult()); }
    renderRules();

    const addBtn = document.createElement('button'); addBtn.className='btn secondary'; addBtn.textContent='+ Neue Regel';
    addBtn.style.marginTop='6px';
    addBtn.addEventListener('click', () => {
      assocBuilder.rules.push({ label: 'Regel ' + (assocBuilder.rules.length+1), antecedent: [{col:0,val:null}], consequent: {col:datasetState.columns.length-1,val:null} });
      renderRules();
    });
    panel.appendChild(addBtn);

    renderDatasetEditor(panel, () => { renderRules(); });
    host.appendChild(panel);
  }

  function renderAssocManual(host) {
    const panel = document.createElement('div'); panel.className = 'panel';
    const h2 = document.createElement('h2'); h2.textContent = 'Assoziationsregeln — manuelle Eingabe'; panel.appendChild(h2);
    const desc = document.createElement('div'); desc.className = 'desc';
    desc.innerHTML = 'Für den Fall, dass die Klausur dir nur aggregierte Zahlen gibt (kein Roh-Datensatz): Support(X→Y) = |X∩Y| / N &nbsp;&middot;&nbsp; Confidence(X→Y) = |X∩Y| / |X| &nbsp;&middot;&nbsp; Lift(X→Y) = Confidence / (|Y| / N).';
    panel.appendChild(desc);

    const rulesHost = document.createElement('div');
    panel.appendChild(rulesHost);

    function renderRules() {
      rulesHost.innerHTML = '';
      assocState.rules.forEach((r, ri) => {
        const card = document.createElement('div'); card.className = 'rule-card';
        const head = document.createElement('div'); head.className = 'rule-head';
        const nameInp = document.createElement('input'); nameInp.type='text'; nameInp.className='wide'; nameInp.value = r.label;
        nameInp.addEventListener('input', () => { r.label = nameInp.value; });
        head.appendChild(nameInp);
        const rmBtn = document.createElement('button'); rmBtn.className='btn danger'; rmBtn.textContent='− Regel entfernen';
        rmBtn.addEventListener('click', () => { assocState.rules.splice(ri,1); renderRules(); });
        head.appendChild(rmBtn);
        card.appendChild(head);

        const descRow = document.createElement('div'); descRow.className='field-row';
        const descLab = document.createElement('label'); descLab.textContent='Regeltext:';
        descRow.appendChild(descLab);
        const descInp = document.createElement('input'); descInp.type='text'; descInp.className='wide'; descInp.style.width='420px'; descInp.value = r.desc;
        descInp.addEventListener('input', () => { r.desc = descInp.value; updateOne(); });
        descRow.appendChild(descInp);
        card.appendChild(descRow);

        const fieldsRow = document.createElement('div'); fieldsRow.className='field-row';
        function mkField(labelText, key) {
          const lab = document.createElement('label'); lab.textContent = labelText;
          fieldsRow.appendChild(lab);
          const inp = document.createElement('input'); inp.type='number'; inp.min='0'; inp.value = r[key];
          inp.addEventListener('input', () => { r[key] = parseFloat(inp.value)||0; updateOne(); });
          fieldsRow.appendChild(inp);
        }
        mkField('N (gesamt):', 'N');
        mkField('|X| (Antezedent):', 'countX');
        mkField('|X∩Y| (beide):', 'countXY');
        mkField('|Y| (Konsequent):', 'countY');
        card.appendChild(fieldsRow);

        const resultBox = document.createElement('div'); resultBox.className='result-box';
        card.appendChild(resultBox);

        function updateOne() {
          const support = r.N > 0 ? r.countXY / r.N : 0;
          const confidence = r.countX > 0 ? r.countXY / r.countX : 0;
          const pY = r.N > 0 ? r.countY / r.N : 0;
          const lift = pY > 0 ? confidence / pY : 0;
          resultBox.innerHTML =
            '<div class="formula">' + escapeHtml(r.desc) + '</div>' +
            '<div style="height:6px"></div>' +
            '<div class="hi">Support = ' + r.countXY + '/' + r.N + ' = ' + fmt(support*100,1) + '%</div>' +
            '<div class="hi">Confidence = ' + r.countXY + '/' + r.countX + ' = ' + fmt(confidence*100,1) + '%</div>' +
            '<div class="formula">P(Y) = ' + r.countY + '/' + r.N + ' = ' + fmt(pY*100,1) + '%</div>' +
            '<div class="hi" style="color:' + (lift>1?'var(--good)':(lift<1?'var(--warn)':'var(--navy)')) + '">Lift = ' + fmt(confidence,3) + ' / ' + fmt(pY,3) + ' = ' + fmt(lift,3) + '</div>' +
            '<div class="formula">' + (lift>1 ? '→ Lift > 1: positive Assoziation' : lift<1 ? '→ Lift < 1: negative Assoziation' : '→ Lift = 1: unabhängig') + '</div>';
        }
        updateOne();
        rulesHost.appendChild(card);
      });
    }
    renderRules();

    const addBtn = document.createElement('button'); addBtn.className='btn secondary'; addBtn.textContent='+ Neue Regel';
    addBtn.style.marginTop='6px';
    addBtn.addEventListener('click', () => {
      assocState.rules.push({ label: 'Regel ' + (assocState.rules.length+1), N: 14, countX: 1, countXY: 1, countY: 9, desc: '' });
      renderRules();
    });
    panel.appendChild(addBtn);

    host.appendChild(panel);
  }

  /* ============================================================
     INIT
  ============================================================ */
  showEmptyState();
})();
</script>
</body>
