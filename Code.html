, in R, use lmridge).\n                                                            @ Zhongyun (Phil) Zhou"}, {"id": 75, "deck": "S2 - Overview", "page": 80, "title": "Example: Using Residuals for Interaction Terms to Avoid Collinearity", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 76, "deck": "S2 - Overview", "page": 81, "title": "Heteroscedasticity", "body": "• The variability of a variable is\n  unequal across the range of\n  values of a second variable\n  that predicts it.\n                                              @ Zhongyun (Phil) Zhou"}, {"id": 77, "deck": "S2 - Overview", "page": 82, "title": "Eg., Age vs. Income", "body": "• Teen workers earn close\n  to the minimum wage\n• The annual income gap\n  increases with age, when\n  education, experience,\n  and the industry you are\n  in play a bigger role.\n                                             @ Zhongyun (Phil) Zhou"}, {"id": 78, "deck": "S2 - Overview", "page": 83, "title": "Other Examples of Heteroscedasticity", "body": "• Income vs. expenditure on food\n  – A richer person may buy inexpensive food or expensive food; while a\n    poor person can only afford inexpensive food\n• Height vs. Weight\n  – The difference of weight is larger among tall people than among\n    short people, because shorter people weigh less\n• Study time vs. grade\n  – Study one hour per week --- D;\n  – Study two hours--- A, B, C\n                                                                      @ Zhongyun (Phil) Zhou"}, {"id": 79, "deck": "S2 - Overview", "page": 84, "title": "How to Account For Heteroscedasticity", "body": "• Use Logged data. For example, transform the variable\n  “income” to “LN(income)”.\n• Some other non-linear transformation of the variable.\n• Apply a weighted least squares estimation method\n                                                    @ Zhongyun (Phil) Zhou"}, {"id": 80, "deck": "S2 - Overview", "page": 85, "title": "Normality", "body": "• Check whether the\n  variables (dependent,\n  independent variables)\n  are normally distributed\n                                         @ Zhongyun (Phil) Zhou"}, {"id": 81, "deck": "S2 - Overview", "page": 86, "title": "How to Deal With Skewed Data", "body": "• The data is probably not normally distributed if you see a very\n  big variance\n  – E.g., when studying consumer expenditure in Taobao.com, you find\n    that some spend in 10’s, some spend in 1000’s --- large variance\n  – Consumers’ annual income\n• Use transformation of the data:\n  – Logged data.\n     • For example, change “Expenditure” to “LN(Expenditure).\n  – Some other non-linear transformation of data\n                                                                 @ Zhongyun (Phil) Zhou"}, {"id": 82, "deck": "S2 - Overview", "page": 87, "title": "Missing Data and Outliers", "body": "• Missing data\n  – Delete those data\n  – If there is missing data for more than one variable, check whether\n    there is a “pattern”.\n     • Say, if for people who miss “occupation”, their “gender” is also missing, then\n       this might be caused by your sampling method.\n• Outliers\n  – Usually more than 3-standard deviation away\n  – Delete the outliers\n                                                                                 @ Zhongyun (Phil) Zhou"}, {"id": 83, "deck": "S2 - Overview", "page": 88, "title": "Other Issues", "body": "• Normalization of units\n  – Hours, days;\n  – 1000 dollar vs. 1 dollar\n• Normalization of scale\n  – Price of product in Taobao= a+ b*seller reputation\n  – Price: in electronics, TV sets can be $10000, but hair dryer can be $200.\n     • Can be normalized by the average price of TVs, and average price of hair dryers.\n     • That is, Normalized Price = Price/Avg Price.\n                                                                                @ Zhongyun (Phil) Zhou"}, {"id": 84, "deck": "S2 - Overview", "page": 89, "title": "Practice makes perfect", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 85, "deck": "S2 - Overview", "page": 90, "title": "Question I: Discuss", "body": "• It is found that high divorce rate is associated with high\n  crime rate.\n• Discuss whether it is a reasonable conclusion that high\n  divorce rate causes high crime rate;\n• Is there any other explanations that might lead to this\n  observation? Latent variables?\n                                                         @ Zhongyun (Phil) Zhou"}, {"id": 86, "deck": "S2 - Overview", "page": 91, "title": "Question II: LectureUse.xls", "body": "• Reproduce the regression or statistic test results using the first\n  5 data sheets.\n• For the “sales and traffic” data sheet, answer the following\n  questions:\n  – A retail company has both an offline and online channel. It wants to\n    examine how the traffic to their online store and offline store affect\n    its sales. Plot a picture to see the trend of these three data series. Use\n    an regression to see the impact of traffic in each channel on the sales\n    of the company.\n                                                                         @ Zhongyun (Phil) Zhou"}, {"id": 87, "deck": "S2 - Overview", "page": 92, "title": "Question III: Answer the Questions", "body": "• Revenue = 500 – 1.2* newspaper+3.56* Internet + 200*Holiday.\n                (0.53)          (0.02)           (0.015)\n       The dummy variable matrix is as following:\n       TV          Newspaper           Internet\n       1           0                   0\n       0           1                   0\n       0           0                   1\n• Is Internet advertising more effective in raising revenue than TV\n  commercial? By how much? Is it significant?\n• Is holiday a significant factor affecting the company’s revenue?\n                                                                      @ Zhongyun (Phil) Zhou"}, {"id": 88, "deck": "S2 - Overview", "page": 93, "title": "Missions of Regression", "body": "Identify important X’s\n • exclude “trivial” ones\nIdentify the direction (+/-) of X  Y relationship\n • Phil’s credit (+/-) stock income?\nEstimate the weights (relative importance) of X for predicting Y\n • A (80% salary + 20% stock) vs. B (20% salary + 80% stock): who has higher loan\n   repayment ability?\n                                                                                    @ Zhongyun (Phil) Zhou"}, {"id": 89, "deck": "S2 - Overview", "page": 94, "title": "Questionization Using Regression Way of Thinking", "body": "Table 1. Examples of Question-ization using Regression Way of Thinking\n                                                                                                                           Regression\n         Business Problem                                 Data-Analytic Question & Statement                                               Application Field\n                                                                                                                            Method\n                                     Question: How does advertising expenditure affect sales revenue?\nDetermining the impact of                                                                                               Simple Linear    Marketing\n                                     Statement: Build a linear regression model to quantify the relationship between ad\nadvertising spending on sales                                                                                           Regression       Optimization\n                                     spending and sales performance.\n                                     Question: Which factors (e.g., revenue, customer base) significantly influence\nIdentifying reasons for unmet annual profit margins?                                                                   Multiple Linear   Performance\nprofit targets                       Statement: Conduct multivariate regression to identify gaps between actual and    Regression        Management\n                                     target profit drivers.\n                                     Question: What behavioral indicators predict customer attrition?\nPredicting customer churn risks      Statement: Develop a logistic regression model using usage frequency, complaints, Logistic Regression Customer Retention\n                                     and service engagement to estimate churn probability.\n                                     Question: How does non-linear pricing affect demand elasticity?\nOptimizing product pricing                                                                                             Polynomial\n                                     Statement: Fit polynomial regression to identify profit-maximizing price points                     Pricing Strategy\nstrategies                                                                                                             Regression\n                                     while avoiding overpricing.\n                                     Question: Do discounts and campaign duration generate incremental sales?\nEvaluating promotional campaign                                                                                        Panel Data\n                                     Statement: Apply panel regression to isolate the marginal impact of promotions                      Operational Strategy\neffectiveness                                                                                                          Regression\n                                     from seasonal trends.\n                                     Question: How do seasonality and external factors (e.g., temperature) affect\n                                     product demand?                                                                   Time-Series       Supply Chain\nForecasting inventory demand\n                                     Statement: Implement time-series regression with lagged variables for dynamic     Regression        Management\n                                     inventory planning.\n                                                                                                                                                                @ Zhongyun (Phil) Zhou"}, {"id": 90, "deck": "S2 - Overview", "page": 96, "title": "QUESTION CANVAS", "body": "A simple bridge from a vague business concern to an analyzable question.\n Use it when...                         It forces the team to define...\n A team hears:                          1. the decision\n • “Improve retention”,                 2. the decision owner\n • “Find our best customers”, or        3. the outcome/KPI\n • “Did the campaign work?”             4. the unit and timeframe\n                                        5. the data, assumptions, and risks\nRule: do not select an algorithm until the question is clear.\n                                                                          @ Zhongyun (Phil) Zhou"}, {"id": 91, "deck": "S2 - Overview", "page": 97, "title": "QUESTION CANVAS — TEMPLATE", "body": "1. Business situation    2. Decision and owner               3. Outcome / KPI\n What is happening?       What decision must be made?         How will success be measured?\n Why does it matter?      Who is accountable?\n 4. Unit and timeframe    5. Minimum data needed              6. Assumptions and risks\n Who/what is observed?    Sources, fields, granularity, and   What may be missing, biased,\n Over what period?        access limits.                      confidential, or not inferable?\nOutput: one analyzable question in plain English.\n                                                                                      @ Zhongyun (Phil) Zhou"}, {"id": 92, "deck": "S2 - Overview", "page": 98, "title": "QUESTION CLINIC — ACTIVITY", "body": "Choose one request:\n“Improve retention” | “Find our best customers” | “Check whether the campaign worked”\n Step 1 — Worked example (10 min)                  Step 2 — Team canvas (20 min)\n Instructor models how to turn one vague request   Teams of 3–4 complete all six fields for one\n into a completed Question Canvas.                 request.\n Step 3 — Skeptical review (10 min)                Step 4 — Revise and share (10 min)\n Exchange canvases. Identify one missing           Revise the question. Be ready to explain what data\n assumption and one unsupported claim.             cannot show.\n                                                                                            @ Zhongyun (Phil) Zhou"}, {"id": 93, "deck": "S2 - Overview", "page": 99, "title": "SKEPTICAL REVIEW & DEBRIEF", "body": "Reviewer checklist                                Whole-class debrief\n• Is the decision clear and owned?                 1. Which assumption changed your\n• Is the KPI observable?                           question?\n• Is the unit of analysis and timeframe            2. What risk would make the analysis\nexplicit?                                          misleading?\n• Does the proposed data fit the question?         3. What would you need before making\n• What could the data not show?                    a causal claim?\n• Is the claim descriptive, predictive, causal,    4. What is your final one-sentence\nor prescriptive?                                   analytic question?\n                                                                                @ Zhongyun (Phil) Zhou"}, {"id": 94, "deck": "S2 - Overview", "page": 100, "title": "TASK (1)", "body": "Identify some real-world business problem(s) that are\nimportant and “question-ize” or “formulate” it/them\ninto “analyzable question(s)” using the Question\nCanvas and/or regression way of thinking\n• Clearly describe your business context\n• Precisely define your DV\n• Creatively propose candidate IV(s)\n                                                    @ Zhongyun (Phil) Zhou"}, {"id": 95, "deck": "S2 - Overview", "page": 101, "title": "Justifying the question", "body": "Important (Practically)?\n • For whom? (who would benefit)\n • About what? (what is the issue)\n • Consequences (negative) if not addressed?\n • What can be done if addressed?\nInnovative?\n • Not/under investigated?\n • Novel method/insights?\n                                               @ Zhongyun (Phil) Zhou"}, {"id": 96, "deck": "S3 - Data", "page": 1, "title": "Business Intelligence", "body": "in the Era of Big Data\n    Dr. Zhongyun (Phil) Zhou\n  NOTE: Please do not share the slides outside this class."}, {"id": 97, "deck": "S3 - Data", "page": 2, "title": "Q-D-M-A", "body": "2. Data\nNow we have defined the question(s).\n          What’s next?"}, {"id": 98, "deck": "S3 - Data", "page": 3, "title": "Outline", "body": "Data collection\n • Data sources\n • Data audit\nData understanding\n • Description (non-statistically)\n • Description (statistically)\nData preparation\n • Preprocessing (e.g., data reduction)\n • Exploration"}, {"id": 99, "deck": "S3 - Data", "page": 4, "title": "Data collection", "body": "•Where/how can we get the data needed?\n  • Common methods?\n  • Strengths/weaknesses?\n  • Questions supported?"}, {"id": 100, "deck": "S3 - Data", "page": 5, "title": "4 important ways for collecting data", "body": "Secondary                            Surveys\n • Archives, digital trace/log data   • Cross-sectional, longitudinal, panel\n • Open/commercial, auditing          • Common mistakes and remedies\n                                        (with examples)\n Field studies                        Experiments\n • Observation / field study          • A/B test\n • Interviews, focus group (Qual.)    • Quasi-/natural experiment"}, {"id": 101, "deck": "S3 - Data", "page": 6, "title": "Secondary (Archival) Data", "body": "1   Public Data (Official Sites)\n    • International Monetary Fund (IMF)\n    • World Bank\n    • World Health Organization (WHO)\n    • Organization for Economic Cooperation and Development (OECD)\n    • National Bureau of Statistics of China\n    • UCI Database\n    • GFT\n    Kaggle…\n    Commercial data…"}, {"id": 102, "deck": "S3 - Data", "page": 7, "title": "Open", "body": "data\nexamples"}, {"id": 103, "deck": "S3 - Data", "page": 8, "title": "Commercial", "body": "data\nexample"}, {"id": 104, "deck": "S3 - Data", "page": 9, "title": "Secondary (Archival) Data", "body": "2\n    Using Web Crawlers\n    • Web Crawler: A computer program designed to\n      access webpages on the internet.\n    • Used in search engines: Obtains webpage URLs and\n      corresponding content to match user search results.\n    • Used as a data acquisition tool: Automatically visits\n      webpages and records the corresponding content."}, {"id": 105, "deck": "S3 - Data", "page": 10, "title": "Web Crawler", "body": "• Example: use the Octopus to collect the data we need\n   • Download the setup (v8.6.4) from the website of Octopus during the class\n     break. http://www.bazhuayu.com/download\n   • Create a free account for yourself\n• Exercises: collect the data from the following website\n   • https://www.yelp.com/biz/%E5%8F%A3%E5%88%A9%E7%A6%8F-\n     %E9%A6%99%E6%B8%AF?osq=Restaurants\n   • https://www.openrice.com/en/hongkong/directory/hotpot\n   • http://item.jd.com/11221162.html#comment"}, {"id": 106, "deck": "S3 - Data", "page": 11, "title": "e.g., How to collect the data about all the comments?", "body": "Translate human behavior into\n                                              programming…\n                                               (If you are not familiar with programming,\nA human will..                                reverse the procedure)\n1. Find what data they want to collect in     1. Create a turn-page loop.\nthe first comment.\n                                              2. Create an extract-data loop for all\n2. Do the same for other comments.            comments on a single page.\n3. Turn to the next page and repeat steps 1   3. Select the data you want to collect in one\nand 2.                                        comment."}, {"id": 107, "deck": "S3 - Data", "page": 12, "title": "Case: VR in Online House Auctions", "body": "Bidding Competition\n                                                                                    •   Overall Intensity\n                                                                                        • Bidder Entry\n                                                                                        • Bidder Participation\n                                                                                                                          Auction Outcome\n                                                          Virtual Reality\n                                                                                                                         • Price Premium\n                                                                                         Strategic Reactions\n                                                                                    •   Jump Bidding\n                                                                                    •   Late Bidding\nReferences: Yan, Zhou, et tal. (2023); Yan & Zhou (2024, ICIS, Best Short Paper Nomination); Yan, Liu, Zhou, Tan (under review at ISR)      @Zhongyun (Phil) Zhou"}, {"id": 108, "deck": "S3 - Data", "page": 13, "title": "Audit: Can your data be trusted?", "body": "Evaluate where it came from (source)\nAssess data quality independently (by yourself)\nClean the data (rinse, wash, and scrub)\nEnsure high-quality data integration (do 3 things well)\n• Identification\n• Alignment of units of measure and data definitions\n• De-duplication"}, {"id": 109, "deck": "S3 - Data", "page": 14, "title": "Should you trust your data?", "body": "A simple process to help you decide\n                      Source: Redman, T.C. (2018). Can Your Data Be Trusted? HBR"}, {"id": 110, "deck": "S3 - Data", "page": 15, "title": "Primary Data (1): Survey", "body": "•Have you ever conducted/completed a survey?\n (Easy to do?)\n•Common types of error"}, {"id": 111, "deck": "S3 - Data", "page": 16, "title": "The Power of Sample Surveys (1)", "body": " Population: a group of phenomena                 Census: a survey that\n  that have something in common. The                includes every member of the\n  term often refers to a group of people.           target population\n Sample: a smaller group of members               Sample survey: a survey that\n  of a population selected to represent             includes only some members\n  the population, the sample must                   of the target population\n  random.\n  E.G., you ask 100 randomly chosen people at a football match what their main job is.\n  Your sample is the 100, while the population is all the people at that match."}, {"id": 112, "deck": "S3 - Data", "page": 17, "title": "The Power of Sample Surveys (2)", "body": " Surveys using probability-based samples allow one\n  to make estimates about the target population by\n  surveying only some members of that population\n Probability sample surveys are much more efficient\n  than conducting a census—they can save time and\n  resources"}, {"id": 113, "deck": "S3 - Data", "page": 18, "title": "Four Sources of Survey Error", "body": " Survey error occurs when the estimate that is produced using\n  survey data is different from the true value of the variable in the\n  population one hopes to describe\n There are four main types of error that surveyors must attempt\n  to minimize\n No source of error can be ignored"}, {"id": 114, "deck": "S3 - Data", "page": 19, "title": "Four Sources of Survey Error (cont.)", "body": "Coverage error\n             (population \n              sample frame)\n              Sampling error\n             (sample frame \n                 sample)\n            Nonresponse error\n               (sampled \n                responded)\n           Measurement error\n           (intended to measure\n            actually measured)"}, {"id": 115, "deck": "S3 - Data", "page": 20, "title": "1. Coverage Error (1)", "body": " Occurs when the list of members of the target population\n  from which sample members are drawn, known as the\n  sample frame, does not accurately reflect the\n  population on the characteristic(s) the survey is trying to\n  estimate"}, {"id": 116, "deck": "S3 - Data", "page": 21, "title": "1. Coverage Error (2)", "body": " Coverage error is the difference between the estimate\n  produced when the list is inaccurate and what would have\n  been produced with an accurate list\n A high-quality sample survey requires that every member of\n  the population has a known, nonzero probability of being\n  sampled. If some units are not on the list, there will be under-\n  coverage"}, {"id": 117, "deck": "S3 - Data", "page": 22, "title": "Example…", "body": "• An online survey of students at Tongji University about how\n  young people think about AIGC…\n• What is the population?\n• What is the sample frame?\n• What is the coverage error?"}, {"id": 118, "deck": "S3 - Data", "page": 23, "title": "2. Sampling Error (1)", "body": " The difference between the estimate produced when only a\n  sample of units is surveyed and the estimate produced when\n  all units are surveyed\n Occurs any time a survey includes only some, rather than all,\n  members of the sampling frame; it is unavoidable in sample\n  surveys"}, {"id": 119, "deck": "S3 - Data", "page": 24, "title": "2. Sampling Error (2)", "body": " But it can be minimized, and probability sampling allows\n  us to obtain estimates about the population within\n  acceptable levels of precision by surveying only a small\n  portion of the population\n Random sampling is powerful, although it still does not\n  eliminate sampling error."}, {"id": 120, "deck": "S3 - Data", "page": 25, "title": "3. Nonresponse Error (1)", "body": " The difference between the estimate produced when only\n  some of the sampled units respond to the survey compared\n  to when all of them respond\n It occurs if those who don’t respond are different from those\n  who do in a way that influences the estimate"}, {"id": 121, "deck": "S3 - Data", "page": 26, "title": "3. Nonresponse Error (2)", "body": " A high response rate can reduce the likelihood of\n  nonresponse error, but it does not necessarily mean that there\n  is low nonresponse error\n Some tentative solutions:\n   Compare non-responders and responders\n   Compare early and late responders"}, {"id": 122, "deck": "S3 - Data", "page": 27, "title": "4. Measurement Error (1)", "body": " The difference between the estimate produced and the true\n  value because respondents gave inaccurate answers\n Respondents may be unwilling or unable to provide accurate\n  answers for a variety of reasons:\n   poor question design\n   survey mode effects\n   interviewer and respondent behavior, or\n   data collection mistakes"}, {"id": 123, "deck": "S3 - Data", "page": 28, "title": "4. Measurement Error (2)", "body": " In some instances, measurement error is a result of specification\n  error, which is when a question does not measure the concept it\n  is intended to measure, i.e., low validity.\n Yet, even if the question is a good way to measure a specific\n  concept, there are many other ways in which measurement error\n  can still occur"}, {"id": 124, "deck": "S3 - Data", "page": 29, "title": "4-step process for choosing the “right” measures", "body": "Develop a theory of        Identity the specific\n Define your        cause and effect to           activities that       Regularly re-\n governing           assess presumed          employees can do to       evaluate your\n  objective           drivers of the             help achieve the         measures\n                        objective             governing objective\n                  • 3 financial drivers of       E.g., loan rates,\n e.g., creating     value creation: sales,                               The drivers of\neconomic value                                    speed of loan        value change over\n                    costs, investments          processing, lower             time\n                  • non-financial measures:     teller turnover \n                    customer loyalty /               customer\n                    satisfaction, product           satisfaction\n                    quality"}, {"id": 125, "deck": "S3 - Data", "page": 30, "title": "Validity and Reliability", "body": "Validity refers to the credibility or\nbelievability of the measures.\n• Internal validity - the instruments or\n  procedures used in the research measured what\n  they were supposed to measure.\n• External validity - the results can be\n  generalized beyond the immediate study.\nReliability refers to the repeatability\nof findings."}, {"id": 126, "deck": "S3 - Data", "page": 31, "title": "The Total Survey Error Framework", "body": " Surveyors often make the mistake of attempting to reduce one\n  particular source of error while ignoring others\n Instead, surveyors should think in terms of minimizing total survey\n  error (TSE)\n This involves attempting to maximize data accuracy by\n  simultaneously controlling all four sources of error to the extent\n  practical and possible, within the time, cost, and other constraints\n  of the survey"}, {"id": 127, "deck": "S3 - Data", "page": 32, "title": "Exercise 1: Q1-Q5", "body": "1. When the list that is used to draw a sample does not accurately represent the\n                             population, the survey may suffer from:\n                          2. The difference between an estimate produced when only some of the units\nA. Measurement error         from the population are included in the survey and the estimate produced\nB. Nonresponse error         when all units from the population are included is called:\nC. Sampling error         3. When the characteristics of respondents differ from those who do not\nD. Coverage error            respond to a survey in a way that is relevant to the study results, a survey\n                             suffers from:\n                          4. The difference between the estimate produced by a survey and the true\n                             value that results from respondents being unable or unwilling to give\n                             accurate answers to survey questions is referred to as:\n5. When a survey question does not measure what it was intended to measure, it may be suffering from:\n                                                        A. Specification error\n                                                        B. Low construct validity\n                                                        C. Measurement error\n                                                        D. All of the above"}, {"id": 128, "deck": "S3 - Data", "page": 35, "title": "Primary Data (2): Field Studies", "body": "•Observation\n•Interviews"}, {"id": 129, "deck": "S3 - Data", "page": 36, "title": "How to Observe", "body": ""}, {"id": 130, "deck": "S3 - Data", "page": 37, "title": "The AEIOU Framework to guide observation efforts", "body": ""}, {"id": 131, "deck": "S3 - Data", "page": 38, "title": "Observation worksheet", "body": ""}, {"id": 132, "deck": "S3 - Data", "page": 39, "title": "How to Interview", "body": ""}, {"id": 133, "deck": "S3 - Data", "page": 40, "title": "Primary Data (3): Experiment", "body": "•Golden standard for causal inferences\n•High requirements for design\n•aka A/B test in BI"}, {"id": 134, "deck": "S3 - Data", "page": 41, "title": "Example 1", "body": ""}, {"id": 135, "deck": "S3 - Data", "page": 42, "title": "Example 2", "body": ""}, {"id": 136, "deck": "S3 - Data", "page": 53, "title": "Step Three: Construct a Hypothesis", "body": ""}, {"id": 137, "deck": "S3 - Data", "page": 61, "title": "What if you want to test the effects of multiple factors (e.g., size, color,", "body": "and typeface)?\nShould you test them\na) one by one (sequential tests), or\nb) together (multivariate testing/factorial design)?"}, {"id": 138, "deck": "S3 - Data", "page": 65, "title": "Discussion / Exercise", "body": ""}, {"id": 139, "deck": "S3 - Data", "page": 66, "title": "Key to design a business experiment", "body": "Identify a testable (narrow & clearly                     Use a big hammer (large-\ndefined) question                                         enough intervention /           Perform\n                                                          treatment)                       a data\n• How much does advertising our brand name\n  on Google AdWords increase monthly sales?\n                                                                                           audit\n                                                          • 打铁用大锤\n                                    Randomize (treatment vs.\n   Select a study                   control group)\npopulation (sample\n                                    • Should you let participants decide\nrepresentativeness)                   which group they are in?\nCommit to a plan (in detail), and stick to it\n                                                                     Let the data speak\n• Once your experiment is running, leave it alone!\n  (caution: replication crisis)"}, {"id": 140, "deck": "S3 - Data", "page": 67, "title": "3 Common mistakes for doing A/B tests", "body": "Do not let the tests run their course\n• Be cautious with “real-time optimization”\nLook at too many metrics\n• Be cautious with “spurious correlations” (next slides)\n                            https://tylervigen.com/spurious-correlations\nDo not do enough retesting\n• Be cautious with “false positives”"}, {"id": 141, "deck": "S3 - Data", "page": 70, "title": "Extensions", "body": "• Between- vs. within-subject design\n• Manipulation check vs. attention check\n• Comparing different data collection strategies"}, {"id": 142, "deck": "S3 - Data", "page": 83, "title": "Now we have the data. What’s next?", "body": ""}, {"id": 143, "deck": "S3 - Data", "page": 84, "title": "2. Data (i): Understand the Data", "body": "• Data (datum—singular form of data): facts\n• Structured data\n    • Targeted for computers to process\n    • Numeric versus nominal\n• Unstructured/textual data\n    • Targeted for humans to process/digest\n• Semi-structured data?\n    • XML, HTML, Log files, etc.\n• Data taxonomy…"}, {"id": 144, "deck": "S3 - Data", "page": 85, "title": "Examples of structured / semi-structured / unstructured data", "body": "Structured                                Unstructured\n                                            《The Red Wheelbarrow》（红色独轮车），by William Carlos Williams\nSemi-structured   View  Source Code"}, {"id": 145, "deck": "S3 - Data", "page": 86, "title": "Structured / unstructured data (example)", "body": ""}, {"id": 146, "deck": "S3 - Data", "page": 87, "title": "Discussion", "body": "• What types of structured and unstructured data does your\n  company collect about your customers? For what purpose?"}, {"id": 147, "deck": "S3 - Data", "page": 89, "title": "A Simple Taxonomy of Data", "body": ""}, {"id": 148, "deck": "S3 - Data", "page": 90, "title": "Nominal levels of measurement", "body": "• Values are distinct symbols\n   • Values themselves serve only as labels or names\n   • Nominal comes from the Latin word for name\n• Example: attribute “outlook” from weather data\n   • Values: “sunny”, “overcast”, and “rainy”\n• No relation is implied among nominal values (no ordering or distance\n  measure)\n• Only equality tests can be performed"}, {"id": 149, "deck": "S3 - Data", "page": 91, "title": "Ordinal levels of measurement", "body": "• Impose order on values\n• But: no distance between values defined\n• Example:        attribute “temperature” in weather data\n   • Values: “hot” > “mild” > “cool”\n• Note: addition and subtraction don’t make sense\n• Example rule:      temperature < hot ⇒ play = yes\n• Distinction between nominal and ordinal not always clear (e.g., attribute\n  “outlook”)"}, {"id": 150, "deck": "S3 - Data", "page": 92, "title": "Interval quantities", "body": "• Interval quantities are not only ordered but measured in fixed and\n  equal units\n• Example 1: attribute “temperature” expressed in degrees Fahrenheit\n• Example 2: attribute “year”\n• Difference of two values makes sense\n• Sum or product doesn’t make sense\n   • Zero point is not defined!"}, {"id": 151, "deck": "S3 - Data", "page": 93, "title": "Ratio quantities", "body": "• Ratio quantities are ones for which the measurement scheme defines a\n  zero point\n• Example: attribute “distance”\n   • Distance between an object and itself is zero\n• Ratio quantities are treated as real numbers\n   • All mathematical operations are allowed\n• But: is there an “inherently” defined zero point?\n   • Answer depends on scientific knowledge (e.g., Fahrenheit knew no lower limit\n     to temperature)"}, {"id": 152, "deck": "S3 - Data", "page": 94, "title": "Nominal vs. ordinal vs. numeric", "body": "• Attribute “age” nominal      If age = young and astigmatic = no\n                                  and tear production rate = normal\n                                  then recommendation = soft\n                               If age = pre-presbyopic and astigmatic = no\n                                  and tear production rate = normal\n                                  then recommendation = soft\n• Attribute “age” ordinal (e.g. “young” < “pre-presbyopic” < “presbyopic”)\n                               If age ≤ pre-presbyopic and astigmatic = no\n                                  and tear production rate = normal\n                                  then recommendation = soft\n• Attribute “age” numerical: 1, 2, 3, …"}, {"id": 153, "deck": "S3 - Data", "page": 95, "title": "Getting to know your data", "body": "• Simple visualization tools are very useful\n   • Nominal attributes: histograms (Is the distribution consistent with background\n     knowledge?)\n   • Numeric attributes: graphs (Any obvious outliers?)\n• 2-D and 3-D plots show dependencies\n• May need to consult domain experts\n• Too much data to inspect manually? Take a sample!"}, {"id": 154, "deck": "S3 - Data", "page": 96, "title": "Data Description (statistically and non-statistically)", "body": "• Specify the data source\n • For example, the sample data is sourced from the official website of the National Bureau of Statistics,\n   or crawled from a specific e-commerce platform.\n• Specify the sample size and the meaning of each observation\n • For example: The data contains xxx observations, and each observation represents xxx.\n• Specify the number of variables and the basic situation\n • For example: The data contains a total of xx variables, which can be summarized into 2 groups. One\n   group represents xx, and the other group represents xx.\n• The data introduction and description can be presented in multiple ways\n • In pure text form\n • Variable description table\n • PPT"}, {"id": 155, "deck": "S3 - Data", "page": 97, "title": "Variable Description and Summary Statistics (in English)", "body": "Table 1. Variable Descriptions and Summary Statistics"}, {"id": 156, "deck": "S3 - Data", "page": 98, "title": "Construct (Variable) Description (in Survey Study)", "body": "SVW Usage\nConstructs"}, {"id": 157, "deck": "S3 - Data", "page": 99, "title": "Measurement Items (in Survey Study)", "body": ""}, {"id": 158, "deck": "S3 - Data", "page": 100, "title": "Data Introduction and Description (in texts)", "body": "Necessary to supplement the variable description table with textual explanations,\n  • to explain the data source, sample size, meaning of each sample, and the basis for variable categorization.\nTry to categorize variables into several (typically 3-5) groups,\n  • based on their meanings (e.g., outcome or explaining variables), not types (e.g., discrete or continuous).\n  • Example:"}, {"id": 159, "deck": "S3 - Data", "page": 102, "title": "Descriptive Statistics", "body": ""}, {"id": 160, "deck": "S3 - Data", "page": 103, "title": "Descriptive Statistics and Correlations", "body": ""}, {"id": 161, "deck": "S3 - Data", "page": 104, "title": "Descriptive Statistics", "body": ""}, {"id": 162, "deck": "S3 - Data", "page": 105, "title": "2. Data (ii): Data Preprocessing", "body": "•Why do we need data preprocessing?\n•How do we determine whether / when we need\n data preprocessing?"}, {"id": 163, "deck": "S3 - Data", "page": 106, "title": "Exercise: Can you find any problems in this data set?", "body": "Customer ID   Zip      Gender   Income        Age   Marital Status   Transaction\n                                                                     Amount\n1001          10048    M        75,000        C     M                5000\n1002          J2S7K7   F        -40,000       40    W                4000\n1003          90210             10, 000,000   45    S                7000\n1004          6269     M        50,000        0     S                1000\n1005          55101    F        99,999        30    D                3000\nCustomer ID   Zip      Gender   Income        Age   Marital Status   Transaction\n                                                                     Amount\n1001          10048    M        75,000        C     M                5000\n1002          J2S7K7   F        -40,000       40    W                4000\n1003          90210             10, 000,000   45    S                7000\n1004          6269     M        50,000        0     S                1000\n1005          55101    F        99,999        30    D                3000"}, {"id": 164, "deck": "S3 - Data", "page": 107, "title": "Why do we need data preprocessing?", "body": "• Fields that are obsolete or redundant\n• Missing values\n• Outliers\n• Values not consistent with policy or common sense\n• Data in a form not suitable for the data mining models"}, {"id": 165, "deck": "S3 - Data", "page": 108, "title": "Necessity / Challenge of Data Preprocessing", "body": "The real-world data is dirty, misaligned, overly complex, and inaccurate\n • Not ready for analytics!\nReadying the data for analytics is needed\n • Data preprocessing\n   • Data consolidation\n   • Data cleaning\n   • Data transformation\n   • Data reduction\nArt – it develops and improves with experience"}, {"id": 166, "deck": "S3 - Data", "page": 109, "title": "Identifying Misclassifications", "body": "• Given the frequency distribution of the variable Brand below\n• Notice anything strange about this frequency distribution?\n                                    These two records have been inconsistently classified\n      Brand          Frequency      with respect to the origin of manufacture. To\n                                    maintain consistency with the remainder of the data\n       USA              1           set, the record with origin USA should have been\n      France            1           labeled US, and the record with origin France should\n        US             156          have been labeled Europe\n      Europe            46\n                                    Make sure all the classification labels are\n       Japan            51          valid and consistent"}, {"id": 167, "deck": "S3 - Data", "page": 110, "title": "Necessity / Challenge of Data Preprocessing", "body": "The real-world data is dirty, misaligned, overly complex, and inaccurate\n • Not ready for analytics!\nReadying the data for analytics is needed\n • Data preprocessing\n   • Data consolidation\n   • Data cleaning\n   • Data transformation\n   • Data reduction\nArt – it develops and improves with experience"}, {"id": 168, "deck": "S3 - Data", "page": 111, "title": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou", "body": ""}, {"id": 169, "deck": "S3 - Data", "page": 112, "title": "Main Tasks of Data Cleaning", "body": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou"}, {"id": 170, "deck": "S3 - Data", "page": 113, "title": "Removal of Duplicate records", "body": "• Records may have been inadvertently copied, thus creating duplicate\n  records\n• Overweighting of the data values in those records\n• Check it, and if the records are truly duplicate, only one set of them\n  should be retained.\n• For example, take an extreme case, suppose a data set contains three\n  nominal fields, and each field takes only three values. Then there are\n  only 3*3*3=27 possible different sets of observations."}, {"id": 171, "deck": "S3 - Data", "page": 114, "title": "Removing variables that are not useful", "body": "Unary variables\n • For example, data collection on a sample of students at an all-girls private school\n   would find that the sex variable would be unary, as every subject would be\n   female\nVariables that are very nearly unary\n • For example, suppose that 99.95% of the players in a field hockey league are\n   female, with remaining 0.05% male"}, {"id": 172, "deck": "S3 - Data", "page": 115, "title": "Variables that should probably NOT be removed", "body": "• Variables for which 90% or more of the values are missing\n  • Are the remaining 10% of the cases truly representative of the missing\n    data, or are the missing values occurring due to some systematic but\n    unobserved phenomenon?\n• Variables that are strongly correlated\n• Think twice before doing it"}, {"id": 173, "deck": "S3 - Data", "page": 116, "title": "Main Tasks of Data Cleaning", "body": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou"}, {"id": 174, "deck": "S3 - Data", "page": 117, "title": "Graphical Methods for Identifying Outliers", "body": "• Outliers are extreme values that go\n  against the trend of the remaining data\n• They may present due to errors in data\n  entry, but sometimes an outlier is a\n  valid data point and not an error\n• Certain statistical methods are\n  sensitive to the presence of outliers,\n  and may deliver unreliable results\n                                            Example: a histogram of the vehicle weights from the\n                                                      (slightly amended) cars data set"}, {"id": 175, "deck": "S3 - Data", "page": 118, "title": "The scatter plot", "body": "• Two-dimensional scatter plots can help to reveal outliers in more than one variable.\n• Example: a scatter plot of mpg (miles per gallon) against weights shows two outliers"}, {"id": 176, "deck": "S3 - Data", "page": 119, "title": "Main Tasks of Data Cleaning", "body": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou"}, {"id": 177, "deck": "S3 - Data", "page": 120, "title": "Missing values", "body": "• Missing values are frequently indicated by out-of-range entries for an\n  attribute\n   • There are different types of missing values: unknown, unrecorded, irrelevant\n   • Reasons:\n      •   malfunctioning equipment\n      •   changes in experimental design\n      •   collation of different datasets\n      •   measurement not possible\n• Missing value may have significance in itself (e.g., missing test in a medical\n  examination)\n   • Most schemes assume that is not the case and “missing” may need to be coded as an\n     additional, separate attribute value"}, {"id": 178, "deck": "S3 - Data", "page": 121, "title": "Replace missing values with…", "body": "• some constant, specified by the analyst\n• the field mean (for numeric variables), or the mode (for categorical\n  variables)\n   • However, for extremely skewed data sets, the mean becomes less representative\n     of the variable center. The mean is very sensitive to the presence of outliers.\n     You may try to work with alternative measures of center, such as the median or\n     the mode.\n• a value generated at random from the observed distribution of the\n  variable\n• imputed values based on the other characteristics of the record"}, {"id": 179, "deck": "S3 - Data", "page": 122, "title": "Example", "body": "mpg       Cubicinches    horsepower brand\n1   14.000    350            165       US\n2   31.900         0   200.65 71       Europe\n3   17.000    302            140       US\n4   15.000    400            150         US\n5   37.700    89             62        Japan"}, {"id": 180, "deck": "S3 - Data", "page": 123, "title": "Main Tasks of Data Cleaning", "body": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou"}, {"id": 181, "deck": "S3 - Data", "page": 124, "title": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou", "body": ""}, {"id": 182, "deck": "S3 - Data", "page": 125, "title": "Metrics for Analytics Ready Data", "body": "• Data source reliability\n• Data content accuracy\n• Data accessibility\n• Data security and data privacy\n• Data richness\n• Data consistency\n• Data currency/data timeliness\n• Data granularity\n• Data validity and data relevancy"}, {"id": 183, "deck": "S3 - Data", "page": 126, "title": "Necessity / Challenge of Data Preprocessing", "body": "The real-world data is dirty, misaligned, overly complex, and inaccurate\n • Not ready for analytics!\nReadying the data for analytics is needed\n • Data preprocessing\n   • Data consolidation\n   • Data cleaning\n   • Data transformation\n   • Data reduction\nArt – it develops and improves with experience"}, {"id": 184, "deck": "S3 - Data", "page": 127, "title": "Main Tasks of Data Preprocessing", "body": "https://www.tableau.com/learn/articles/what-is-data-cleaning   @Zhongyun (Phil) Zhou"}, {"id": 185, "deck": "S3 - Data", "page": 128, "title": "Transforming Categorical Variables into Numerical Variables", "body": "In most cases, the data analyst should avoid transforming\ncategorical variables to numerical variables\n          Region   Region_num        Survey        Survey\n                                    response    Response_num\n           North       1             Always          4\n           East        2             Usually         3\n           South       3            Sometimes        2\n           West        4              Never          1"}, {"id": 186, "deck": "S3 - Data", "page": 129, "title": "Reclassifying Categorical variables", "body": "• Reclassifying categorical variables is the categorical\n  equivalent of binning numerical variables\n• Sometimes, you got trouble when a categorical variable\n  contains too many easily analyzable field values\n  • For example, the 50 states could be reclassified as the variable\n    region, containing field values Northeast, Southeast, North\n    Central, Southwest and West, or it may be reclassified as the\n    variable economic-level, with three field values containing the\n    richer states, the midrange states, and the poorer states."}, {"id": 187, "deck": "S3 - Data", "page": 130, "title": "Binning Numerical Variables", "body": "• Equal width binning divides the numerical predictor into k categories\n  of equal width, where k is chosen by the client or analyst\n• Equal frequency binning divides the numerical predictor into k\n  categories, each having n/k records, where n is the total number of\n  records\n• Binning by clustering uses a clustering algorithm, such as k-means\n  clustering to automatically calculate the “optimal” partitioning\n• Binning based on predictive value (each partition’s effect on the value\n  of the target variable)"}, {"id": 188, "deck": "S3 - Data", "page": 131, "title": "Example", "body": "Suppose we have the following tiny data set, which we would like to\ndiscretize into k = 3 categories: X={1,1,1,1,1,2,2,11,11,12,12,44}"}, {"id": 189, "deck": "S3 - Data", "page": 132, "title": "Flag variables", "body": "• Some analytics methods require predictors to be numeric\n• Analysts need to record the categorical variable into one or\n  more flag variables\n• A flag variable (or dummy variable, or indicator variable) is\n  a categorical variable taking only two values, 0 and 1.\n• When a categorical predictor takes k >= 3 possible values,\n  then define k-1 dummy variables and use the unassigned\n  category as the reference category."}, {"id": 190, "deck": "S3 - Data", "page": 133, "title": "Necessity / Challenge of Data Preprocessing", "body": "The real-world data is dirty, misaligned, overly complex, and inaccurate\n • Not ready for analytics!\nReadying the data for analytics is needed\n • Data preprocessing\n   • Data consolidation\n   • Data cleaning\n   • Data transformation\n   • Data reduction\nArt – it develops and improves with experience"}, {"id": 191, "deck": "S3 - Data", "page": 134, "title": "Main Tasks of Data Preprocessing", "body": "Data reduction\n• 1. Variables\n  • Dimensional reduction\n  • Variable selection\n• 2. Cases/samples\n  • Sampling\n  • Balancing / stratification"}, {"id": 192, "deck": "S3 - Data", "page": 135, "title": "Unbalanced data", "body": "• Unbalanced data is a well-known problem in classification problems\n   • One class is often far more prevalent than the rest\n   • Example: detecting a rare disease\n• Main problem: simply predicting the majority class yields high accuracy\n  but is not useful\n   • Predicting that no patient has the rare disease gives high classification accuracy\n• Unbalanced data requires techniques that can deal with unequal\n  misclassification costs\n   • Misclassifying an afflicted patient may be much more costly than misclassifying\n     a healthy one"}, {"id": 193, "deck": "S3 - Data", "page": 136, "title": "TASK 2: Obtain, Explore, Describe, and Preprocess Data", "body": "In TASK1 (Questionization), you have proposed a problem that has\npractical significance, and have formulated this problem into an\nanalyzable question.\nTASK2 requires obtaining data that can answer your question,\nexploring and describing the data, performing descriptive analyses,\nand preprocessing the data appropriately (i.e., according to the nature of\nthe question and the requirements for subsequent analysis)."}, {"id": 194, "deck": "S3 - Data", "page": 137, "title": "Q-D-M-A", "body": ""}, {"id": 195, "deck": "S4a - Model: Classification & Evaluation", "page": 1, "title": "Business Intelligence", "body": "in the Era of Big Data\n    Dr. Zhongyun (Phil) Zhou\n    Eastern Scholar Professor\n  NOTE: Please do not share the slides outside this class."}, {"id": 196, "deck": "S4a - Model: Classification & Evaluation", "page": 2, "title": "Q-D-M-A", "body": "3. Model\nNow the data is ready for analytics.\n          What’s next?"}, {"id": 197, "deck": "S4a - Model: Classification & Evaluation", "page": 3, "title": "3. Model Building, Testing, and Evaluation", "body": "• Machine Learning\n     Buy some Mangos?\n1.    How can I reliably choose tasty (sweet) mangoes?\n2.    Can you build a program to help select tasty (sweet) mangoes? (so that others can use it…)\n3.    How can the system generalize to different preferences (e.g., juicy mangoes) or fruits (e.g.,\n      oranges/watermelons)?"}, {"id": 198, "deck": "S4a - Model: Classification & Evaluation", "page": 4, "title": "A Real-World Example: Predicting how a viewer will rate a movie", "body": "10% improvement = 1 million dollar prize\nThe essence of machine learning:\n• A pattern exists.\n• We cannot pin it down mathematically.\n• We have data on it."}, {"id": 199, "deck": "S4a - Model: Classification & Evaluation", "page": 7, "title": "Components of learning", "body": "Metaphor: Credit approval\nApplicant information:\n                            age                23 years\n                            gender             male\n                            annual salary      $30,000\n                            years in residence 1 year\n                            years in job       1 year\n                            current debt       $15,000\n                            ...                ...\nApprove credit?"}, {"id": 200, "deck": "S4a - Model: Classification & Evaluation", "page": 11, "title": "Basic premise of learning", "body": "\"using a set of observations to uncover an underlying process\"\n             broad premise         many variations\n•Supervised Learning\n•Unsupervised Learning\n•Reinforcement Learning"}, {"id": 201, "deck": "S4a - Model: Classification & Evaluation", "page": 14, "title": "Supervised vs Unsupervised learning systems", "body": "Supervised Learning Systems\n       As two pioneers in the field, Tom Mitchell and Michael I. Jordan, have noted, most of the recent progress\n       in machine learning involves mapping from a set of inputs to a set of outputs. Some examples:\n       INPUT X                                OUTPUT Y                                             APPLICATION\n       Voice recording                        Transcript                                           Speech recognition\n       Historical market data                 Future market data                                   Trading bots\n       Photograph                             Caption                                              Image tagging\n       Drug chemical properties               Treatment efficacy                                   Pharma R&D\n       Store transaction details              Is the transaction fraudulent?                       Fraud detection\n       Recipe ingredients                     Customer reviews                                     Food recommendations\n       Purchase histories                     Future purchase behavior                             Customer retention\n       Car locations and speed                Traffic flow                                         Traffic lights\n       Faces                                  Names                                                Face recognition\nUnsupervised learning systems seek to learn on their own.\nWe humans are excellent unsupervised learners: We pick up most of our knowledge of the world (such as how to recognize a tree) with\nlittle or no labeled data. But it is exceedingly difficult to develop a successful machine learning system that works this way.\n                                                                Source: https://hbr.org/cover-story/2017/07/the-business-of-artificial-intelligence"}, {"id": 202, "deck": "S4a - Model: Classification & Evaluation", "page": 17, "title": "Machine learning and statisticsc", "body": "• Historical difference (grossly oversimplified):\n  • Statistics: testing hypotheses\n  • Machine learning: finding the right hypothesis\n• But: huge overlap\n  • Decision trees (C4.5 and CART)\n  • Nearest-neighbor methods\n• Today: perspectives have converged\n  • Most machine learning algorithms employ statistical techniques"}, {"id": 203, "deck": "S4a - Model: Classification & Evaluation", "page": 18, "title": "Three Basic Types of", "body": "Data Mining Tasks & Methods     Data Mining Algorithms                     Learning Type\n                                          Prediction\n  BA Models/Tasks                               Classification\n                                                                    Decision Trees, Neural Networks, Support\n                                                                    Vector Machines, kNN, Naïve Bayes, GA\n                                                                                                                  Supervised\n                                                                    Linear/Nonlinear Regression, ANN,\n                                                Regression                                                        Supervised\n                                                                    Regression Trees, SVM, kNN, GA\n                                                                    Autoregressive Methods, Averaging\n                                                Time Series                                                       Supervised\n                                                                    Methods, Exponential Smoothing, ARIMA\nA Simple Taxonomy for Data Mining         Association\nTasks, Methods, and Algorithms                  Market-basket       Apriory, OneR, ZeroR, Eclat, GA              Unsupervised\n                                                                    Expectation Maximization, Apriory\n                                                Link analysis                                                    Unsupervised\n                                                                    Algorithm, Graph-based Matching\n                                                                    Apriory Algorithm, FP-Growth, Graph-\n                                                Sequence analysis                                                Unsupervised\n                                                                    based Matching\n                                          Segmentation\n                                                Clustering          K-means, Expectation Maximization (EM)       Unsupervised\n                                                Outlier analysis    K-means, Expectation Maximization (EM)       Unsupervised"}, {"id": 204, "deck": "S4a - Model: Classification & Evaluation", "page": 19, "title": "“Classification” exercises", "body": "For each business request below, identify the analytical task (prediction/association/segmentation),\nthe target outcome, and the unit of analysis. Do not name an algorithm yet.\nBusiness request                    Task type?                   Y?             Unit of analysis?\n1. Which loan applicants are likely\nto default within 12 months?\n2. How much will each customer\nspend next month?\n3. Which customers naturally form\nsimilar behavioral groups?\n4. Which products tend to appear\nin the same transaction?"}, {"id": 205, "deck": "S4a - Model: Classification & Evaluation", "page": 20, "title": "Q-D-M-A", "body": "3. Model\nClassification"}, {"id": 206, "deck": "S4a - Model: Classification & Evaluation", "page": 21, "title": "“To be, or not to be” decision in the business world", "body": "In or Out?\nAdvanced decision: Which one?\n                                          Accept or Deny?"}, {"id": 207, "deck": "S4a - Model: Classification & Evaluation", "page": 22, "title": "Data Analytics Models: Classification", "body": "• Most frequently used data mining method\n• Part of the machine-learning family\n• Employ supervised learning\n• Learn from past data, classify new data\n• The output variable is categorical (nominal or ordinal) in nature\n• Classification versus regression?\n• Classification versus clustering?"}, {"id": 208, "deck": "S4a - Model: Classification & Evaluation", "page": 23, "title": "Example:                          Income", "body": "Source\n                                                  Debt\n                                                  Level\n                                                           Credit\n                                                           Score\n                                                                    Prior\n                                                                    Default\n                                                                              Approved\n  Credit Approval                      High\n                                       High\n                                                  High\n                                                  High\n                                                           Poor\n                                                           Poor\n                                                                    False\n                                                                    True\n                                                                              No\n                                                                              No\n     Problem                           Stable     High     Poor     False     Yes\n                                       Unstable   Medium   Poor     False     Yes\n                                       Unstable   Low      Good     False     Yes\nQuestion:                              Unstable   Low      Good     True      No\n                                       Stable     Low      Good     True      Yes\n                                       High       Medium   Poor     False     No\nShould we approve a loan application\n                                       High       Low      Good     False     Yes\n(Yes or No), given the applicant’s\n                                       Unstable   Medium   Good     False     Yes\nstatus (Income Source, Debt Level,\n                                       High       Medium   Good     True      Yes\nCredit Score, and Prior Default)?\n                                       Stable     Medium   Poor     True      Yes\n                                       Stable     High     Good     False     Yes\n                                       Unstable   Medium   Poor     True      No"}, {"id": 209, "deck": "S4a - Model: Classification & Evaluation", "page": 24, "title": "Simplicity first", "body": "•   Simple algorithms often work very well!\n•   There are many kinds of simple structures, e.g.:\n    •   One attribute does all the work (e.g., income = stable?)\n    •   All attributes contribute equally & independently\n    •   Logical structure with a few attributes suitable for a tree\n    •   A set of simple logical rules\n    •   Relationships between groups of attributes\n    •   A weighted linear combination of the attributes\n    •   Strong neighborhood relationships based on distance\n    •   Clusters of data in unlabeled data\n    •   Bags of instances that can be aggregated\n•   The success of the method depends on the domain"}, {"id": 210, "deck": "S4a - Model: Classification & Evaluation", "page": 25, "title": "Inferring rudimentary rules", "body": "• OneR (One Rule) learner: learns a 1-level decision tree\n   • A set of rules that all test one particular attribute that has been identified as the one that yields the\n     lowest classification error\n• Basic version for finding the rule set from a given training set (assumes nominal\n  attributes):\n   • For each attribute\n      • Make one branch for each value of the attribute\n      • To each branch, assign the most frequent class value of the instances pertaining to that branch\n      • Error rate: proportion of instances that do not belong to the majority class of their\n         corresponding branch\n   • Choose attribute with lowest error rate"}, {"id": 211, "deck": "S4a - Model: Classification & Evaluation", "page": 26, "title": "Evaluating the applicant attributes                      Income", "body": "Source\n                                                                    Debt\n                                                                    Level\n                                                                             Credit\n                                                                             Score\n                                                                                      Prior\n                                                                                      Default\n                                                                                                 Approved\n                                                         High       High     Poor     False      No\n  Attribute       Rules              Errors     Total\n                                                errors   High       High     Poor     True       No\n  Income Source   High → No          2/5        4/14     Stable     High     Poor     False      Yes\n                  Stable → Yes       0/4                 Unstable   Medium   Poor     False      Yes\n                  Unstable → Yes     2/5                 Unstable   Low      Good     False      Yes\n  Debt Level      High → No*         2/4        5/14     Unstable   Low      Good     True       No\n                  Medium → Yes       2/6                 Stable     Low      Good     True       Yes\n                  Low → Yes          1/4                 High       Medium   Poor     False      No\n  Credit Score    Poor → No          3/7        4/14     High       Low      Good     False      Yes\n                  Good → Yes         1/7                 Unstable   Medium   Good     False      Yes\n  Prior Default   False → Yes        2/8        5/14     High       Medium   Good     True       Yes\n                  True → No*         3/6                 Stable     Medium   Poor     True       Yes\n                                   * indicates a tie     Stable     High     Good     False      Yes\n                                                         Unstable   Medium   Poor     True       No"}, {"id": 212, "deck": "S4a - Model: Classification & Evaluation", "page": 27, "title": "Decision Trees (1 of 2)", "body": "• Employs a divide-and-conquer method\n• Recursively divides a training set until each division consists of examples from\n  one class:\n           A general algorithm (steps) for building a decision tree\n 1. Create a root node and assign all of the training data to it.\n 2. Select the best splitting attribute.\n 3. Add a branch to the root node for each value of the split. Split the data into\n    mutually exclusive subsets along the lines of the specific split.\n 4. Repeat steps 2 and 3 for each and every leaf node until the stopping\n    criteria is reached."}, {"id": 213, "deck": "S4a - Model: Classification & Evaluation", "page": 28, "title": "Decision Trees (2 of 2)", "body": "DT algorithms mainly differ on\n • 1. Splitting criteria\n   • Which variable, what value, etc.\n • 2. Stopping criteria\n   • When to stop building the tree\n • 3. Pruning (generalization method)\n   • Pre-pruning versus post-pruning\nMost popular DT algorithms include\n • ID3, C4.5 (J48 in Weka), C5; CART; CHAID; M5"}, {"id": 214, "deck": "S4a - Model: Classification & Evaluation", "page": 29, "title": "Constructing decision trees (e.g., in Weka)", "body": "• Strategy: top-down learning using a recursive divide-and-\n  conquer process\n  • First: select the attribute for the root node\n    Create a branch for each possible attribute value\n  • Then: split instances into subsets\n    One for each branch extending from the node\n  • Finally: repeat recursively for each branch, using only instances that\n    reach the branch\n• Stop if all instances have the same class"}, {"id": 215, "deck": "S4a - Model: Classification & Evaluation", "page": 30, "title": "Which attribute to                                     Income", "body": "Source\n                                                                  Debt\n                                                                  Level\n                                                                           Credit\n                                                                           Score\n                                                                                    Prior\n                                                                                    Default\n                                                                                               Approved\nselect?Income\n       Source\n                                     Debt Level        High       High     Poor     False      No\n                                                       High       High     Poor     True       No\n     High      Stable     Unstable   High Medium Low\n                                                       Stable     High     Poor     False      Yes\n                                                       Unstable   Medium   Poor     False      Yes\n                                                       Unstable   Low      Good     False      Yes\n                                                       Unstable   Low      Good     True       No\n        Credit                         Prior           Stable     Low      Good     True       Yes\n        Score                         Default\n                                                       High       Medium   Poor     False      No\n        Poor       Good\n                                                       High       Low      Good     False      Yes\n                                                       Unstable   Medium   Good     False      Yes\n                                                       High       Medium   Good     True       Yes\n                                                       Stable     Medium   Poor     True       Yes\n                                                       Stable     High     Good     False      Yes\n                                                       Unstable   Medium   Poor     True       No"}, {"id": 216, "deck": "S4a - Model: Classification & Evaluation", "page": 31, "title": "Criterion for attribute selection", "body": "• Which is the best attribute?\n   • Want to get the smallest tree\n   • Heuristic: choose the attribute that produces the “purest” nodes\n• Popular selection criterion: information gain\n   • Information gain increases with the average purity of the subsets\n• Strategy: amongst attributes available for splitting, choose the attribute\n  that gives the greatest information gain\n• Information gain requires a measure of impurity\n• The impurity measure that it uses is the entropy of the class\n  distribution, which is a measure from information theory"}, {"id": 217, "deck": "S4a - Model: Classification & Evaluation", "page": 32, "title": "Computing information (entropy)", "body": "• We have a probability distribution: the class distribution in a subset of\n  instances\n• The expected information required to determine an outcome (i.e., class\n  value), is the distribution’s entropy\n• Formula for computing the entropy:\n• Using base-2 logarithms, entropy gives the information required in\n  expected bits\n• Entropy is maximal when all classes are equally likely and minimal\n  when one of the classes has probability 1"}, {"id": 218, "deck": "S4a - Model: Classification & Evaluation", "page": 33, "title": "Exhibition & Exercise", "body": "• Attribute selection in decision trees:\n  calculating information gain\n• Building a decision tree with Weka"}, {"id": 219, "deck": "S4a - Model: Classification & Evaluation", "page": 34, "title": "Example: attribute Income Source            Income     Debt     Credit   Prior        Approved", "body": "Source     Level    Score    Default\n                                            High       High     Poor     False        No\n• Income Source = High:\n                                            High       High     Poor     True         No\n                                            Stable     High     Poor     False        Yes\n• Income Source = Stable:                   Unstable   Medium   Poor     False        Yes\n                                            Unstable   Low      Good     False        Yes\n                                            Unstable   Low      Good     True         No\n• Income Source = Unstable:\n                                            Stable     Low      Good     True         Yes\n                                            High       Medium   Poor     False        No\n• Expected information for the attribute:   High       Low      Good     False        Yes\n                                            Unstable   Medium   Good     False        Yes\n                                            High       Medium   Good     True         Yes\n                                            Stable     Medium   Poor     True         Yes\n                                            Stable     High     Good     False        Yes\n                                            Unstable   Medium   Poor     True         No"}, {"id": 220, "deck": "S4a - Model: Classification & Evaluation", "page": 35, "title": "Computing information gain", "body": "• Information gain: information before splitting – information after splitting\n    Gain(Income Source) = Info([9,5]) – info([2,3],[4,0],[3,2])\n                        = 0.940 – 0.693\n                        = 0.247 bits\n• Information gain for attributes from the data:\n     Gain (Income Source)         = 0.247 bits\n     Gain (Debt Level)            = 0.029 bits\n     Gain (Credit Score)          = 0.152 bits\n     Gain (Prior Default)         = 0.048 bits"}, {"id": 221, "deck": "S4a - Model: Classification & Evaluation", "page": 36, "title": "Which attribute to                                    Income", "body": "Source\n                                                                 Debt\n                                                                 Level\n                                                                          Credit\n                                                                          Score\n                                                                                   Prior\n                                                                                   Default\n                                                                                               Approved\nselect?\n      Income\n      Source\n                                    Debt Level        High       High     Poor     False       No\n                                                      High       High     Poor     True        No\n    High      Stable     Unstable   High Medium Low\n                                                      Stable     High     Poor     False       Yes\n                                                      Unstable   Medium   Poor     False       Yes\n                                                      Unstable   Low      Good     False       Yes\n                                                      Unstable   Low      Good     True        No\n       Credit                         Prior           Stable     Low      Good     True        Yes\n       Score                         Default\n                                                      High       Medium   Poor     False       No\n       Poor       Good\n                                                      High       Low      Good     False       Yes\n                                                      Unstable   Medium   Good     False       Yes\n                                                      High       Medium   Good     True        Yes\n                                                      Stable     Medium   Poor     True        Yes\n                                                      Stable     High     Good     False       Yes\n                                                      Unstable   Medium   Poor     True        No"}, {"id": 222, "deck": "S4a - Model: Classification & Evaluation", "page": 37, "title": "Continuing to split", "body": "Income                                Income\n                                                   Source                                Source\n                                                 High                                  High\n                                                                              Credit\n                                    Debt Level\n                                                                              Score\n                                    High Medium Low                           Poor     Good\n                                                                     Income\n                                                                     Source\n                                                                  High\nGain (Debt Level)    = 0.571 bits                        Prior\nGain (Credit Score) = 0.971 bits                        Default\nGain (Prior Default) = 0.020 bits"}, {"id": 223, "deck": "S4a - Model: Classification & Evaluation", "page": 38, "title": "Final decision tree", "body": "• Note: not all leaves need to                    Income\n  be pure; sometimes,                             Source\n  identical instances have                     High    Stable    Unstable\n  different classes\n    •   Splitting stops when data\n                                      Credit                     Prior\n        cannot be split any further\n                                      Score                     Default\n                                      Poor     Good"}, {"id": 224, "deck": "S4a - Model: Classification & Evaluation", "page": 39, "title": "Highly-branching attributes", "body": "• Problematic: attributes with a large number of values (extreme case:\n  ID code)\n• Subsets are more likely to be pure if there is a large number of values\n   • Information gain is biased towards choosing attributes with a large number of\n     values\n   • This may result in overfitting (selection of an attribute that is non-optimal for\n     prediction)\n• An additional problem in decision trees is data fragmentation"}, {"id": 225, "deck": "S4a - Model: Classification & Evaluation", "page": 40, "title": "Credit          ID", "body": "code\n                       Income\n                       Source\n                          Outlook\n                                    Debt\n                                    Level\n                                      Temp.\n                                              Credit\n                                              Score\n                                               Humidity\n                                                          Prior\n                                                          Default\n                                                          Windy\n                                                                     Approved\n                                                                    Play\nA
