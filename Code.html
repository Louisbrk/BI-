                                                        Underfitted classifier:\n                                                          Is a leaf\n                                                         As long as it’s green)\n                 An intuitive comparison of overfitting and underfitting\n                                                       Source: 周志华《机器学习》"}, {"id": 282, "deck": "S4a - Model: Classification & Evaluation", "page": 97, "title": "High-bias and High-variance Models", "body": "https://www.analyticsvidhya.com/blog/2023/01/ensemble-\n                               learning-methods-bagging-boosting-and-stacking/"}, {"id": 283, "deck": "S4a - Model: Classification & Evaluation", "page": 98, "title": "Bias-Variance Tradeoff (Visualization)", "body": "http://www.r2d3.us/visual-intro-to-machine-learning-part-2/"}, {"id": 284, "deck": "S4a - Model: Classification & Evaluation", "page": 99, "title": "Classification Techniques", "body": "• Decision tree analysis\n• Statistical analysis      •      Which one to choose?\n• Neural networks               “4 key advantages of using decision trees for predictive analytics”\n                                (http://www.simafore.com/blog/bid/62333/4-key-advantages-of-using-decision-\n• Support vector machines       trees-for-predictive-analytics)\n• Case-based reasoning\n• Bayesian classifiers      •      How to enhance prediction\n• Genetic algorithms               (enhance strengths and reduce\n                                   weaknesses of various classifiers)?\n• Rough sets"}, {"id": 285, "deck": "S4a - Model: Classification & Evaluation", "page": 100, "title": "Ensemble Models for Predictive Analytics", "body": "• Produces more robust and reliable prediction models\n Homogeneous ensemble (HOE)\n • use the same feature selection method with different\n   training data and distributing the dataset over\n   several nodes\n • consists of members having a single-type base\n   learning algorithm.\n • Bagging, Boosting\n Heterogeneous Ensemble (HEE)\n • use different feature selection methods with the\n   same training data\n • consists of members having different base learning\n   algorithms (e.g., SVM, ANN and Decision Trees)\n • Stacking"}, {"id": 286, "deck": "S4a - Model: Classification & Evaluation", "page": 102, "title": "Ensemble Learning: Bagging", "body": "• A.k.a. Bootstrap aggregating; 2 steps: bootstrapping + aggregation\n                                                                 https://www.analyticsvidhya.com/blog/2023/01/ensemble-\n                                                                 learning-methods-bagging-boosting-and-stacking/"}, {"id": 287, "deck": "S4a - Model: Classification & Evaluation", "page": 103, "title": "Bagging: Bootstrap Aggregating                    Train many similar models in parallel and aggregate their predictions", "body": "Idea                                                Bootstrap\n                                     Data                               Model 1          Regression: average predictions\n                                                     Sample 1\n Create multiple bootstrap\n samples, train one model per\n sample, then combine\n predictions.                                                                               Average /\n                                                     Bootstrap\n                                     Data                               Model 2             Majority              Final\n                                                     Sample 2\n                                                                                              Vote\n Bootstrap sampling\n Sampling with replacement.\n Each bootstrap dataset has the\n same size as the original                           Bootstrap                             Classification: majority vote\n                                     Data                               Model 3\n dataset, but cases can repeat.                      Sample 3\n Rule of thumb\n Each learner sees about 63%\n unique cases; about 37% are      Bagging mainly reduces variance and improves stability for high-variance base learners.\n out-of-bag."}, {"id": 288, "deck": "S4a - Model: Classification & Evaluation", "page": 104, "title": "Ensemble Learning: Boosting", "body": "• Boosting involves sequentially training weak learners\nhttps://www.geeksforgeeks.org/machine-learning/bagging-vs-boosting-vs-stacking/\n                                                                                  https://medium.com/@saugata.paul1010/ensemble-learning-bagging-boosting-stacking-and-cascading-classifiers-in-machine-learning-9c66cb271674"}, {"id": 289, "deck": "S4a - Model: Classification & Evaluation", "page": 106, "title": "Boosting: Sequential Correction                           Each weak learner focuses on what previous learners got wrong", "body": "Idea\n  Train weak learners one after another.\n  Later learners focus on residuals or\n                                            Target\n                                             200      →\n                                                           Tree 1\n                                                            180         →\n                                                                             Tree 2\n                                                                               17        →\n                                                                                              Tree 3\n                                                                                                2         →\n                                                                                                               Tree 4\n                                                                                                                0.6\n                                                                                                                             → 199.6\n  misclassified observations.                             residual 20       residual 3       residual 1       residual 0.4\n  Bias-variance intuition\n  Boosting mainly reduces bias by\n  building an additive model from\n                                            Data +\n                                            Weights   → Learner\n                                                          Weak\n                                                                1 →   Errors\n                                                                    Reweighted →   Weak\n                                                                                 Learner 2 →  Weighted\n                                                                                             Combination →   Final\n                                                                                                           Prediction\n  simple learners, such as shallow trees.\n  Strengths                                                       Limitations\n  High accuracy; learns complex patterns; converts weak           More sensitive to noise and outliers; training is less\n                                                                  parallelizable than bagging.\n  learners into a strong learner.\n Boosting is powerful for tabular prediction tasks, but requires careful tuning and data-quality checks."}, {"id": 290, "deck": "S4a - Model: Classification & Evaluation", "page": 107, "title": "Ensemble Learning: Stacking", "body": "• Because stacking combines strong learners, it can combine bagged or boosted models.\n                                                                https://www.analyticsvidhya.com/blog/2023/01/ensemble-\n                                                                learning-methods-bagging-boosting-and-stacking/"}, {"id": 291, "deck": "S4a - Model: Classification & Evaluation", "page": 109, "title": "When to use Bagging vs Boosting vs Stacking?", "body": "https://www.baeldung.com/cs/bagging-boosting-stacking-ml-ensemble-models/"}, {"id": 292, "deck": "S4a - Model: Classification & Evaluation", "page": 110, "title": "TASK 3: Model Building, Assessment, and Evaluation", "body": "• Choose the appropriate methods for analysis (including but not limited to the\n   following) and build a model:\n    • Classification\n    • Regression\n    • Clustering\n    • Association\n    • Neural Networks...\n • Evaluate the model's performance (independently and against baseline, alternative\n   models) and take iterations (if necessary) to “optimize” its performance\n    • Prediction vs. Explanation vs. Causal Proof?"}, {"id": 293, "deck": "S4a - Model: Classification & Evaluation", "page": 111, "title": "Do You Agree?", "body": "An AI assistant writes:\n“The model is 92% accurate, and the logistic regression\ncoefficient is significant, so the model is reliable, the variable\ncauses the outcome, and the company should deploy it.”\nWhat is wrong or missing?"}, {"id": 294, "deck": "S4a - Model: Classification & Evaluation", "page": 112, "title": "Q-D-M-A", "body": ""}, {"id": 295, "deck": "S4b - Model: Clustering & Association", "page": 1, "title": "Business Intelligence", "body": "in the Era of Big Data\n    Dr. Zhongyun (Phil) Zhou\n    Eastern Scholar Professor\n  NOTE: Please do not share the slides outside this class."}, {"id": 296, "deck": "S4b - Model: Clustering & Association", "page": 2, "title": "Q-D-M-A", "body": "3. Model\nMarket Segmentation (Clustering)"}, {"id": 297, "deck": "S4b - Model: Clustering & Association", "page": 3, "title": "Clustering Applications", "body": "• Customer segmentation\n• Identifying fake news\n• Patient stratification…\n                                               https://ai-cases.com/   @ Zhongyun (Phil) Zhou"}, {"id": 298, "deck": "S4b - Model: Clustering & Association", "page": 4, "title": "Customer segmentation", "body": "https://ai-cases.com/   @ Zhongyun (Phil) Zhou"}, {"id": 299, "deck": "S4b - Model: Clustering & Association", "page": 5, "title": "https://ai-cases.com/   @ Zhongyun (Phil) Zhou", "body": ""}, {"id": 300, "deck": "S4b - Model: Clustering & Association", "page": 6, "title": "Introduction:", "body": "What is Cluster Analysis?\n                       9"}, {"id": 301, "deck": "S4b - Model: Clustering & Association", "page": 7, "title": "Cluster Analysis is known by many names…", "body": ""}, {"id": 302, "deck": "S4b - Model: Clustering & Association", "page": 8, "title": "What is Cluster analysis?", "body": "Purpose: Identify groups of individuals or objects that are similar to each other but different from\n      individuals/objects in other groups.\no Cluster Analysis (CA):\n   – A convenient method for identifying homogeneous groups of\n      objects.\n   – One of the most fundamental marketing activities in market\n      segmentation (a.k.a. customer segmentation).\no Cluster: a group of objects (or cases / observations) which share many\n   characteristics, but are very\n  dissimilar to objects not belonging to that cluster.\n                                                                                             11"}, {"id": 303, "deck": "S4b - Model: Clustering & Association", "page": 9, "title": "Objectives in Cluster Analysis", "body": "Object\nWithin-cluster                     Centroid\nVariation = Minimum\nBetween-cluster\nVariation = Maximum"}, {"id": 304, "deck": "S4b - Model: Clustering & Association", "page": 10, "title": "Within-groups vs. Between-groups", "body": "• Within-groups property: Each group is homogenous with respect to certain characteristics, i.e.,\n  observations in each group are similar to each other\n• Between-groups property: Each group should be different from other groups with respect to the same\n  characteristics, i.e., observations of one group should be different from the observations of other groups."}, {"id": 305, "deck": "S4b - Model: Clustering & Association", "page": 11, "title": "Clustering Applications (1)", "body": "A spectacular success\nof the clustering idea\nin Chemistry was\nMendeleev’s Periodic\nTable of Elements."}, {"id": 306, "deck": "S4b - Model: Clustering & Association", "page": 12, "title": "Clustering Applications (2)", "body": "• Marketing – market segmentation: customers are segmented based on\n  transaction history, demographics, behaviors, and psychological factors,\n  and a marketing strategy is tailored for each segment.\n                           Taking Shape        Peak Performers\n           Losing Weight\n                                                                 Health Requirements\n                                 Market Segments\n       Making Friends           for Fitness Centers                  Sports Focus"}, {"id": 307, "deck": "S4b - Model: Clustering & Association", "page": 13, "title": "Clustering Applications (3)", "body": "• Finance – balanced portfolios: given data on a variety of investment opportunities\n  (e.g., stocks), one may find clusters based on financial performance variables such as\n  return (daily, weekly, or monthly), volatility, beta, and other characteristics, such as\n  industry and market capitalization. Selecting securities from different clusters can help\n  create a balanced portfolio."}, {"id": 308, "deck": "S4b - Model: Clustering & Association", "page": 14, "title": "Clustering applications (4)", "body": "• Spatial Data Analysis\n  – Detect spatial clusters and explain\n    them in spatial data mining. e.g., sales\n    distribution by zip code.\n• Image Processing\n  • Disease diagnosis in healthcare\n• Web analysis\n  – Document classification\n  – Cluster web-log data to discover\n    groups of similar access patterns."}, {"id": 309, "deck": "S4b - Model: Clustering & Association", "page": 15, "title": "Additional Takeaways (1)", "body": "• Cluster analysis (CA) is descriptive,\n  atheoretical, and noninferential. Many\n  scholars contend that it is only an\n  exploratory technique.\n   • CA doesn’t have a statistical basis upon which to\n     draw inferences from a sample to a population.\n       • For instance, if you have customers in Hong\n         Kong and Shenzhen, the clustering results for\n         Hong Kong may be different from those for\n         Shenzhen. You can’t just apply the CA results of\n         HK directly to Shenzhen marketing.\n   • If possible, CA should be applied from a\n     confirmatory mode, using it to identify groups\n     that already have an established conceptual\n     foundation for their existence.\n       • See the case study for next week."}, {"id": 310, "deck": "S4b - Model: Clustering & Association", "page": 16, "title": "Additional Takeaways (2)", "body": "× Cluster analysis will always create clusters,\n  regardless of the actual existence of any structure in\n  the data.\n   • Only those clusters having strong conceptual foundation\n     and validation are potentially meaningful and relevant.\n× The cluster solution is not generalizable because it is\n  totally dependent upon the variables used as the basis\n  for the similarity measure.\n   • Researchers/analysts need to ensure that all the measures\n     used in the CA have strong conceptual support.\n× Cluster analysis usually is not a final destination for\n  your data analysis.\n   • The results of CA may be used as inputs for other\n     analytical methods."}, {"id": 311, "deck": "S4b - Model: Clustering & Association", "page": 17, "title": "Discussion", "body": "• An analyst reports three customer clusters and labels them\n  “Gold,” “Silver,” and “Bronze.” Before approving a campaign\n  based on them, what evidence would you require?\n• Clusters are generated outputs, not discovered truths;\n  conceptual grounding and validation are required"}, {"id": 312, "deck": "S4b - Model: Clustering & Association", "page": 18, "title": "Three Methods Of Clustering", "body": ""}, {"id": 313, "deck": "S4b - Model: Clustering & Association", "page": 19, "title": "Method Selection", "body": "Depending on the sample size\n• Two-step clustering:\n  • large size (400 above), sample size>1000\n  • A mixture of continuous and categorical variables\n• K-means:\n  • Moderate size (100-400)\n  • Know how many clusters you want to have\n  • Confirmatory\n• Hierarchical:\n  • Small size (less than 100)\n  • Want to easily examine solutions with increasing numbers of clusters\n  • Unknown cluster size\n  • Exploratory"}, {"id": 314, "deck": "S4b - Model: Clustering & Association", "page": 20, "title": "Hierarchical Clustering", "body": "Hierarchical clustering\nproceeds successively\nby either merging\nsmaller clusters into\nlarger ones\n(agglomerative), or by\nsplitting larger clusters\n(divisive). The result of\nthe algorithm is a tree of\nclusters, called\ndendrogram."}, {"id": 315, "deck": "S4b - Model: Clustering & Association", "page": 22, "title": "Tie- not a critical issue", "body": "in clustering"}, {"id": 316, "deck": "S4b - Model: Clustering & Association", "page": 23, "title": "Stop rule: We are seeking for a solution where an", "body": "additional combination of clusters or objects\n              would occur at a greatly increased distance.\n1.414\n            2.236\n        2                        3.162"}, {"id": 317, "deck": "S4b - Model: Clustering & Association", "page": 24, "title": "Steps For Hierarchical Cluster Analysis (CA)", "body": ""}, {"id": 318, "deck": "S4b - Model: Clustering & Association", "page": 25, "title": "Steps of Clustering", "body": "Step 3: Similarity\nStep 1: Objectives         Step 2: Choice of       Measures\nof cluster analysis            Variables           (Distance\n                                                  Measures)\nStep 4: Decide on          Step 5: Decide on    Step 6: Validate\n  the clustering             the number of      and interpret the\n    algorithm                   clusters       clustering solution"}, {"id": 319, "deck": "S4b - Model: Clustering & Association", "page": 26, "title": "2", "body": "9\n    Observations   Measures"}, {"id": 320, "deck": "S4b - Model: Clustering & Association", "page": 27, "title": "Step 1: Objective of CA", "body": "• Taxonomy description\n  • Taxonomy: an empirically based classification of objects.\n  • Although cluster analysis is viewed principally as an exploratory technique, it can\n    be used for confirmatory purposes. In such cases, a proposed typology\n    (theoretically based classification) can be compared to that derived from the\n    cluster analysis.\n• Data Simplification\n  • Instead of viewing all of the observations as unique, they can be viewed as\n    members of clusters and profiled by their general characteristics.\n• Relationship identification\n  • The simplified structure from cluster analysis often identifies relationships or\n    similarities and differences not previously revealed."}, {"id": 321, "deck": "S4b - Model: Clustering & Association", "page": 29, "title": "Step 2: Choice of Variables", "body": "• The selection of clustering variables should be based on an explicit theory, past research, or\n  supposition.\n• The researcher must also realize that the importance of including only those variables that:\n    • characterize the objects being clustered, and\n    • relate specifically to the objectives of the cluster analysis.\n• Practical considerations:\n    • Cluster analysis can be affected dramatically by including only one or two inappropriate or undifferentiated\n      variables.\n    • The researcher/analyst is always encouraged to examine the results and to eliminate the variables that are not\n      distinctive (i.e., that do not differ significantly) across the derived clusters.\n• Warning:\n    • Avoid including variables “just because you have”\n    • Results are dramatically affected by the inclusion of even one or two inappropriate or undifferentiated variables"}, {"id": 322, "deck": "S4b - Model: Clustering & Association", "page": 30, "title": "Step 3: Choice of similarity measure", "body": "• If your data set has a large number of variables and some of them are\n  highly correlated, then you probably should use factor analysis to group\n  those variables together first.\no Cluster analysis uses three inter-object\n  similarity measures:\n   1. Correlational measures\n   2. Distance measures\n   3. Association measures"}, {"id": 323, "deck": "S4b - Model: Clustering & Association", "page": 31, "title": "Distance Measures (1)", "body": "• Distance (or dissimilarity) Measures\n  – Euclidean Distance                  Measuring distance between\n  – Minkowski Metric                     two observations/objects\n  – Euclidean Distance for Standardized Data\n  – Mahalanobis Distance"}, {"id": 324, "deck": "S4b - Model: Clustering & Association", "page": 32, "title": "Distance Measures (2)", "body": "What is the City-block distance between\n              Employee 1 and Employee 2?"}, {"id": 325, "deck": "S4b - Model: Clustering & Association", "page": 33, "title": "Distance Measures (3)", "body": "Observations                  Measures\n• Mahalanobis distance (Statistical\n  Distance)\n   This distance measure has an\n    advantage over the other metrics in\n    that it takes into account the\n    correlation between measures.\n   With this metric, measurements that\n    are highly correlated with other\n    measurements do not contribute as\n    much as those that are uncorrelated or\n                                           C = covariance matrix between variables\n    mildly correlated."}, {"id": 326, "deck": "S4b - Model: Clustering & Association", "page": 34, "title": "Standardization of variables", "body": "• Note: Euclidean distance depends on the scale of the variables! Variables with large\n  values will contribute more to the distance measure than variables with small values.\n• Standardization of variables is commonly preferred to avoid problems due to different\n  scales.\n• Clustering variables should be standardized whenever possible.\n   • Most commonly done using Z-scores\n                                              𝑋𝑋 − 𝜇𝜇\n                                         𝑍𝑍 =\n                                                 𝜎𝜎\n• Standardization by observations: If groups are to be formed based on respondents’\n  response styles, then within-case or row-centering standardization can be considered."}, {"id": 327, "deck": "S4b - Model: Clustering & Association", "page": 35, "title": "Step 4: deciding on clustering algorithm                 Measuring distance", "body": "between two clusters\n• Centroid method: the distance between the two\n  cluster centroids. The centroid of a merged cluster\n  is a weighted combination of the centroids of the\n  two individual clusters, where the weights are\n  proportional to the sizes of the clusters.\n• Single linkage (minimum distance/nearest\n  neighbor): the distance between the pair of closest\n  observations.\n• Complete linkage (maximum distance): the\n  distance between the pair of observations that are\n  farthest.\n• Average linkage (average distance): the average\n  distance of all possible distances between records\n  in one cluster and records in the other cluster."}, {"id": 328, "deck": "S4b - Model: Clustering & Association", "page": 36, "title": "Ward’s Method   o Ward’s Method consider the “loss of", "body": "information” that occurs when\n                  observations are clustered together.\n                o Ward’s method would choose the\n                  configuration that results in the smallest\n                  incremental loss of information.\n                o Ward’s method will produce clusters of\n                  similar shape and size.\n                o To measure loss of information, Ward’s\n                  method employs a measure “error sum of\n                  squares” (ESS) that measures the\n                  difference between individual\n                  observations and a group mean.\n                                           39"}, {"id": 329, "deck": "S4b - Model: Clustering & Association", "page": 37, "title": "Which Clustering Algorithm to Use? (1)", "body": "Clustering results with the same dataset could be very different, when you\nuse different algorithm. Each algorithm has its own specific properties:\n• Single linkage: tends to form one large cluster with the other clusters\n  containing only one or few objects each. We can make use of this to\n  detect outliers. Single linkage is considered as the most versatile\n  algorithm.\n• Complete linkage: strongly affected by outliers, as it is based on\n  maximum distances. Clusters produced by this method are likely to be\n  rather compact and tightly clustered."}, {"id": 330, "deck": "S4b - Model: Clustering & Association", "page": 38, "title": "Which Clustering Algorithm to Use? (2)", "body": "• Average linkage and centroid: tend to produce clusters with low\n  within-cluster variance and with similar sizes. Average linkage\n  is also affected by outliers but less than the complete linkage\n  method.\n• Ward’s method: tend to produce equally sized clusters. If the\n  dataset does not include outliers, you should always use Ward’s\n  method."}, {"id": 331, "deck": "S4b - Model: Clustering & Association", "page": 39, "title": "Step 5: Choose the number of clusters", "body": "Stopping rules of hierarchical clustering\n• Unfortunately, hierarchical methods provide\n  only very limited guidance for making this\n  decision.\n• Distance-based rules:\n   • Rule 1: one potential stopping rule is Elbow’s\n     rule.\n   • Rule 2: another alternative rule is looking at\n     dendrogram.\n   • Distance-based rules do not work very well in all\n     cases. It is often difficult to identify where the\n     break actually occurs.\n• Other procedures for determining the\n  number of clusters:                                     Based on the above figure, what is your final number\n   • Variance Ratio Criterion (VRC)                       of clusters ?"}, {"id": 332, "deck": "S4b - Model: Clustering & Association", "page": 40, "title": "Elbow Rule", "body": "• One should choose a number of clusters so that adding\n  another cluster doesn't give much better modelling of the\n  data.\n• More precisely, if one plots the percentage of variance\n  explained by the clusters against the number of clusters,\n  the first clusters will add much information (explain a lot\n  of variance), but at some point the marginal gain will\n  drop, giving an angle in the graph.\n• The number of clusters is chosen at this point, hence the\n  \"elbow criterion\". This \"elbow\" cannot always be\n  unambiguously identified."}, {"id": 333, "deck": "S4b - Model: Clustering & Association", "page": 41, "title": "In SPSS-Using Scree PLOT to determine                                                              Stop rule: We are seeking a solution where an", "body": "the optimal number of clusters                                                                additional combination of clusters or objects\n                                                                                                   would occur at a greatly increased distance.\n                                Agglomeration Schedule\n                                                                                                                   Scree Plot\n          Cluster Combined                         Stage Cluster First Appears\nStage   Cluster 1       Cluster 2   Coefficients    Cluster 1        Cluster 2        Next Stage\n1              12              17           .007                0                0             9\n2                   2          16           .082                0                0             5\n3                   5           6           .187                0                0             8\n4              15              19           .491                0                0            13\n5                   2           8           .834                2                0            13\n6                   1           3          1.231                0                0            10\n7                   7           9          1.657                0                0            15\n8                   5          18          2.153                3                0            14\n9              11              12          2.714                0                1            11\n10                  1          14          3.903                6                0            17\n11             10              11          5.113                0                9            16                             Elbow point\n12             13              20          6.787                0                0            14\n13                  2          15      8.574                    5                4            15\n14                  5          13         10.888                8                12           19\n15                  2           7         14.483                13               7            17\n16                  4          10         18.335                0                11           18\n17                  1           2         24.803                10               15           18\n18                  1           4         32.706                17               16           19\n19                  1           5         57.000                18               14            0\n                           The number of clusters = total # of observations – stage of ‘elbow’"}, {"id": 334, "deck": "S4b - Model: Clustering & Association", "page": 42, "title": "Step 6: Interpretation of the clusters", "body": "• The interpretation stage involves examining each cluster in terms of the cluster\n  variate to name or assign a label accurately describing the nature of the clusters.\n• When starting the interpretation process, one measure frequently used is the\n  cluster’s centroid.\n• The profiling and interpretation of the clusters, however, achieve more than\n  just description and are essential elements in selecting between cluster\n  solutions when the stopping rules indicate more than one appropriate cluster\n  solution.\n   • They provide a means for assessing the correspondence of the derived clusters to those\n     proposed by prior theory or practical experience. If used in a confirmatory mode, the\n     cluster analysis profiles provide a direct means of assessing the correspondence.\n   • The cluster profiles also provide a route for making assessments of practical significance.\n     The researcher may require that substantial differences exist on a set of clustering\n     variables and the cluster solution be expanded until such differences arise."}, {"id": 335, "deck": "S4b - Model: Clustering & Association", "page": 43, "title": "Example: Income, Age, Education", "body": ""}, {"id": 336, "deck": "S4b - Model: Clustering & Association", "page": 44, "title": "Mini-wrap: Key Takeaways", "body": "• Cluster analysis is an exploratory technique.\n• Start a cluster analysis with clear objective(s).\n• Cluster analysis is usually not the final destination of your data\n  analysis.\n• The determination of the cluster number is hard. It needs both\n  mathematical and practical considerations.\n• Non-hierarchical cluster analysis can help refine hierarchical\n  cluster analysis results."}, {"id": 337, "deck": "S4b - Model: Clustering & Association", "page": 45, "title": "References", "body": "• Hair, J. F., Black, W. C., Babin, B. J., Anderson, R. E., &\n  Tatham, R. L. (2006). Multivariate data analysis (Vol. 6).\n• Sarstedt, M., & Mooi, E. (2019). Cluster analysis. In A concise\n  guide to market research (pp. 301-354). Springer, Berlin,\n  Heidelberg."}, {"id": 338, "deck": "S4b - Model: Clustering & Association", "page": 46, "title": "K-means Clustering", "body": ""}, {"id": 339, "deck": "S4b - Model: Clustering & Association", "page": 47, "title": "Understanding K-means", "body": "• K-means is not based on distance measures, e.g. Euclidean distance or city-block\n  distance.\n• Rather, it uses the within-cluster variation as a measure to form homogeneous clusters.\n• The goal of K-means: partitioning the data in such a way that the within-cluster variation\n  is minimized.\n                                                                     Calculate the\n                                                                     Euclidean Distance"}, {"id": 340, "deck": "S4b - Model: Clustering & Association", "page": 48, "title": "K-means clustering process", "body": "Two Steps:\n1.Randomly assign observations to a pre-specified number of clusters.\n         Usually, the results from the hierarchical analysis will be used as the pre-\n         specified clusters.\n2.Observations are then successively reassigned to other clusters to\nminimize the within-cluster variation.\n    –    If the reallocation of an observation to another cluster decreases the\n         within-cluster variation, this observation is reassigned to that cluster.\n    –    With the hierarchical methods, an object remains in a cluster once\n         assigned to it. For instance, if observation A belongs to cluster #1, it\n         will always belong to cluster #1 when using the hierarchical\n         approach.\n    –    In contrast, in K-means, the cluster affiliation of an observation can\n         change during the clustering process, as long as the change can\n         reduce the within-cluster variance.\n    –    Consequently, the K-means analysis will not produce a hierarchical\n         graph as hierarchical clustering.\n                                                                                        Hierarchical clustering builds up hierarchy"}, {"id": 341, "deck": "S4b - Model: Clustering & Association", "page": 49, "title": "Example: K-means clustering process", "body": "• Step 1: Using the pre-specified\n  number of clusters as input, the\n  algorithm randomly selects a\n  center for each cluster.\n   In this example, two cluster centers\n   are randomly initiated.\n   CC1: center for the first cluster\n   CC2: center for the second cluster."}, {"id": 342, "deck": "S4b - Model: Clustering & Association", "page": 50, "title": "Cluster 1", "body": "• Step 2: Euclidean distances are\n  computed from the cluster centers to\n  every single object. Each object is\n  then assigned to the cluster center\n  with the shortest distance to it.\n   Observations A, B, C are assigned to the\n   first cluster, whereas                               Cluster 2\n   Observations D, E, F, and G are assigned\n   to the second.\n   We now have our initial partitioning of the\n   objects into two clusters."}, {"id": 343, "deck": "S4b - Model: Clustering & Association", "page": 51, "title": "• Step 3: Based on the initial", "body": "partition from step 2, each cluster’s\n  geometric center (i.e., centroid) is\n  computed.\n   Centroid: mean of the observations\n   contained in the cluster regarding each\n   of the variables (price consciousness\n   and brand loyalty in this example)\n   In this example, the centroids of clusters\n   1 &2 have changed."}, {"id": 344, "deck": "S4b - Model: Clustering & Association", "page": 52, "title": "Cluster 1", "body": "• Step 4: The distances from each\n  observation to the newly located\n  centroids are computed, and then\n  observations are reassigned to a center\n  cluster on the basis of their minimum\n  distance to other cluster centers.\n   Cluster 1: {A,B,C}  {A,B,C,E}\n   Cluster 2: {D, E, F, G} {D, F, G}\n• The K-means procedure now repeats\n  until (stopping rules):                       Cluster 2\n   a predetermined number of iterations (e.g.\n   iterations=10) is reached,\n   Convergence is achieved (i.e., there is no\n   change in the cluster memberships)"}, {"id": 345, "deck": "S4b - Model: Clustering & Association", "page": 53, "title": "The k-means algorithm: example", "body": ""}, {"id": 346, "deck": "S4b - Model: Clustering & Association", "page": 54, "title": "Exhibition / Exercise", "body": "• Cluster Analysis – A Telecom Case Study\n• Clustering analysis in Weka"}, {"id": 347, "deck": "S4b - Model: Clustering & Association", "page": 55, "title": "Reflection", "body": "Would a different K or random seed materially change the\nclustering results?"}, {"id": 348, "deck": "S4b - Model: Clustering & Association", "page": 56, "title": "Cluster Analysis for Data Mining", "body": "k-Means Clustering Algorithm\n  • k : pre-determined number of clusters\n  • Algorithm (Step 0: determine value of k)\n    • Step 1: Randomly generate k random points as initial cluster centers.\n    • Step 2: Assign each point to the nearest cluster center.\n    • Step 3: Re-compute the new cluster centers (centroids).\n    • Repetition step: Repeat steps 2 and 3 until some convergence criterion is\n      met (usually that the assignment of points to clusters becomes stable).\n   Step 1                      Step 2                      Step 3"}, {"id": 349, "deck": "S4b - Model: Clustering & Association", "page": 57, "title": "K-Means Clustering: Data", "body": "K=4"}, {"id": 350, "deck": "S4b - Model: Clustering & Association", "page": 58, "title": "K-Means Clustering: Random (Left)", "body": "K=4"}, {"id": 351, "deck": "S4b - Model: Clustering & Association", "page": 59, "title": "K-Means Clustering: Random (Right)", "body": "K=4"}, {"id": 352, "deck": "S4b - Model: Clustering & Association", "page": 60, "title": "K-Means Clustering: Random (Top)", "body": "K=4"}, {"id": 353, "deck": "S4b - Model: Clustering & Association", "page": 61, "title": "K-Means Clustering: Random (Bottom)", "body": "K=4"}, {"id": 354, "deck": "S4b - Model: Clustering & Association", "page": 62, "title": "K-Means Clustering: Random (Random)", "body": "K=4"}, {"id": 355, "deck": "S4b - Model: Clustering & Association", "page": 63, "title": "Hierarchical or K-means Clustering?", "body": " General speaking, k-means is superior to hierarchical methods as it is less affected by outliers and the\n  presence of irrelevant clustering variables.\n Furthermore, K-means can be applied to very large datasets, as the procedure is less computationally\n  demanding than hierarchical methods. In fact, K-means can work better with sample sizes above 500,\n  especially if many clustering variables are used.\n× However, K-means should only be used on interval or ratio-scaled data as the procedure relies on\n  Euclidean distances. Nevertheless, the procedure is routinely used on ordinal data as well, even though\n  there might be some distortions.\n× Finally, in K-means clustering, we have to pre-specify the number of clusters, which means we need to\n  have some idea of the expected cluster solution before we start.\n    Commonly, the number of clusters selected from hierarchical approach will be used as the number of clusters for K-means.\n    And the centroids of selected clusters from hierarchical approach will be used as the starting points."}, {"id": 356, "deck": "S4b - Model: Clustering & Association", "page": 64, "title": "Decide on the Number of Clusters", "body": ""}, {"id": 357, "deck": "S4b - Model: Clustering & Association", "page": 65, "title": "Data Type on the basis of measurement", "body": "Rank     Equal Natural                                    Measure used in\n Scale     Category                                      Example\n                      Order   Intervals Zero                                    cluster analysis\n             Yes       No       No      No     Marital status: Yes/No\nNominal                                        Gender: Male/female                 Similarity\n             Yes       Yes      No     No      Letter grade: A, B, C, D, E, F\nOrdinal                                        Income: High, medium, low           Distance\n             Yes       Yes      Yes    No      IQ, Year, temperature in\nInterval                                       Fahrenheit, SAT Scores              Distance\n Ratio       Yes       Yes      Yes    No      Age, Height, Weight                 Distance"}, {"id": 358, "deck": "S4b - Model: Clustering & Association", "page": 66, "title": "Similarity Measures", "body": "• Similarity measure: measure the degree to which variables’ values\n  share the same category.\n• Simple matching coefficient (SM):\nWhat could be the potential problem of this SM\nmeasure?"}, {"id": 359, "deck": "S4b - Model: Clustering & Association", "page": 67, "title": "Similarity measures: JC and RR coefficients", "body": "• Both coefficients range from 0\n                     to 1, with higher values\n                     indicating a greater degree of\n                     similarity."}, {"id": 360, "deck": "S4b - Model: Clustering & Association", "page": 68, "title": "Example: Comparing the three coefficients", "body": "•   a (1, 1) =??\nThree variables:                                             •   b (1, 0) =??\n   – Gender: male, female                                    •   c (0, 1) =??\n   – Product use: light, medium, and heavy                   •   d (0, 0) =??\n   – Income: low, medium, high\nWe consider the following two objects:\n   – Object #1: male customer, light user with low income, and\n   – Object #2: female customer, medium user with a low income"}, {"id": 361, "deck": "S4b - Model: Clustering & Association", "page": 69, "title": "Three coefficients", "body": "• a=1, b=2, c=2, d=3\n• In cluster analysis, the choice of\n  distance or similarity measures is not\n  very critical for the cluster structure,\n• Selection of the clustering algorithm\n  is far more important."}, {"id": 362, "deck": "S4b - Model: Clustering & Association", "page": 70, "title": "Combinations of different measures", "body": "(ordinal, interval, nominal…)\nSome possible solutions:\n1.Include only distance measures (e.g., ordinal, interval)\n2.Recode all the variables into categorical. However, the\nrecoding may be arbitrary.\n3.Solution: Two-step clustering."}, {"id": 363, "deck": "S4b - Model: Clustering & Association", "page": 71, "title": "Two-step Clustering", "body": ""}, {"id": 364, "deck": "S4b - Model: Clustering & Association", "page": 72, "title": "What is two-step clustering?", "body": "Step 1:                  • the algorithm undertakes a\n             K-means                    procedure that is very similar to\n             procedure                  the K-means algorithm.\n                                                   Step 2:      • Based on the K-means results,\n                                                   Hierarchical this  procedure combines the\n                                                                  objects sequentially to form\n                                                   procedure      homogeneous clusters.\nThis procedure can handle categorical and continuous variables simultaneously and offers the user flexibility to specify the\ncluster numbers as well as the maximum number of clusters on the basis of statistical evaluation criteria."}, {"id": 365, "deck": "S4b - Model: Clustering & Association", "page": 73, "title": "How many clusters to retain?", "body": "• Using measures of fit: AIC (Akaike’s Information Criterion) or BIC (Bayes Information\n  Criterion). Smaller values in AIC or BIC indicate a better fit.\n   • AIC: well-known for overestimating the “correct” number of clusters,\n   • BIC: a slight tendency to underestimate the number of clusters.\n   • It is worthwhile comparing the clustering outcomes of both criteria (that means running two separate analyses, one\n     based on AIC and the other based on BIC); SPSS usually presents the same results for the two criteria.\n   • What if the cluster number for AIC and BIC is different? Select a smaller number of clusters than actually\n     indicated by AIC.\n   • Remember: we should evaluate each solution on practical grounds as well as in light of the solution’s\n     interpretability. Do not solely rely on the automatic model selection, especially when there is a combination of\n     measurement scales. Examine the results very carefully.\n• Overall goodness-of-fit measure called silhouette measure of cohesion and separation.\n   It is essentially based on the average distances between the objects and can vary between -1 and +1.\n       Silhouette measure < 0.20: poor solution quality\n       Silhouette measure between 0.20 and 0.5: fair solution\n       Silhouette measure >0.5: good solution."}, {"id": 366, "deck": "S4b - Model: Clustering & Association", "page": 74, "title": "Case: Outsourcing Project Performance", "body": "Variables:\n1. ContractID: contract ID\n2. Client: client’s capabilities to manage suppliers, measured at scale 1-10.\n3. SHR: supplier’s human resources management capabilities, measured at scale 1-10.\n4. SRM: supplier’s risk management capabilities, measured at scale 1-10.\n5. Contract: contract flexibility-allow clients to switch providers or not during the contract\n    execution duration, measured at scale 1-10.\n6. Success: outsourcing performance measured by business values realization, service\n    quality and user satisfaction, , measured at scale 1-10.\n7. ITO: outsourcing type, can be information technology outsourcing (=1) or business\n    process outsourcing (=0).\n8. Domestic: outsourcing location, can be domestic (=1) or offshoring (=0)"}, {"id": 367, "deck": "S4b - Model: Clustering & Association", "page": 75, "title": "Qualitative", "body": "Comparative\n                                                                                                                                                                      Analysis (QCA)\n                                                                                                                                                                      results: based on\n                                                                                                                                                                      set theory and look\n                                                                                                                                                                      for combinations\n                                                                                                                                                                      of variables that\n                                                                                                                                                                      can lead to success\n                                                                                                                                                                      or failure.\nNote: Full black circles indicate the presence of a condition and crossed-out circles indicate the absence of the condition. Large circles indicate core conditions\n and small circles indicate peripheral conditions. Blank spaces indicate “don’t care” situations where the element may be either present or absent. Core casual\n conditions are those that are part of both parsimonious and intermediate solutions. Peripheral causal conditions are those that are intermediate solutions but\n eliminated in the parsimonious solutions."}, {"id": 368, "deck": "S4b - Model: Clustering & Association", "page": 76, "title": "Clustering is used in a confirmatory way", "body": "Table D1. Cluster Analysis Results\n                                                     Final Cluster Centers\n    IOR key element\n                             #1         #2         #3         #4         #5           #6           #7\nContract flexibility        5.95       2.80       7.09       6.41       4.58         5.28         6.68\nClient's supplier\n                            7.34       3.87       6.68       5.88       3.79         5.09         5.28\nmanagement capabilities\nSupplier's human\nresources management        7.11       5.39       6.25       6.21       3.21         3.92         4.30\ncapabilities\nSupplier’s risk\n                            8.62       6.42       7.53       6.48       4.59         5.74         6.37\nmanagement capabilities\nITO/BPO                     BPO       BPO         ITO        ITO         ITO         BPO         BPO\nDomestic/offshoring       Offshoring Domestic   Offshoring Domestic   Offshoring   Offshoring   Domestic"}, {"id": 369, "deck": "S4b - Model: Clustering & Association", "page": 78, "title": "Validate and Interpret Cluster Solution", "body": ""}, {"id": 370, "deck": "S4b - Model: Clustering & Association", "page": 79, "title": "Validation and Profiling of the Clusters", "body": "Interpret the\n                                      clustering\nAssess Stability                       solution\n                   Differentiation                   Profiling\n                     of the data"}, {"id": 371, "deck": "S4b - Model: Clustering & Association", "page": 80, "title": "Assess the Stability of Clusters (1)", "body": "• Stability means that the cluster membership of individual observations does not\n  change, or only changes a little, when different clustering methods are used to\n  cluster the observations. Thus, when other methods produce similar results, we\n  claim stability.\n• Approaches to assess stability:\n   First, run a hierarchical clustering and then follow with k-means to check whether the cluster memberships of\n   the objects change.\n   In hierarchical clustering, you can use different distance measures and evaluate their effect on the stability of\n   the results.\n         A rule of thumb: a stable clustering solution should not have more than 20% of the cluster memberships\n         change when switching from one technique to another.\n         If more than 20%, you should reconsider the setup and use a different set of clustering variables, or\n         reconsider the number of clusters.\n         Note: This percentage is likely to increase with the number of clusters used."}, {"id": 372, "deck": "S4b - Model: Clustering & Association", "page": 81, "title": "Assess the Stability of Clusters (2)", "body": "Approaches to assess stability\nCross-validation:\n   Split the dataset into two halves and analyze each separately using\n   the same settings (i.e., the same clustering variables, procedure,\n   number of clusters, etc.).\n   Then compare the two solutions’ cluster centroids using ANOVA. If\n   these do not differ significantly, you can presume that the overall\n   solution has high stability.\nNote: When using hierarchical clustering, you can also change the order of the objects in the dataset\nand rerun the analysis to check the stability of the results. If changing the order of the objects\ndrastically changes the segment compositions (e.g., in terms of cluster sizes), you should reconsider\nrerunning the analysis with different clustering variables."}, {"id": 373, "deck": "S4b - Model: Clustering & Association", "page": 82, "title": "Differentiation of the Data", "body": "• To examine whether the final solution differentiates the data well, we need to\n  examine the cluster centroids. This step is highly important, as the analysis sheds\n  light on whether the clusters are truly distinct.\n• Using ANOVA to compare the variables differences among cluster: compare the\n  means of the clustering variables across the clusters. We expect significant\n  differences among clusters of all the clustering variables (i.e. significant t-tests).\n• Using an external criterion variable: Assess the solution’s criterion validity: we do\n  this by focusing on the criterion variables (not clustering variables, usually\n  outcome variables) that have a theoretical relationship with the clustering\n  variables. For instance, in HRM, the criterion variables are usually managerial\n  outcomes such as employee’s leave, job satisfaction."}, {"id": 374, "deck": "S4b - Model: Clustering & Association", "page": 83, "title": "Interpret the Clustering Solution", "body": "• The interpretation stage involves examining each cluster in terms of the cluster\n  variables to name or assign a label accurately describing the nature of the clusters.\n• This task is usually challenging, especially when unobservable variables are\n  involved."}, {"id": 375, "deck": "S4b - Model: Clustering & Association", "page": 84, "title": "Profiling", "body": "• Clustering usually builds on unobservable clustering variables.\n   We may face an important problem: how can we decide to which segment a new\n   object should be assigned if its unobservable characteristics, such as personality\n   traits, personal values, or lifestyles, are unknown?\n   How could you solve this problem?\n• The profiling stage involves using observable variables to describe the\n  characteristics of each cluster.\n   Commonly, these observable variables should partition the data into similar\n   groups as the clustering variables do.\n   The researcher/analyst utilizes data not previously included in the cluster\n   procedure to profile the characteristics of each cluster. For example, demographic\n   data."}, {"id": 376, "deck": "S4b - Model: Clustering & Association", "page": 85, "title": "Exhibition / Exercise", "body": "• Cluster Analysis – A Telecom Case Study\n• Clustering analysis in Weka"}, {"id": 377, "deck": "S4b - Model: Clustering & Association", "page": 86, "title": "Case Study (1)", "body": "IT Human Resource Management:\n Configurations And IT Turnover\n (Information Systems Research Paper, 2005)"}, {"id": 378, "deck": "S4b - Model: Clustering & Association", "page": 87, "title": "An Important HR Management Issue", "body": "• Turnover: In this case, it refers to employee\n                 turnover. Employee turnover has two types:\n                 voluntary and involuntary. Voluntary\n                 turnover happens when an employee\n                 decides to leave a company.\n               • Turnover is an important issue for IT HRM,\n                 because IT human capital is rare and\n                 inimitable.\n               • Turnover rate indicates a company’s ability\n                 to retain and refresh its human capital. The\n                 lower the better."}, {"id": 379, "deck": "S4b - Model: Clustering & Association", "page": 88, "title": "IT managers may want to know why:", "body": ""}, {"id": 380, "deck": "S4b - Model: Clustering & Association", "page": 89, "title": "More important is to know how:", "body": "(how to manage IT workers to reduce turnover rate)\n• Conceptual support exists in\n                                  Long-term\n  the prior research literature                  Human-Capital\n  regarding HRM best practices.                Configuration (HCF)\nResearch Questions:                             High-Performance\n                                                Professional (HPP)\n• However, does IT HRM have\n   the same pattern?                           Balanced Professional\n                                                       (BP)\n• What is the relationships\n   between different HRM best                   Task-Focused (TF)\n   practices bundles and IT       Short-term\n   turnover rate?"}, {"id": 381, "deck": "S4b - Model: Clustering & Association", "page": 90, "title": "Which HRM configuration is better?", "body": "Secure jobs   Monetary Incentives   Flexibility at work"}, {"id": 382, "deck": "S4b - Model: Clustering & Association", "page": 91, "title": "• 106 senior IT managers.", "body": "• The authors sent the survey\n  to 1100 senior IT mangers.\n• The response rate is around\n  10%. This is quite normal\n  when you conduct studies\n  with senior executives."}, {"id": 383, "deck": "S4b - Model: Clustering & Association", "page": 92, "title": "Deriving IT HRM Configurations (1)", "body": "• A two-stage approach was used to identify configurations:\n1. First stage: hierarchical cluster analysis to identify seeds\n  for second-stage clustering.\n  – All the variables were standardized.\n  – Similarity measure: Squared Euclidean distances\n  – This stage uses Ward’s method to minimize within-cluster\n    differences and to avoid problems with chaining of observations\n    found in linkage methods.\n  – Identify 2-7 clusters that are possible final solutions."}, {"id": 384, "deck": "S4b - Model: Clustering & Association", "page": 93, "title": "Clustering", "body": "Variables     Variables\n                used in\n             hierarchical\n              clustering"}, {"id": 385, "deck": "S4b - Model: Clustering & Association", "page": 94, "title": "Deriving IT HRM Configurations (2)", "body": "• Second stage: non-hierarchical clustering (K-means) was run to\n  generate solutions for 2-7 clusters.\n  Clustering variables: Use the dimensions (factors) rather than the\n  items.\n  The seeds for these dimensions were the means of these dimensions\n  from the first-stage clusters.\n• Final results reveal that the 5-cluster is the strongest overall\n  solution.\n  The 5-cluster solution explains the greatest percentage of the variance in\n  turnover (this is a criterion variable)."}, {"id": 386, "deck": "S4b - Model: Clustering & Association", "page": 95, "title": "Variables used in K-means clustering", "body": "analysis\nClustering\nVariables\n Factor analysis has been used to reduce the number of variables"}, {"id": 387, "deck": "S4b - Model: Clustering & Association", "page": 96, "title": "o Configuration 1 is most consistent with the theorized", "body": "HCF configuration.\n    –   It has the highest scores on the dimensions of work\n        environment/career development, community building, and\n        nontechnical skill recruitment, and the second highest score on\n        employment security and incentives.\n    –   Thus, relative to the other four configurations, Configuration 1\n        represents an approach in which IT managers believe it is\n        important to invest in developing their IT professionals within\n        a more community-based environment that provides\n        employment security.\no Configuration 5 is most consistent with the theorized TF\n  (Task Focused) configuration.\n    –   The low importance ratings on the work-environment/career-\n        development and community-building dimensions suggest an\n        approach in which IT managers place a low emphasis on\n        investing in their people.\n    –   In further contrast with the longer-term orientation of the HCF\n        configuration, the particularly low score on employment\n        security emphasizes the short-term orientation of this\n        configuration."}, {"id": 388, "deck": "S4b - Model: Clustering & Association", "page": 97, "title": "Hypothesis Tests:", "body": "the relationships\nbetween\nIT HRM\nConfigurations\nand Turnover"}, {"id": 389, "deck": "S4b - Model: Clustering & Association", "page": 98, "title": "Interpretation of Clustering Results", "body": "Based on Figure 1\n                                                         and Table 6 to\n• Configuration 1: HCF                                   interpret the results\n   Managers in these organizations believe it is worth paying\n   attention to multiple inducements as they design and\n   implement the work environment for IT professionals.\n   Considerable importance is given to developing\n   organizational attachment through community-building\n   practices and career-development activities.\n   Organizations using HCF strategy believes that investment\n   in the development and retention of their IT workers is\n   important in the long term. They also appear willing to\n   invest in it. They also have the lowest turnover rate\n   Managers believe that community building is important\n   and emphasize the “relational” nature of this pattern."}, {"id": 390, "deck": "S4b - Model: Clustering & Association", "page": 99, "title": "References", "body": "• Hair, J. F., Black, W. C., Babin, B. J., Anderson, R. E., & Tatham, R. L. (2006).\n  Multivariate data analysis (Vol. 6).\n• Sarstedt, M., & Mooi, E. (2019). Cluster analysis. In A concise guide to market\n  research (pp. 301-354). Springer, Berlin, Heidelberg.\n• Thomas W. Ferratt, Ritu Agarwal, Carol V. Brown, Jo Ellen Moore, (2005), IT\n  Human Resource Management Configurations and IT Turnover: Theoretical\n  Synthesis and Empirical Analysis. Information Systems Research 16(3):237-255.\n  https://doi.org/10.1287/isre.1050.0057\n   (For more interpretation of the results, check out pages 248-250.)"}, {"id": 391, "deck": "S4b - Model: Clustering & Association", "page": 100, "title": "Case Study (2)", "body": "Metaverse Gaming Experience Value:\n   Dimensions and Player Groups"}, {"id": 392, "deck": "S4b - Model: Clustering & Association", "page": 102, "title": "Part 1 Introduction", "body": "Research Gaps\n                                                                          Research Objective (1)\n 1. Experience value is rarely investigated in the MG context\n − A context-specific understanding of its dimensionality & roles\n 2. In related contexts (gaming/VW)                                           To identify the context-specific\n • predominantly focused on the motivation-focused perspective               dimensions and subdimensions of\n     (intrinsic/hedonic vs. extrinsic/utilitarian), but overlooked the\n     activeness-focused perspective (active vs. reactive)                  MGEV and develop an MG-context-\n − capturing a complete portrayal of the connotation of MGEV\n                                                                              specific typology of MGEV by\n 3. Experience value is a multidimensional concept                         integrating the motivation-focused and\n − has often relied on broad concepts (e.g., utilitarian
