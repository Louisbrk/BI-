<script id="slides-data" type="application/json">[{"id": 1, "deck": "S2 - Overview", "page": 1, "title": "Business Intelligence", "body": "in the Era of Big Data\n    Dr. Zhongyun (Phil) Zhou\n    Eastern Scholar Professor\n  NOTE: Please do not share the slides outside this class."}, {"id": 2, "deck": "S2 - Overview", "page": 2, "title": "Outline（5W1H）", "body": "Fundamentals\n • WHY do we need BI&A?\n • WHAT is BI&A?\n • WHO: Business analyst as a profession\nPractices\n • WHERE/WHEN: Values and applications of BI&A\n • **HOW to do business data analytics?\n   • Q-D-M-A\n                                                 @ Zhongyun (Phil) Zhou"}, {"id": 3, "deck": "S2 - Overview", "page": 3, "title": "Practices (2)", "body": "HOW can we do business data (esp.\n     predictive) analytics?\n        Processes and Methods"}, {"id": 4, "deck": "S2 - Overview", "page": 4, "title": "Definition of Data Mining", "body": "• The nontrivial process of identifying valid, novel, potentially\n  useful, and ultimately understandable patterns in data stored in\n  structured databases.\n                                                       – Fayyad et al., (1996)\n• Keywords in this definition: Process, nontrivial, valid, novel,\n  potentially useful, understandable.\n• Data mining: a misnomer?\n   • Other names: knowledge extraction, pattern analysis, knowledge\n     discovery, information harvesting, pattern searching, data dredging,…\n                                                                         @ Zhongyun (Phil) Zhou"}, {"id": 5, "deck": "S2 - Overview", "page": 5, "title": "Data Mining is a Blend of Multiple Disciplines", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 6, "deck": "S2 - Overview", "page": 7, "title": "Potential Value of Big Data Analytics", "body": " How to sustain firm resilience when confronted with precipitous event shocks has become a core question\n  for OM/IS researchers and firm managers (Cui et al., 2022; Li et al., 2022).\n Firms are increasingly turning to big data analytics (BDA) to achieve firm resilience against unpredictable\n  disruptions (Munir et al., 2022).\n           Achieving firm resilience is a data-intensive process that requires firms to analyze large amounts of information to address deep\n              uncertainty and equivocality (Sheng et al., 2021).\n           BDA capability, namely, the ability to transform big data into actionable insights for business decision-making (McAfee and Brynjolfsson, 2012; Shi\n              et al., 2022),   is a critical dynamic capability that improves firm resilience by providing meaningful insights into firm operations with\n              efficient information processing during exogenous events (Munir et al., 2022).\n           Existing empirical studies using regression-based analyses have offered preliminary evidence on the (+) effect of BDA capability on\n              firm resilience (Dennehy et al., 2021; Munir et al., 2022)\n                                                                                                                                                           @ Zhongyun (Phil) Zhou"}, {"id": 7, "deck": "S2 - Overview", "page": 8, "title": "Challenge", "body": " Many firms struggle to unleash BDA capability to enhance their resilience against exogenous\n  events (Brown, 2021; Li, Wang, Ye, et al., 2022)\n    Only 24% of firms express high confidence in their ability to utilize BDA insights to effectively address\n       exogenous events (Forrester, 2021)\n    70% of C-suite executives surveyed lack complete confidence in their organizations’ firm resilience\n       despite the prevalent use of BDA (Deloitte, 2021)\n                             BDA capability                            Firm resilience\n                                                                                                            @ Zhongyun (Phil) Zhou"}, {"id": 8, "deck": "S2 - Overview", "page": 9, "title": "Big Data Projects Fail (Easily)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 9, "deck": "S2 - Overview", "page": 11, "title": "WHY the DM industry needs a standard process model?", "body": "• Data mining is a NOT push-button technology\n• Data Mining is a complex process requiring various tools and\n  different people. The success of a data mining project depends\n  on the proper mix of good tools and skilled analysts.\n• Furthermore, it requires a sound methodology and effective\n  project management. A process model can help to understand\n  and manage the interactions along this complex process.\n                                                              @ Zhongyun (Phil) Zhou"}, {"id": 10, "deck": "S2 - Overview", "page": 12, "title": "Which Data Mining Process is the Best?", "body": "Ranking of Data Mining\nMethodologies/Processes                                CRISP-DM\n                                                         My own\n                                                         SEMMA\n                                                     KDD Process\n                                                My organization's\n                                    Domain-specific methodology\n                                                           None\n                          Other methodology (not domain specific)\n                                                                    0   10      20   30    40    50   60     70\n                                                                             Source: KDnuggets.com.\n                                                                                                           @ Zhongyun (Phil) Zhou"}, {"id": 11, "deck": "S2 - Overview", "page": 13, "title": "Data Mining Process", "body": "• A manifestation of the best practices\n• A systematic way to conduct DM projects\n• Moving from Art to Science for DM project\n• Everybody has a different version\n• Most common standard processes:\n   – CRISP-DM (Cross-Industry Standard Process for Data Mining)\n   – SEMMA (Sample, Explore, Modify, Model, and Assess)\n   – KDD (Knowledge Discovery in Databases)\n                                                                  @ Zhongyun (Phil) Zhou"}, {"id": 12, "deck": "S2 - Overview", "page": 14, "title": "Data Mining Process: CRISP-DM", "body": "• The Six-Step CRISP-DM Data Mining Process →\n                                                                               1                             2\n• The process is highly repetitive and experimental                  Business                        Data\n  (DM: art versus science?)                                        Understanding                 Understanding\n                                                                                                                               3\n                                                                                                                    Data\n                                                                                                                 Preparation\n                                                                   6\n                                                                                                                               4\n                                                      Deployment\n                                                                                                                   Model\n                                                                                    Data\n                                                                                                                  Building\n                                                                                                 5\n                                                                                   Testing and\n                                                                                   Evaluation\n                                                                                                                                   @ Zhongyun (Phil) Zhou"}, {"id": 13, "deck": "S2 - Overview", "page": 15, "title": "4-Level", "body": "Breakdown of\nthe CRISP-DM\n Methodology\n                @ Zhongyun (Phil) Zhou"}, {"id": 14, "deck": "S2 - Overview", "page": 16, "title": "Data Mining Process: SEMMA", "body": "Sample\n• Developed by SAS Institute                                        (Generate a representative\n                                                                       sample of the data)\n                                  Assess                                                                              Explore\n                           (Evaluate the accuracy and                                                          (Visualization and basic\n                            usefulness of the models)                                                           description of the data)\n                                                                           Feedback\n                                            Model                                                        Modify\n                                  (Use variety of statistical and                                (Select variables, transform\n                                   machine learning models )                                      variable representations)\n                                                                                                                                           @ Zhongyun (Phil) Zhou"}, {"id": 15, "deck": "S2 - Overview", "page": 17, "title": "Data Mining Process: KDD", "body": "Internalization\nKDD (Knowledge Discovery in Databases) Process\n                                                                          Data Mining\n                                                                                                            DEPLOYMENT CHART\n                                                                                                                                                                 Knowledge\n                                                                                                                                                                 “Actionable\n                                                                                                  PHASE 1    PHASE 2   PHASE 3   PHASE 4   PHASE 5\n                                                                                         DEPT 1\n                                                                                         DEPT 2\n                                                                                         DEPT 3\n                                                                                                                                                             5     Insight”\n                                                                                         DEPT 4\n                                                                                                                                                         4\n                                                              Data                                1                        2                         3\n                                                         Transformation\n                                                                                                  Extracted\n                                                                                                  Patterns\n                                                Data\n                                              Cleaning                     Transformed\n                                                                               Data\n                                 Data\n                               Selection                 Preprocessed\n                                                             Data\n                                           Target\n                                            Data\n                                                                                                                                 Feedback\n                           Sources for\n                            Raw Data\n                                                                                                                                                                      @ Zhongyun (Phil) Zhou"}, {"id": 16, "deck": "S2 - Overview", "page": 18, "title": "https://www.datascience-pm.com/crisp-", "body": "dm-still-most-popular/\n                                        @ Zhongyun (Phil) Zhou"}, {"id": 17, "deck": "S2 - Overview", "page": 19, "title": "Analytics vs. Analysis", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 18, "deck": "S2 - Overview", "page": 20, "title": "Data Mining Process: CRISP-DM", "body": "• Cross Industry Standard Process for Data Mining\n• Proposed in 1990s by a European consortium\n• Composed of six consecutive phases\n   • Step 1: Business Understanding\n   • Step 2: Data Understanding               Accounts for ~85%\n                                              of total project\n   • Step 3: Data Preparation\n                                              time\n   • Step 4: Model Building\n   • Step 5: Testing and Evaluation   Which step(s) account for the\n   • Step 6: Deployment               majority of project time/resources?\n                                                                            @ Zhongyun (Phil) Zhou"}, {"id": 19, "deck": "S2 - Overview", "page": 21, "title": "Overview of the CRISP-DM tasks and their outputs", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 20, "deck": "S2 - Overview", "page": 22, "title": "A simplified framework: Q-D-M-A", "body": "6. Deployment                                 1. Business understanding\n                          Action   Question\n4. Model building         Model     Data      2. Data understanding\n5. Testing & evaluation                       3. Data preparation\n                                                                      @ Zhongyun (Phil) Zhou"}, {"id": 21, "deck": "S2 - Overview", "page": 23, "title": "Q-D-M-A", "body": "1. Question\nWhat’s the fist step of data analytics?"}, {"id": 22, "deck": "S2 - Overview", "page": 24, "title": "1. Question: Business Understanding", "body": "• What is the purpose of business understanding?\n  Why is it important?\n• How can we “question-ize” business problems?\n                                              @ Zhongyun (Phil) Zhou"}, {"id": 23, "deck": "S2 - Overview", "page": 25, "title": "Business Problem “Question-ization”", "body": "Business Practice(s)\n • What is done in practice (well or poorly)\nBusiness Problem(s)\n • What is done (poorly) & can be done (better)\nAnalyzable Question(s)\n • What can be answered through data analytics\n • A business problem can be transformed into an (a set of) analyzable question(s)\n • The key to business understanding is to clearly define the analyzable question(s)\n                                                                                       @ Zhongyun (Phil) Zhou"}, {"id": 24, "deck": "S2 - Overview", "page": 26, "title": "Example: Regressions – WHAT", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 25, "deck": "S2 - Overview", "page": 27, "title": "Regression Analysis: X and Y", "body": "Correlation between Y and X\n• Correlation != causality\n• Dependent / outcome variable (Y): the key business / scientific problem\n  • e.g., Credit investigation; car assurance (compensation? amount?);\n    medical research (cancer development mechanisms)\n• Independent / explaining variable (X/X’s): visible and can explain /\n  predict Y (invisible)\n  • Credit  real assets, income, social capital, etc.\n                                                                     @ Zhongyun (Phil) Zhou"}, {"id": 26, "deck": "S2 - Overview", "page": 28, "title": "Regression:", "body": "Some common misconception(s)\n• Correlation vs. Causality\n                                   @ Zhongyun (Phil) Zhou"}, {"id": 27, "deck": "S2 - Overview", "page": 29, "title": "Example 1: Smoking & Length of Life", "body": "• 1314 volunteers\n  – 582 smokers, 732 non-smokers\n• 20 years later\n • Death rate for smoker: 24%, and death rate for non-smoker: 31%\n                         Survival Status\n    Smoker         Dead          Alive        Total\n    Yes            139 (24%)     443 (76%)    582\n    No             230 (31%)     502 (69%)    732\n    Total          369 (28%)     945          1314\n• Smokers live longer?\n                                                                    @ Zhongyun (Phil) Zhou"}, {"id": 28, "deck": "S2 - Overview", "page": 30, "title": "Possible Reasons for the Wrong Conclusion", "body": "• Sample random?\n• Information missing?\n                  Death Rate in Various Age Groups\n         Smoker   18-34     35-54       55-64        65+\n         Yes      2.8%      17.2%       44.3%        85.7%\n         No       2.7%      9.5%        33.1%        85.5%\n                                                             @ Zhongyun (Phil) Zhou"}, {"id": 29, "deck": "S2 - Overview", "page": 31, "title": "Example 2: Higher Education Results in Higher Crime Rate?", "body": "• Because people\n                                      receives higher\n                                      education are easier\n                                      to get stressed and\n                                      commit crime?\n                                    • Or missing\n                                      information again?\n                                                       @ Zhongyun (Phil) Zhou"}, {"id": 30, "deck": "S2 - Overview", "page": 32, "title": "Adding “urbanization” Information", "body": "• Big cities have\n                               higher crime rate\n                             • Within the same\n                               urbanization\n                               level, higher\n                               education\n                               lower crime rate\n                                          @ Zhongyun (Phil) Zhou"}, {"id": 31, "deck": "S2 - Overview", "page": 33, "title": "Example 3", "body": "• Number of drowning incidents on a beach is highly correlated\n  with the ice cream sale on that beach\n• Of course, “drowning incidents” do not cause the increase in\n  the sale of ice cream\n• The latent variable is “number of swimmers”\n• However, if you want to predict the ice cream sale, maybe it is\n  sufficient to know the number of drowning incidents\n                                                              @ Zhongyun (Phil) Zhou"}, {"id": 32, "deck": "S2 - Overview", "page": 34, "title": "Regression(s):", "body": "Simple Linear regression\n• Just provide correlation analysis\n                                      @ Zhongyun (Phil) Zhou"}, {"id": 33, "deck": "S2 - Overview", "page": 35, "title": "BOOKS   ATTEND    GRADE", "body": "Example\n                                                      0         9     45.00\n                                                      1        15     57.00\n                                                      0        10     45.00\n                                                      2        16     51.00\n                                                      4        10     65.00\n                                                      4        20     88.00\n• In order to design class attendance policies,\n                                                      1        11     44.00\n                                                      4        20     87.00\n                                                      3        15     89.00\n  the university wants to know whether\n                                                      0        15     59.00\n ncremental grade that attending one additional class can bring;\n                                                                                  @ Zhongyun (Phil) Zhou"}, {"id": 35, "deck": "S2 - Overview", "page": 37, "title": "Cont.", "body": "• Grade = a + b1* Book + b2* Attend\n• We will know:\n  – if a student reads 1 book and attends 10 classes, he can obtain:\n    a + b1*1 + b2*10 in the exam (in expectation).\n  – if a student reads 2 books and attends 3 classes, he can obtain:\n    a+b1*x2 + b2*x3 in the exam (in expectation)\n• So, regression can help make prediction.\n                                                              @ Zhongyun (Phil) Zhou"}, {"id": 36, "deck": "S2 - Overview", "page": 38, "title": "Introduction to Simple Linear Regression", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 37, "deck": "S2 - Overview", "page": 39, "title": "In Excel", "body": "• First add the “Data Analysis Add-in”\n• Data --- Data Analysis --- Regression\n• Specify Y\n• Specify X’s;\n• Specify Output range\n• Run\n                                          @ Zhongyun (Phil) Zhou"}, {"id": 38, "deck": "S2 - Overview", "page": 40, "title": "The two variables", "body": "explains 32.9% of the         Excel Output\n     Y variable.\n SUMMARY OUTPUT\n                                     Reading one additional book will increase score by 4.037 ;\n  Regression Statistics                attending one additional class will increase score by\n Multiple R       0.573                                       1.283.\n R Square         0.329\n Adjusted R\n                  0.292\n Square\n Standard Error 14.052\n Observations         40\n ANOVA\n                                         Both variables have positive effects\n                                                    Significan\n                   df        SS       MS         F\n                                                           ce F\n Regression              2 3577.7    1788.8          9.1       0.0\n Residual ": "S2 - Overview", "page": 70, "title": "Case Study: Quadratic Relationships (5)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 66, "deck": "S2 - Overview", "page": 71, "title": "Case Study: Quadratic Relationships (6)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 67, "deck": "S2 - Overview", "page": 72, "title": "Case Study: Quadratic Relationships (7)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 68, "deck": "S2 - Overview", "page": 73, "title": "Case Study: Quadratic Relationships (8)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 69, "deck": "S2 - Overview", "page": 74, "title": "Case Study: Quadratic Relationships (9)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 70, "deck": "S2 - Overview", "page": 75, "title": "Case Study: Quadratic Relationships (10)", "body": "@ Zhongyun (Phil) Zhou"}, {"id": 71, "deck": "S2 - Overview", "page": 76, "title": "Collinearity", "body": "• Some IVs are totally predicted by the other IVs (a linear\n  relationship between two or more IVs).\n• For example:\n  – Sale of ice cream= a + b1*spring + b2*summer + b3*fall + b4*winter.\n     • because winter=1-spring-summer-fall; if knowing the other three variables,\n       the winter variable can be perfected calculated.\n  – Starting Salary = a + b1*College GPA + b2*High school GPA + Other\n    variables.\n     • Here College GPA may be highly correlated with the High School GPA\n                                                                              @ Zhongyun (Phil) Zhou"}, {"id": 72, "deck": "S2 - Overview", "page": 77, "title": "How to Detect Collinearity", "body": "• Large changes in the estimated regression coefficients when\n  one IV is added or deleted\n• If a multivariate regression finds an insignificant coefficient of\n  a particular IV, yet its coefficient in a simpler regression is\n  significantly different from zero\n• Correlation Analysis shows that there are significant\n  correlations between two variables.\n                                                                @
